<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring-Loaded Toggle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&display=swap');

        :root {
            --purple: #D1A3FF;
            --blue: #00D2FF;
            --black: #000000;
        }

        body {
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }

        .toggle-container {
            width: 320px;
            height: 100px;
            background: white;
            border: 4px solid var(--black);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            box-shadow: inset 6px 6px 0px rgba(0,0,0,0.15), 8px 8px 0px rgba(0,0,0,0.1);
        }

        .value-display {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--black);
        }

        /* The Bar: Fully filled purple, rounded, no stroke */
        .track-bar {
            width: 100%;
            height: 16px;
            background: var(--purple);
            border-radius: 999px;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        /* The Controller (Thumb) */
        .thumb {
            position: absolute;
            width: 16px;
            height: 36px;
            background: var(--black);
            border: 3px solid white;
            border-radius: 4px;
            box-shadow: 0 0 0 3px var(--black);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .thumb-accent {
            width: 2px;
            height: 14px;
            background: var(--blue);
        }

        .hint {
            margin-top: 14px;
            font-size: 9px;
            font-weight: 700;
            color: rgba(0,0,0,0.3);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="toggle-container">
        <div class="value-display" id="val-text">45</div>
        
        <div class="track-bar" id="track">
            <div class="thumb" id="thumb">
                <div class="thumb-accent"></div>
            </div>
        </div>

        <div class="hint">Tilt Left/Right to Adjust • Auto-Springs to Center</div>
    </div>

    <script>
        const track = document.getElementById('track');
        const thumb = document.getElementById('thumb');
        const valText = document.getElementById('val-text');

        let isDragging = false;
        let currentValue = 45;
        let thumbPos = 50; // percentage
        let targetPos = 50;
        
        // Spring Constants
        const stiffness = 0.2;
        const damping = 0.65;
        let velocity = 0;

        function updateValue() {
            // Sensitivity: displacement from center
            const displacement = thumbPos - 50;
            if (Math.abs(displacement) > 0.5) {
                // Adjust value based on displacement
                // Further from center = faster adjustment
                currentValue += (displacement * 0.05);
                valText.innerText = Math.round(currentValue);
            }
        }

        function animate() {
            if (!isDragging) {
                // Spring physics
                const force = (targetPos - thumbPos) * stiffness;
                velocity += force;
                velocity *= damping;
                thumbPos += velocity;
            }

            thumb.style.left = `${thumbPos}%`;
            
            if (isDragging) {
                updateValue();
            }

            requestAnimationFrame(animate);
        }

        const handleDown = (e) => {
            isDragging = true;
            updateThumbPosition(e);
        };

        const handleMove = (e) => {
            if (!isDragging) return;
            updateThumbPosition(e);
        };

        const handleUp = () => {
            isDragging = false;
            targetPos = 50; // Spring back to center
        };

        track.addEventListener('mousedown', handleDown);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleUp);

        // Touch support
        track.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleDown(e.touches[0]);
        }, { passive: false });
        window.addEventListener('touchmove', (e) => {
            handleMove(e.touches[0]);
        }, { passive: false });
        window.addEventListener('touchend', handleUp);

        function updateThumbPosition(e) {
            const rect = track.getBoundingClientRect();
            let x = ((e.clientX - rect.left) / rect.width) * 100;
            x = Math.max(0, Math.min(100, x));
            thumbPos = x;
        }

        // Start loop
        animate();
    </script>
</body>
</html>
