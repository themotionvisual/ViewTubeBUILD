<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UsTube Project Pipeline Preview</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: #e5e5e5; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #000; border-radius: 10px; }
        .inset-shadow { box-shadow: inset 4px 4px 0px 0px rgba(0,0,0,0.1); }
        .gantt-bg { background-image: linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px); background-size: 50px 100%; }
        ::selection { background: #CCFF00; color: black; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState } = React;

        // --- Mock Lucide Icons ---
        const createIcon = (name) => {
            return ({ size = 24, color = 'currentColor', className = '', strokeWidth = 2 }) => {
                if (!lucide.icons[name]) return null;
                const iconHtml = lucide.icons[name].toSvg({ width: size, height: size, color, 'stroke-width': strokeWidth, class: className });
                return <span dangerouslySetInnerHTML={{ __html: iconHtml }} className={className} />;
            };
        };

        const LayoutDashboard = createIcon('layout-dashboard');
        const AlertCircle = createIcon('alert-circle');
        const Clock = createIcon('clock');
        const Calendar = createIcon('calendar');
        const Check = createIcon('check');
        const Plus = createIcon('plus');
        const ChevronRight = createIcon('chevron-right');
        const Lightbulb = createIcon('lightbulb');
        const Video = createIcon('video');
        const Scissors = createIcon('scissors');
        const Package = createIcon('package');
        const UploadCloud = createIcon('upload-cloud');
        const HardDrive = createIcon('hard-drive');

        // Brand Colors
        const COLORS = {
            lime: '#C9F830',
            cyan: '#24D3FF',
            pink: '#FF7497',
            yellow: '#FFE357',
            orange: '#FCAF57',
            purple: '#B14AED',
            gray: '#f8fafc'
        };

        const ToolboxModule = ({ title, icon: Icon, mainColor, iconColor, children }) => {
            const [isOpen, setIsOpen] = useState(true);

            return (
                <div className="w-full bg-white overflow-hidden relative flex flex-col shrink-0 transition-all duration-300 border-[4px] border-black rounded-[16px] shadow-[8px_8px_0px_0px_black] mb-8">
                    <header 
                        onClick={() => setIsOpen(!isOpen)}
                        className="h-[64px] min-h-[64px] flex items-center justify-between select-none relative z-20 cursor-pointer border-b-[4px] border-black group"
                        style={{ backgroundColor: mainColor }}
                    >
                        <div className="flex items-center h-full flex-1">
                            <div className="h-full w-[64px] flex items-center justify-center shrink-0 border-r-[4px] border-black" style={{ backgroundColor: iconColor }}>
                                <Icon className="text-black" size={32} strokeWidth={2.5} />
                            </div>
                            <div className="flex items-center pl-4 h-full pointer-events-none select-none">
                                <h3 className="font-[900] uppercase tracking-tighter text-black leading-none text-[32px] md:text-[42px] pt-1">
                                    {title}
                                </h3>
                            </div>
                        </div>
                        <div className="flex items-center justify-center w-[64px] h-full border-l-[4px] border-black bg-white/20 hover:bg-white/40 transition-colors">
                            <div className="w-8 h-8 border-[3px] border-black rounded-full flex items-center justify-center bg-white shadow-[2px_2px_0px_0px_black]">
                                <Plus className={`transition-transform duration-300 ${isOpen ? 'rotate-45' : 'rotate-0'}`} size={20} strokeWidth={4} />
                            </div>
                        </div>
                    </header>
                    <div className={`grid transition-[grid-template-rows] duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] ${isOpen ? 'grid-rows-[1fr]' : 'grid-rows-[0fr]'}`}>
                        <div className="overflow-hidden min-h-0">
                            <main className="bg-[#f8fafc] w-full p-6 text-black flex flex-col gap-6">
                                {children}
                            </main>
                        </div>
                    </div>
                </div>
            );
        };

        const BrutalistBtn = ({ children, color = COLORS.lime, className = "" }) => (
            <button className={`h-[48px] border-[3px] border-black rounded-xl font-[900] uppercase tracking-tight text-sm px-6 flex items-center justify-center gap-2 shadow-[4px_4px_0px_0px_black] hover:-translate-y-0.5 hover:shadow-[6px_6px_0px_0px_black] active:translate-y-1 active:shadow-[0px_0px_0px_0px_black] transition-all ${className}`} style={{ backgroundColor: color }}>
                {children}
            </button>
        );

        const ProjectPipeline = () => {
            const projects = [
                { id: 1, title: "I Survived 50 Hours In A White Box", stage: "Editing", progress: 65, color: COLORS.pink },
                { id: 2, title: "Minecraft 100 Days Real Life", stage: "Filming", progress: 40, color: COLORS.cyan },
                { id: 3, title: "Testing The World's Most Expensive Tech", stage: "Pre-Production", progress: 15, color: COLORS.yellow }
            ];

            const stages = [
                { name: "Ideation", icon: Lightbulb },
                { name: "Pre-Prod", icon: Calendar },
                { name: "Filming", icon: Video },
                { name: "Editing", icon: Scissors },
                { name: "Packaging", icon: Package },
                { name: "Published", icon: UploadCloud }
            ];

            return (
                <div className="max-w-[1400px] mx-auto p-4 md:p-8">
                    {/* Header */}
                    <div className="flex justify-between items-end mb-8 border-b-[6px] border-black pb-4">
                        <div>
                            <h1 className="text-[50px] font-[1000] uppercase tracking-tighter leading-none text-black">Project Pipeline</h1>
                            <p className="font-black text-xl text-gray-500 tracking-widest uppercase mt-2">The Operational Nervous System</p>
                        </div>
                        <div className="flex gap-4">
                            <div className="bg-[#FF7497] border-[3px] border-black rounded-xl px-4 py-2 flex items-center gap-2 shadow-[4px_4px_0px_0px_black]">
                                <AlertCircle size={20} strokeWidth={2.5}/>
                                <span className="font-black uppercase text-sm">1 Bottleneck Warning</span>
                            </div>
                            <BrutalistBtn color={COLORS.lime} className="text-lg">+ New Active Project</BrutalistBtn>
                        </div>
                    </div>

                    {/* V1. Master Timeline (Gantt) */}
                    <ToolboxModule title="Master Timeline" icon={Clock} mainColor={COLORS.cyan} iconColor={COLORS.pink}>
                        <div className="flex flex-col gap-4 border-[4px] border-black rounded-2xl bg-white shadow-[inset_4px_4px_0px_0px_rgba(0,0,0,0.05)] p-4 h-[350px] overflow-x-auto relative custom-scrollbar">
                            
                            {/* Days Axis */}
                            <div className="flex w-[1500px] border-b-[3px] border-black pb-2 mb-2 sticky top-0 bg-white z-10 pl-[250px]">
                                {[...Array(30)].map((_, i) => (
                                    <div key={i} className="flex-1 text-center font-black uppercase text-xs text-gray-400">MAY {i+1}</div>
                                ))}
                            </div>

                            {/* Gantt Area */}
                            <div className="flex-1 relative w-[1500px] gantt-bg flex flex-col gap-6 pt-2">
                                {/* Project 1 Row */}
                                <div className="absolute left-0 w-[240px] font-black uppercase text-sm truncate pr-4 mt-2">White Box Challenge</div>
                                <div className="absolute top-0 left-[250px] border-[3px] border-black h-10 w-[400px] bg-[#FF7497] rounded-lg flex items-center px-3 font-bold text-xs uppercase shadow-[3px_3px_0px_0px_black] opacity-50"><Check size={14} className="mr-2"/> Pre-Production</div>
                                <div className="absolute top-0 left-[650px] border-[3px] border-black h-10 w-[300px] bg-[#FFE357] rounded-lg flex items-center px-3 font-bold text-xs uppercase shadow-[3px_3px_0px_0px_black] animate-pulse">Editing (5 Days Est.)</div>

                                {/* Project 2 Row */}
                                <div className="absolute left-0 top-[60px] w-[240px] font-black uppercase text-sm truncate pr-4 mt-2">Minecraft IRL</div>
                                <div className="absolute top-[60px] left-[450px] border-[3px] border-black h-10 w-[150px] bg-[#24D3FF] rounded-lg flex items-center px-3 font-bold text-xs uppercase shadow-[3px_3px_0px_0px_black]">Filming</div>
                                
                                {/* Project 3 Row */}
                                <div className="absolute left-0 top-[120px] w-[240px] font-black uppercase text-sm truncate pr-4 mt-2">Expensive Tech</div>
                                <div className="absolute top-[120px] left-[300px] border-[3px] border-black h-10 w-[200px] bg-[#C9F830] rounded-lg flex items-center px-3 font-bold text-xs uppercase shadow-[3px_3px_0px_0px_black]">Ideation & Script</div>
                            </div>

                        </div>
                    </ToolboxModule>

                    {/* V2. Active Project Detail View (Stage-Gate + Dependencies) */}
                    <ToolboxModule title="Current Focus: White Box Challenge" icon={LayoutDashboard} mainColor={COLORS.yellow} iconColor={COLORS.cyan}>
                        <div className="flex flex-col xl:flex-row gap-6">
                            
                            {/* Left Col: Master Progress */}
                            <div className="flex-1 flex flex-col gap-6">
                                {/* Progress Bar */}
                                <div className="bg-white border-[4px] border-black rounded-2xl p-6 shadow-[6px_6px_0px_0px_black]">
                                    <div className="flex justify-between items-center mb-4">
                                        <h4 className="font-black uppercase text-xl">Project Completion</h4>
                                        <span className="font-black text-2xl text-white bg-black px-3 py-1 rounded">65%</span>
                                    </div>
                                    <div className="h-[40px] w-full border-[4px] border-black rounded-full bg-gray-100 overflow-hidden relative shadow-[inset_3px_3px_0px_0px_rgba(0,0,0,0.1)]">
                                        <div className="h-full bg-[#C9F830] border-r-[4px] border-black transition-all duration-1000" style={{width: '65%'}} />
                                    </div>

                                    {/* Stage Gates */}
                                    <div className="flex justify-between mt-8 relative">
                                        <div className="absolute top-5 left-0 w-full h-[4px] bg-black z-0" />
                                        {stages.map((stage, i) => {
                                            const isComplete = i < 3;
                                            const isActive = i === 3;
                                            return (
                                                <div key={i} className="flex flex-col items-center gap-2 relative z-10 w-20">
                                                    <div className={`w-12 h-12 border-[4px] border-black rounded-full flex items-center justify-center transition-all shadow-[2px_2px_0px_0px_black] ${isComplete ? 'bg-[#C9F830]' : isActive ? 'bg-[#FF7497] animate-pulse border-dashed scale-110' : 'bg-white'}`}>
                                                        {isComplete ? <Check size={20} strokeWidth={4}/> : <stage.icon size={20} strokeWidth={2.5} />}
                                                    </div>
                                                    <span className={`font-black uppercase text-[10px] text-center ${isActive ? 'text-black' : 'text-gray-500'}`}>{stage.name}</span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>

                                {/* Task Dependencies (Checklists) */}
                                <div className="flex-1 bg-white border-[4px] border-black rounded-2xl p-6 shadow-[6px_6px_0px_0px_black]">
                                    <h4 className="font-black uppercase text-lg border-b-[3px] border-black pb-2 mb-4">Editing Phase Checklist (Vlog Template)</h4>
                                    <div className="flex flex-col gap-3">
                                        {[
                                            { t: "Raw Footage Downloaded", d: true },
                                            { t: "A-Roll Assembly Cut", d: true },
                                            { t: "B-Roll & Color Grade", d: false, req: "A-Roll Assembly Cut" },
                                            { t: "Music & SFX Mix", d: false, req: "A-Roll Assembly Cut" },
                                            { t: "Sponsor Integration Placement", d: false, alert: true, req: "B-Roll & Color Grade" }
                                        ].map((task, i) => (
                                            <div key={i} className={`flex items-center gap-4 p-3 border-[3px] border-black/10 rounded-xl transition-colors ${task.d ? 'bg-gray-50 opacity-60' : 'bg-white hover:border-black'}`}>
                                                <div className={`w-6 h-6 border-[3px] border-black rounded flex shrink-0 items-center justify-center ${task.d ? 'bg-[#C9F830]' : 'bg-white'}`}>
                                                    {task.d && <div className="w-2.5 h-2.5 bg-black rounded-sm" />}
                                                </div>
                                                <div className="flex flex-col flex-1">
                                                    <span className={`font-bold uppercase text-sm ${task.d ? 'line-through' : ''}`}>{task.t}</span>
                                                    {task.req && !task.d && <span className="text-[10px] font-black uppercase text-gray-400">Dependency: {task.req}</span>}
                                                </div>
                                                {task.alert && !task.d && <span className="bg-[#FF7497] text-white font-black text-[10px] px-2 py-1 rounded uppercase tracking-widest border-2 border-black animate-pulse">Critical</span>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Right Col: Media & Assets */}
                            <div className="w-full xl:w-[400px] flex flex-col gap-6">
                                <div className="bg-white border-[4px] border-black rounded-2xl p-6 shadow-[6px_6px_0px_0px_black] h-full">
                                    <h4 className="font-black uppercase text-xl border-b-[3px] border-black pb-2 mb-6">Asset Hub</h4>
                                    
                                    <div className="flex flex-col gap-4">
                                        {/* Cloud Drive Link */}
                                        <div className="border-[3px] border-black rounded-xl overflow-hidden hover:-translate-y-1 hover:shadow-[4px_4px_0px_0px_black] transition-all cursor-pointer">
                                            <div className="bg-[#24D3FF] h-10 border-b-[3px] border-black flex items-center px-4 gap-2">
                                                <HardDrive size={18} strokeWidth={2.5}/>
                                                <span className="font-black uppercase text-xs">Drive Folder</span>
                                            </div>
                                            <div className="p-4 bg-gray-50 flex items-center justify-between">
                                                <span className="font-bold text-sm uppercase">Raw Footage Vault (4K)</span>
                                                <ChevronRight size={20} />
                                            </div>
                                        </div>

                                        {/* Design Assets */}
                                        <div className="border-[3px] border-black rounded-xl overflow-hidden hover:-translate-y-1 hover:shadow-[4px_4px_0px_0px_black] transition-all cursor-pointer">
                                            <div className="bg-[#FFE357] h-10 border-b-[3px] border-black flex items-center px-4 gap-2">
                                                <Package size={18} strokeWidth={2.5}/>
                                                <span className="font-black uppercase text-xs">Packaging Assets</span>
                                            </div>
                                            <div className="p-4 bg-gray-50 flex flex-col gap-2">
                                                <div className="flex items-center justify-between">
                                                    <span className="font-bold text-sm uppercase">Thumb_A_Final.psd</span>
                                                    <span className="text-[10px] bg-[#C9F830] border-2 border-black px-1 rounded font-black">Approved</span>
                                                </div>
                                                <div className="flex items-center justify-between">
                                                    <span className="font-bold text-sm uppercase">Sponsor_Brief.pdf</span>
                                                    <span className="text-[10px] bg-[#FF7497] border-2 border-black text-white px-1 rounded font-black">Missing</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Sub-Automation Trigger Box */}
                                    <div className="mt-8 bg-black text-white p-4 rounded-xl border-[4px] border-black shadow-[inset_0px_0px_0px_3px_#FFE357]">
                                        <h5 className="font-black uppercase text-sm mb-2 text-[#FFE357]">Automated Triggers</h5>
                                        <p className="font-bold text-xs opacity-70 mb-4 tracking-wide leading-relaxed">
                                            Once marked 'Published', this pipeline will automatically ping the <strong>Community Poll Crafter</strong> widget to prep a follow-up post.
                                        </p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </ToolboxModule>

                </div>
            )
        };

        const App = () => (
            <div className="pb-20">
                <ProjectPipeline />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
