<style>
  /* The container for the LED segments */
  .glow-bar-horizontal {
    display: flex;
    gap: 4px;
    padding: 6px;
    background: #000; /* Black background like the vertical one */
    border: 3px solid black;
    border-radius: 12px;
    width: 100%;
    height: 40px;
    align-items: center;
  }

  /* Individual LED segments */
  .led-segment {
    flex: 1;
    height: 100%;
    background: #1a1a1a; /* Off state */
    border: 1px solid #333;
    transition: background 0.2s, box-shadow 0.2s;
  }

  /* On state (Lime Green) */
  .led-segment.active {
    background: #CCFF00;
    box-shadow: 0 0 10px #CCFF00;
    border-color: transparent;
  }
</style>
<style>
  /* Reset default appearance */
 .neo-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 16px;
  border-radius: 999px;
  border: 3px solid black;
  outline: none;
  /* This line creates the dynamic purple fill */
  background: linear-gradient(to right, #B28DFF 0%, #B28DFF var(--range-progress, 0%), #f3f4f6 var(--range-progress, 0%), #f3f4f6 100%);
}

/* Ensure your thumb is centered on the thicker track */
.neo-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  height: 14px;
  width: 14px;
  background: #CCFF00;
  border: 3px solid black;
  border-radius: 50%;
  cursor: pointer;
  margin-top: -3px; 
  box-shadow: 2px 2px 0px 0px black;
}
</style>

<script>
  const updateSliders = () => {
    document.querySelectorAll('.neo-slider').forEach(slider => {
      const update = () => {
        // Calculate percentage for the gradient fill
        const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100 + '%';
        slider.style.setProperty('--range-progress', pct);
        
        // Update the text label above the slider
        const label = slider.parentElement.querySelector('.value-label');
        if (label) label.textContent = slider.value;
      };

      slider.addEventListener('input', update);
      update(); // Run once on load
    });
  };
  
  updateSliders();
</script>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Brutalist Vertical Slider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the invisible slider range to make it easier to grab */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 40px;
            width: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-[#f3f4f6] flex items-center justify-center min-h-screen">

    <div class="relative p-6 border-[3px] border-black rounded-xl bg-[#1A1A24] flex flex-col items-center justify-center h-56 shadow-[4px_4px_0px_0px_#FF7497]">
        <div id="label" class="text-[10px] font-black uppercase tracking-widest text-[#FF7497] mb-4 w-full text-center">LVL_40</div>
        
        <div class="relative h-32 w-8 bg-black border-[2px] border-[#24D3FF] flex flex-col-reverse items-center justify-start p-1 gap-1">
            <div id="glow-bar" class="absolute inset-0 bg-[#CCFF00] opacity-20 transition-all origin-bottom" style="transform: scaleY(0.4);"></div>
            
            <div class="step w-full h-2 transition-all"></div>
            <div class="step w-full h-2 transition-all"></div>
            <div class="step w-full h-2 transition-all"></div>
            <div class="step w-full h-2 transition-all"></div>
            <div class="step w-full h-2 transition-all"></div>
            <div class="step w-full h-2 transition-all"></div>
            <div class="step w-full h-2 transition-all"></div>
            <div class="step w-full h-2 transition-all"></div>
            <div class="step w-full h-2 transition-all"></div>
            <div class="step w-full h-2 transition-all"></div>
            
            <input type="range" id="lvl-input" min="0" max="100" step="10" 
                class="absolute inset-0 w-32 h-8 -translate-x-[48px] translate-y-[48px] -rotate-90 appearance-none bg-transparent outline-none cursor-pointer opacity-0" 
                value="40">
        </div>
    </div>

    <script>
        const input = document.getElementById('lvl-input');
        const steps = document.querySelectorAll('.step');
        const glow = document.getElementById('glow-bar');
        const label = document.getElementById('label');

        function updateSlider(val) {
            const level = val / 10;
            label.innerText = `LVL_${val}`;
            glow.style.transform = `scaleY(${val / 100})`;

            steps.forEach((step, index) => {
                if (index < level) {
                    // Active Styles
                    step.classList.remove('bg-[#1A1A24]', 'border', 'border-[#24D3FF]/30');
                    step.classList.add('bg-[#CCFF00]', 'shadow-[0_0_8px_#CCFF00]');
                } else {
                    // Inactive Styles
                    step.classList.add('bg-[#1A1A24]', 'border', 'border-[#24D3FF]/30');
                    step.classList.remove('bg-[#CCFF00]', 'shadow-[0_0_8px_#CCFF00]');
                }
            });
        }

        // Trigger on change
        input.addEventListener('input', (e) => updateSlider(e.target.value));
        
        // Initial call to set the 40% state
        updateSlider(40);
    </script>
</body>
