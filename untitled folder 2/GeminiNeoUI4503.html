
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewTube Studio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map for React and Lucide Icons -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0"
            }
        }
    </script>
</head>
<body class="bg-[#E5E5E5] text-black">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from "react";
        import { createRoot } from "react-dom/client";
        import {
          Activity,
          BarChart3,
          Bell,
          Check,
          ChevronDown,
          Circle,
          Clock,
          Code,
          Eye,
          EyeOff,
          Filter,
          Layers,
          Layout,
          Maximize2,
          Minimize2,
          MonitorPlay,
          Play,
          Pause,
          Settings,
          ShieldAlert,
          SlidersHorizontal,
          Square,
          Terminal,
          ToggleLeft,
          ToggleRight,
          TrendingUp,
          X,
          Zap,
        } from "lucide-react";

        // --- CONFIGURATION ---
        const CONFIG = {
          gap: 24,
          padding: 24,
          stroke: 4,
          radius: 16,
          baseHeight: 60,
          scaffoldStroke: 6,
        };

        const COLORS = {
          yellow: "#FFE357",
          pink: "#FF7497",
          blue: "#24D3FF",
          lime: "#CCFF00",
          orange: "#FCAF57",
          purple: "#B28DFF",
          dark: "#1A1A24",
          light: "#FFFFFF",
          gray: "#f3f4f6",
        };

        // --- CORE STRUCTURAL COMPONENTS ---

        const AnimatedToggle = ({ open, size = 32 }) => (
          <div
            className="relative group flex items-center justify-center shrink-0 cursor-pointer bg-white border-[3px] border-black rounded-lg shadow-[2px_2px_0px_0px_black] active:translate-y-[2px] active:shadow-[0px_0px_0px_0px_black] transition-all"
            style={{ width: size, height: size }}
          >
            {open ? (
              <Minimize2 size={size * 0.6} strokeWidth={3} className="text-black" />
            ) : (
              <Maximize2 size={size * 0.6} strokeWidth={3} className="text-black" />
            )}
          </div>
        );

        const MainToolbox = ({ title, icon: Icon, themeColor, children, defaultOpen = true }) => {
          const [isOpen, setIsOpen] = useState(defaultOpen);

          return (
            <div
              className="w-full bg-white flex flex-col overflow-hidden relative shadow-[12px_12px_0px_0px_rgba(0,0,0,0.8)] transition-all mb-12"
              style={{
                border: `${CONFIG.scaffoldStroke}px solid black`,
                borderRadius: `${CONFIG.radius}px`,
              }}
            >
              <header
                onClick={() => setIsOpen(!isOpen)}
                className="h-[80px] min-h-[80px] flex items-center justify-between select-none z-30 relative cursor-pointer transition-[margin] duration-500"
                style={{
                  backgroundColor: themeColor,
                  borderBottom: isOpen ? `${CONFIG.scaffoldStroke}px solid black` : "0px",
                }}
              >
                <div className="flex items-center h-full flex-1">
                  <div
                    className="h-full w-[80px] flex items-center justify-center shrink-0 bg-white"
                    style={{ borderRight: `${CONFIG.scaffoldStroke}px solid black` }}
                  >
                    <Icon size={40} strokeWidth={2.5} className="text-black" />
                  </div>
                  <h2 className="text-[32px] sm:text-[40px] md:text-[50px] font-[1000] uppercase tracking-tighter leading-none pl-6 truncate text-black">
                    {title}
                  </h2>
                </div>
                <div className="flex items-center gap-3 pr-6 h-full">
                  <AnimatedToggle open={isOpen} size={44} />
                </div>
              </header>

              <div
                className={`grid transition-[grid-template-rows] duration-500 ease-[cubic-bezier(0.4,0,0.2,1)] ${
                  isOpen ? "grid-rows-[1fr]" : "grid-rows-[0fr]"
                }`}
              >
                <div className="overflow-hidden min-h-0 bg-neutral-100 p-4 sm:p-6 lg:p-8 space-y-6">
                  {children}
                </div>
              </div>
            </div>
          );
        };

        const SubToolbox = ({ title, icon: Icon, headerBg, iconBg, children }) => {
          const [isOpen, setIsOpen] = useState(true);

          return (
            <div
              className="w-full bg-white overflow-hidden relative flex flex-col shrink-0 transition-all duration-300 shadow-[6px_6px_0px_0px_black]"
              style={{
                border: `${CONFIG.stroke}px solid black`,
                borderRadius: `${CONFIG.radius}px`,
              }}
            >
              <header
                onClick={() => setIsOpen(!isOpen)}
                className="flex items-center justify-between select-none relative z-20 cursor-pointer h-[56px] min-h-[56px]"
                style={{
                  backgroundColor: headerBg,
                  borderBottom: isOpen ? `${CONFIG.stroke}px solid black` : "0px",
                }}
              >
                <div className="flex items-center h-full flex-1">
                  <div
                    className="h-full w-[56px] flex items-center justify-center shrink-0"
                    style={{
                      backgroundColor: iconBg,
                      borderRight: `${CONFIG.stroke}px solid black`,
                    }}
                  >
                    <Icon size={28} strokeWidth={3} className="text-black" />
                  </div>
                  <div className="flex items-center pl-4 h-full pointer-events-none select-none">
                    <h3 className="font-[900] uppercase tracking-tighter text-black leading-none text-[28px] mt-1">
                      {title}
                    </h3>
                  </div>
                </div>
                <div className="flex items-center gap-2 pr-4 h-full">
                  <AnimatedToggle open={isOpen} size={28} />
                </div>
              </header>

              <div
                className={`grid transition-[grid-template-rows] duration-500 ${
                  isOpen ? "grid-rows-[1fr]" : "grid-rows-[0fr]"
                }`}
              >
                <div className="overflow-hidden min-h-0">
                  <main className="bg-[#f3f4f6] w-full p-4 md:p-6 text-black flex flex-col gap-6">
                    {children}
                  </main>
                </div>
              </div>
            </div>
          );
        };

        const ComponentShowcase = ({ title, layout = "single", children }) => {
          const layoutClasses = {
            single: "grid-cols-1",
            pair: "grid-cols-1 md:grid-cols-2",
            grid: "grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4",
          };

          return (
            <div className="flex flex-col gap-2">
              <div className="h-8 border-[3px] border-black rounded-lg bg-white px-3 inline-flex items-center self-start shadow-[3px_3px_0px_0px_black]">
                <span className="text-[11px] font-black uppercase tracking-widest">{title}</span>
              </div>
              <div className={`grid ${layoutClasses[layout]} gap-6 w-full`}>{children}</div>
            </div>
          );
        };

        const VariantLabel = ({ type }) => {
          const isCreative = type === "Creative";
          return (
            <div
              className={`absolute -top-3 -right-3 px-3 py-1 border-[3px] border-black rounded-full text-[9px] font-black uppercase tracking-widest z-10 shadow-[2px_2px_0px_0px_black] ${
                isCreative ? "bg-[#B28DFF] text-black" : "bg-[#FFE357] text-black"
              }`}
            >
              {type}
            </div>
          );
        };

        // --- UI COMPONENT PACKS ---

        // 1. Interactive Primitives
        const ButtonsPack = () => (
          <ComponentShowcase title="Action Buttons" layout="pair">
            {/* Standard Button */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-white flex items-center justify-center h-32">
              <VariantLabel type="Standard" />
              <button className="h-14 px-8 bg-[#CCFF00] border-[4px] border-black rounded-xl shadow-[6px_6px_0px_0px_black] hover:translate-y-[2px] hover:shadow-[4px_4px_0px_0px_black] active:translate-y-[6px] active:shadow-[0px_0px_0px_0px_black] transition-all flex items-center gap-3">
                <Zap size={24} strokeWidth={3} />
                <span className="text-xl font-[900] uppercase tracking-tighter mt-1">Analyze</span>
              </button>
            </div>
            {/* Creative Button (Tokyo-Pop) */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-[#1A1A24] flex items-center justify-center h-32">
              <VariantLabel type="Creative" />
              <button className="h-14 px-8 bg-transparent border-[3px] border-[#24D3FF] rounded-none shadow-[4px_4px_0px_0px_#FF7497] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_#FF7497] active:translate-y-[4px] active:shadow-[0px_0px_0px_0px_#FF7497] transition-all flex items-center gap-3 relative overflow-hidden group">
                <div className="absolute inset-0 bg-[#FF7497] translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-300 ease-out" />
                <Code size={24} strokeWidth={2.5} className="text-[#CCFF00] relative z-10 group-hover:text-black transition-colors" />
                <span className="text-lg font-[900] uppercase tracking-widest mt-1 text-white relative z-10 group-hover:text-black transition-colors">
                  Execute.EXE
                </span>
              </button>
            </div>
          </ComponentShowcase>
        );

        const SlidersPack = () => (
          <ComponentShowcase title="Range Sliders" layout="pair">
            {/* Standard Slider */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-white flex flex-col justify-center gap-4 h-32">
              <VariantLabel type="Standard" />
              <div className="flex justify-between text-[11px] font-black uppercase">
                <span>Volume</span>
                <span>75%</span>
              </div>
              <div className="relative w-full h-4 bg-gray-200 border-[3px] border-black rounded-full">
                <div className="absolute top-0 left-0 h-full bg-[#FF7497] w-[75%] border-r-[3px] border-black rounded-l-full" />
                <div className="absolute top-1/2 left-[75%] -translate-y-1/2 -translate-x-1/2 w-8 h-8 bg-[#FFE357] border-[4px] border-black rounded-full shadow-[2px_2px_0px_0px_black] cursor-pointer" />
              </div>
            </div>
            {/* Creative Slider (Tokyo-Pop) */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-[#1A1A24] flex flex-col justify-center gap-4 h-32">
              <VariantLabel type="Creative" />
              <div className="flex justify-between text-[10px] font-black uppercase tracking-widest text-[#24D3FF]">
                <span>Intensity_LvL</span>
                <span className="text-[#CCFF00]">MAX</span>
              </div>
              <div className="relative w-full h-3 bg-black border-[2px] border-[#24D3FF] rounded-none">
                <div className="absolute top-0 left-0 h-full bg-[#B28DFF] w-[90%]" />
                <div className="absolute top-1/2 left-[90%] -translate-y-1/2 -translate-x-1/2 w-4 h-10 bg-[#CCFF00] border-[2px] border-black cursor-pointer shadow-[3px_3px_0px_0px_#FF7497]" />
                {/* Decorative tick marks */}
                <div className="absolute -bottom-3 left-0 w-full flex justify-between px-1">
                  {[...Array(10)].map((_, i) => (
                    <div key={i} className="w-[2px] h-1 bg-[#24D3FF] opacity-50" />
                  ))}
                </div>
              </div>
            </div>
          </ComponentShowcase>
        );

        const SelectorsPack = () => (
          <ComponentShowcase title="Segmented Controls" layout="grid">
            {/* Standard Pill Toggle */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-white flex items-center justify-center h-32">
              <VariantLabel type="Standard" />
              <div className="flex bg-[#f3f4f6] border-[4px] border-black rounded-2xl p-1 shadow-[4px_4px_0px_0px_black]">
                <button className="px-6 py-2 bg-[#CCFF00] border-[3px] border-black rounded-xl text-[12px] font-black uppercase shadow-[2px_2px_0px_0px_black]">
                  Public
                </button>
                <button className="px-6 py-2 text-black/50 text-[12px] font-black uppercase hover:text-black transition-colors">
                  Private
                </button>
              </div>
            </div>
            {/* Creative Pill Toggle (Compact Dark) */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-[#1A1A24] flex items-center justify-center h-32">
              <VariantLabel type="Creative" />
              <div className="flex border-[2px] border-[#FF7497] bg-black p-1 shadow-[4px_4px_0px_0px_#24D3FF]">
                <button className="px-5 py-2 bg-transparent text-[#24D3FF] text-[10px] font-black uppercase tracking-widest border border-transparent">
                  BETA
                </button>
                <button className="px-5 py-2 bg-[#FF7497] text-black text-[10px] font-black uppercase tracking-widest border-[2px] border-black shadow-[2px_2px_0px_0px_#CCFF00]">
                  STABLE
                </button>
              </div>
            </div>
            {/* Standard Checkbox */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-white flex items-center justify-center h-32">
              <div className="flex items-center gap-4">
                <div className="w-10 h-10 border-[4px] border-black rounded-xl bg-[#FFE357] shadow-[3px_3px_0px_0px_black] flex items-center justify-center">
                  <Check size={24} strokeWidth={4} className="text-black" />
                </div>
                <span className="text-lg font-black uppercase">Auto-Sync</span>
              </div>
            </div>
            {/* Creative Switch */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-[#1A1A24] flex items-center justify-center h-32">
              <div className="flex items-center gap-4">
                <div className="w-16 h-8 border-[2px] border-[#24D3FF] rounded-full bg-black relative shadow-[0_0_10px_rgba(36,211,255,0.5)] cursor-pointer">
                  <div className="absolute top-1/2 -translate-y-1/2 right-1 w-6 h-6 bg-[#CCFF00] rounded-full shadow-[0_0_8px_#CCFF00]" />
                </div>
                <span className="text-[12px] font-black uppercase tracking-widest text-[#24D3FF]">
                  SYS_ON
                </span>
              </div>
            </div>
          </ComponentShowcase>
        );

        const InputsPack = () => (
          <ComponentShowcase title="Complex Inputs (OTP & Password)" layout="pair">
            {/* Standard OTP */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-white flex flex-col justify-center gap-3 h-40">
              <VariantLabel type="Standard" />
              <span className="text-[10px] font-black uppercase">Auth Code</span>
              <div className="flex gap-2">
                {[4, 8, 1, 5].map((num, i) => (
                  <div
                    key={i}
                    className="w-12 h-14 border-[3px] border-black rounded-xl bg-[#f3f4f6] flex items-center justify-center text-2xl font-black shadow-[3px_3px_0px_0px_black]"
                  >
                    {num}
                  </div>
                ))}
              </div>
            </div>
            {/* Creative Password */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-[#1A1A24] flex flex-col justify-center gap-3 h-40">
              <VariantLabel type="Creative" />
              <span className="text-[10px] font-black uppercase tracking-widest text-[#B28DFF]">
                Override_Key
              </span>
              <div className="relative">
                <input
                  type="password"
                  defaultValue="supersecret"
                  className="w-full h-12 bg-black border-[2px] border-[#FF7497] text-[#CCFF00] font-mono text-lg px-4 outline-none focus:shadow-[0_0_15px_rgba(255,116,151,0.5)]"
                />
                <button className="absolute right-2 top-1/2 -translate-y-1/2 p-1 text-[#FF7497] hover:text-[#24D3FF] transition-colors">
                  <Eye size={20} strokeWidth={2.5} />
                </button>
              </div>
            </div>
          </ComponentShowcase>
        );

        // 2. Data Visualization
        const ChartsPack = () => (
          <ComponentShowcase title="Trend Charts" layout="pair">
            {/* Standard Bar Chart */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-white h-56 flex flex-col justify-end gap-1">
              <VariantLabel type="Standard" />
              <div className="flex justify-between items-end h-32 gap-2 border-b-[4px] border-black pb-2">
                {[40, 70, 45, 90, 60, 80].map((h, i) => (
                  <div key={i} className="flex-1 flex justify-center group relative">
                    <div
                      className={`w-full max-w-[24px] border-[3px] border-black rounded-t-lg transition-all group-hover:bg-[#FF7497] ${
                        i % 2 === 0 ? "bg-[#24D3FF]" : "bg-[#FFE357]"
                      }`}
                      style={{ height: `${h}%` }}
                    />
                  </div>
                ))}
              </div>
              <div className="flex justify-between text-[9px] font-black uppercase mt-2 opacity-60">
                <span>Mon</span>
                <span>Tue</span>
                <span>Wed</span>
                <span>Thu</span>
                <span>Fri</span>
                <span>Sat</span>
              </div>
            </div>
            {/* Creative Line/Area Chart */}
            <div className="relative p-6 border-[3px] border-black rounded-xl bg-[#1A1A24] h-56 flex flex-col justify-end overflow-hidden">
              <VariantLabel type="Creative" />
              <div className="absolute inset-0 opacity-20 pointer-events-none" 
                   style={{ backgroundImage: 'linear-gradient(#24D3FF 1px, transparent 1px), linear-gradient(90deg, #24D3FF 1px, transparent 1px)', backgroundSize: '20px 20px' }} />
              <div className="relative h-32 w-full flex items-end">
                {/* Faux area chart using SVG */}
                <svg viewBox="0 0 100 50" className="w-full h-full preserve-3d" preserveAspectRatio="none">
                  <path
                    d="M0,50 L0,30 L20,40 L40,10 L60,25 L80,5 L100,20 L100,50 Z"
                    fill="rgba(204, 255, 0, 0.2)"
                    stroke="#CCFF00"
                    strokeWidth="2"
                    vectorEffect="non-scaling-stroke"
                  />
                </svg>
              </div>
              <div className="relative flex justify-between text-[8px] font-black uppercase tracking-widest text-[#B28DFF] mt-3">
                <span>T-01</span>
                <span>T-02</span>
                <span>T-03</span>
                <span>T-04</span>
              </div>
            </div>
          </ComponentShowcase>
        );

        const MetricsPack = () => (
          <ComponentShowcase title="Metric Cards" layout="grid">
            {/* Standard Metric */}
            <div className="relative p-5 border-[3px] border-black rounded-xl bg-[#FFE357] shadow-[6px_6px_0px_0px_black] h-32 flex flex-col justify-between">
              <VariantLabel type="Standard" />
              <div className="flex justify-between items-start">
                <span className="text-[11px] font-black uppercase bg-black text-white px-2 py-1 rounded-md">
                  Views
                </span>
                <TrendingUp size={20} className="text-black" strokeWidth={3} />
              </div>
              <div>
                <div className="text-4xl font-[1000] tracking-tighter leading-none">1.2M</div>
                <div className="text-[10px] font-black uppercase mt-1 opacity-70">+14% this week</div>
              </div>
            </div>
            {/* Creative Metric */}
            <div className="relative p-5 border-[3px] border-[#24D3FF] bg-black shadow-[4px_4px_0px_0px_#B28DFF] h-32 flex flex-col justify-between">
              <VariantLabel type="Creative" />
              <div className="flex justify-between items-start">
                <span className="text-[9px] font-black uppercase tracking-widest text-[#B28DFF]">
                  SYS_LOAD
                </span>
                <Activity size={18} className="text-[#FF7497]" strokeWidth={3} />
              </div>
              <div className="flex items-end gap-3">
                <div className="text-5xl font-[1000] tracking-tighter leading-none text-[#CCFF00]">
                  98<span className="text-2xl">%</span>
                </div>
                <div className="h-6 flex items-end gap-1 mb-1">
                  {[2, 4, 3, 5, 4].map((h, i) => (
                    <div key={i} className="w-1.5 bg-[#FF7497]" style={{ height: `${h * 4}px` }} />
                  ))}
                </div>
              </div>
            </div>
          </ComponentShowcase>
        );

        const TablesPack = () => (
          <ComponentShowcase title="Data Matrices" layout="single">
            {/* Split View Table wrapper to show both */}
            <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
              {/* Standard Table */}
              <div className="relative border-[3px] border-black rounded-xl bg-white overflow-hidden shadow-[6px_6px_0px_0px_black]">
                <VariantLabel type="Standard" />
                <div className="h-10 bg-[#f3f4f6] border-b-[3px] border-black grid grid-cols-4 items-center px-4 text-[10px] font-black uppercase">
                  <span className="col-span-2">Content Title</span>
                  <span>Status</span>
                  <span className="text-right">Score</span>
                </div>
                <div className="divide-y-[3px] divide-black">
                  {[
                    { t: "Summer Vlog 24", s: "Live", c: "#CCFF00", sc: "98" },
                    { t: "Tech Review: X1", s: "Draft", c: "#f3f4f6", sc: "--" },
                    { t: "Podcast Ep. 12", s: "Live", c: "#CCFF00", sc: "85" },
                  ].map((row, i) => (
                    <div key={i} className="h-12 grid grid-cols-4 items-center px-4 text-xs font-bold hover:bg-gray-50">
                      <span className="col-span-2 truncate pr-4">{row.t}</span>
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 border-[2px] border-black rounded-full" style={{ backgroundColor: row.c }} />
                        <span className="text-[10px] uppercase font-black">{row.s}</span>
                      </div>
                      <span className="text-right font-black">{row.sc}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Creative Table */}
              <div className="relative border-[3px] border-[#24D3FF] bg-[#1A1A24] overflow-hidden shadow-[6px_6px_0px_0px_#24D3FF]">
                <VariantLabel type="Creative" />
                <div className="h-8 bg-[#24D3FF] border-b-[3px] border-black grid grid-cols-4 items-center px-4 text-[9px] font-black uppercase tracking-widest text-black">
                  <span className="col-span-2">NODE_ID</span>
                  <span>STATE</span>
                  <span className="text-right">PING</span>
                </div>
                <div className="divide-y-[1px] divide-[#24D3FF]/30 font-mono">
                  {[
                    { id: "ND-0X1A", st: "SYNC", p: "12ms", c: "#CCFF00" },
                    { id: "ND-0X1B", st: "FAIL", p: "ERR", c: "#FF7497" },
                    { id: "ND-0X1C", st: "SYNC", p: "18ms", c: "#CCFF00" },
                  ].map((row, i) => (
                    <div key={i} className="h-10 grid grid-cols-4 items-center px-4 text-[11px] text-white hover:bg-white/5">
                      <span className="col-span-2 text-[#B28DFF]">{row.id}</span>
                      <span style={{ color: row.c }} className="uppercase font-bold tracking-widest">{row.st}</span>
                      <span className="text-right text-[#24D3FF]">{row.p}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </ComponentShowcase>
        );

        // 3. Layouts & Ops
        const FeedbackPack = () => (
          <ComponentShowcase title="Alert Banners" layout="pair">
            {/* Standard Alert */}
            <div className="relative p-4 border-[3px] border-black rounded-xl bg-[#FFE357] shadow-[4px_4px_0px_0px_black] flex items-start gap-3">
              <VariantLabel type="Standard" />
              <div className="mt-1">
                <Bell size={20} strokeWidth={3} className="text-black" />
              </div>
              <div>
                <h4 className="text-[14px] font-[900] uppercase tracking-tighter">Action Required</h4>
