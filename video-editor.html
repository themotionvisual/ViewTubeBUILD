<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViewTube | SHORTS STUDIO PRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #E5E7EB;
      --fg: #000000;
      --primary: #FF3399;
      --secondary: #CCFF00;
      --accent: #00E5FF;
      --black: #000000;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      padding: 16px 24px;
      border-bottom: 4px solid var(--black);
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-box {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border: 4px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 0 0 var(--black);
    }
    .logo-text {
      font-weight: 900;
      font-size: 24px;
      text-transform: uppercase;
      letter-spacing: -1px;
    }
    
    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
      border-bottom: 4px solid var(--black);
    }
    
    .nav-rail {
      width: 80px;
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      gap: 20px;
    }
    .nav-item {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.1);
      border: 3px solid transparent;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: all 0.2s;
    }
    .nav-item.active {
      background: var(--secondary);
      color: var(--black);
      border-color: var(--black);
      box-shadow: 4px 4px 0 0 var(--primary);
    }
    
    .panel {
      width: 350px;
      background: #fff;
      border-right: 4px solid var(--black);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel-header {
      padding: 16px 20px;
      border-bottom: 3px solid var(--black);
      background: var(--accent);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .preview-area {
      flex: 1;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }
    .canvas {
      width: 320px;
      height: 568px; /* 9:16 */
      background: var(--black);
      border: 6px solid var(--black);
      box-shadow: 15px 15px 0 0 rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
    }
    .canvas img { width: 100%; height: 100%; object-cover: cover; }
    .canvas-text {
      position: absolute;
      width: 100%;
      top: 30%;
      text-align: center;
      color: #fff;
      font-weight: 900;
      font-size: 48px;
      text-transform: uppercase;
      text-shadow: 4px 4px 0 #000;
    }
    
    .timeline {
      height: 35% ;
      min-height: 250px;
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    .timeline-header {
      height: 48px;
      border-bottom: 3px solid var(--black);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 20px;
      background: #f9fafb;
    }
    .transport-btn {
      width: 36px;
      height: 36px;
      background: #fff;
      border: 3px solid var(--black);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 2px 2px 0 0 var(--black);
    }
    .play-btn { background: var(--primary); }
    
    .track-area {
      flex: 1;
      overflow: auto;
      display: flex;
    }
    .layer-headers {
      width: 180px;
      border-right: 4px solid var(--black);
      background: #fff;
      z-index: 10;
    }
    .layer-header {
      height: 48px;
      border-bottom: 2px solid #ddd;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 11px;
    }
    .layer-header.active { background: var(--secondary); border-bottom-color: var(--black); }
    
    .track-container {
      flex: 1;
      background: #eee;
      position: relative;
      background-image: linear-gradient(#ccc 1px, transparent 1px), linear-gradient(90deg, #ccc 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .clip {
      position: absolute;
      height: 32px;
      top: 8px;
      border: 3px solid var(--black);
      border-radius: 6px;
      background: #fff;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-weight: 900;
      font-size: 10px;
      box-shadow: 2px 2px 0 0 var(--black);
      cursor: grab;
    }
    .clip.active { border-color: var(--accent); background: var(--accent); }

    .brutal-btn {
      padding: 12px;
      border: 3px solid var(--black);
      border-radius: 12px;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      box-shadow: 4px 4px 0 0 var(--black);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .brutal-btn:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 0 var(--black); }
    .brutal-textarea {
      width: 100%;
      height: 120px;
      border: 3px solid var(--black);
      border-radius: 16px;
      padding: 15px;
      font-family: inherit;
      font-weight: 700;
      font-size: 14px;
      resize: none;
      outline: none;
      box-shadow: 4px 4px 0 0 var(--black);
    }
    
    .playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--primary);
      z-index: 50;
      left: 42%;
      pointer-events: none;
    }
    .playhead-marker {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      background: var(--primary);
      border: 2px solid var(--black);
      clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
    }

    .back-btn {
      text-decoration: none;
      color: var(--black);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 12px;
      padding: 10px 18px;
      border: 3px solid var(--black);
      border-radius: 12px;
      background: #fff;
      box-shadow: 3px 3px 0 0 var(--black);
      transition: all 0.2s;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-box"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <div class="logo-text">Shorts Studio <span style="color:var(--primary)">Pro</span></div>
    </div>
    
    <div style="display:flex; gap:15px;">
      <a href="widget-preview.html" class="back-btn">Dashboard</a>
      <button class="brutal-btn" style="background:var(--secondary); min-width:120px; box-shadow:3px 3px 0 0 var(--black);">Export 4K</button>
    </div>
  </header>

  <div class="workspace">
    <div class="nav-rail">
      <div class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg></div>
      <div class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20"/><path d="m17 5-5 5-5-5"/><path d="m17 14-5 5-5-5"/></svg></div>
      <div class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 12h10"/><path d="M12 7v10"/></svg></div>
    </div>
    
    <div class="panel">
      <div class="panel-header"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21"/></svg> AI Director</div>
      <div style="padding:20px; display:flex; flex-direction:column; gap:20px;">
        <div>
          <label style="font-weight:900; font-size:11px; text-transform:uppercase; margin-bottom:8px; display:block; opacity:0.6;">Scene Prompt</label>
          <textarea class="brutal-textarea" placeholder="E.g. A neon cyberpunk street with flying cars, add glitched text saying 'CYBER GEN'"></textarea>
        </div>
        <button class="brutal-btn" style="background:var(--black); color:#fff; border-color:var(--black); box-shadow:4px 4px 0 0 var(--primary);">Synthesize Assets</button>
        <div style="height:2px; background:var(--black); opacity:0.1; margin:10px 0;"></div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <button class="brutal-btn" style="justify-content:flex-start; font-size:10px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg> Auto-Captions</button>
          <button class="brutal-btn" style="justify-content:flex-start; font-size:10px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg> Smart Focus</button>
        </div>
      </div>
    </div>
    
    <div class="preview-area">
      <div style="position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.8); color:var(--accent); padding:4px 10px; border-radius:4px; font-weight:900; font-family:monospace; border:1px solid var(--accent);">9:16 VERTICAL</div>
      <div class="canvas">
        <img src="https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1000&auto=format&fit=crop" alt="preview">
        <div class="canvas-text">LEVEL UP</div>
      </div>
      
      <div style="position:absolute; bottom:40px; right:40px; display:flex; flex-direction:column; gap:15px;">
        <div class="brutal-btn" style="width:50px; height:50px; padding:0; border-radius:50%;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg></div>
        <div class="brutal-btn" style="width:50px; height:50px; padding:0; border-radius:50%;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 12h18"/><path d="M12 3v18"/></svg></div>
      </div>
    </div>
  </div>

  <div class="timeline">
    <div class="timeline-header">
      <div style="display:flex; gap:8px;">
        <div class="transport-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polygon points="11 19 2 12 11 5 11 19"/><polygon points="22 19 13 12 22 5 22 19"/></svg></div>
        <div class="transport-btn play-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="#fff" stroke="#fff" stroke-width="3"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
        <div class="transport-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/></svg></div>
      </div>
      <div style="background:var(--black); color:var(--secondary); padding:4px 12px; font-family:monospace; font-weight:900; border-radius:6px; font-size:18px; border:2px solid var(--black);">00:04.12 <span style="font-size:10px; opacity:0.5;">/ 00:15.00</span></div>
      <div style="flex:1;"></div>
      <div style="display:flex; gap:10px; align-items:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M15 6a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M20.4 18.9c.2.5-.1 1.1-.6 1.3l-1.9.7c-.5.2-1.1-.1-1.3-.6L15 18M15 6l1.6-4.3c.2-.5.8-.8 1.3-.6l1.9.7c.5.2.8.8.6 1.3L18.8 7.4"/></svg>
        <input type="range" style="width:100px; accent-color:var(--black);">
      </div>
    </div>
    
    <div class="track-area">
      <div class="layer-headers">
        <div class="layer-header active"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> BG Scene</div>
        <div class="layer-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg> HUD Text</div>
        <div class="layer-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg> Voice AI</div>
        <div class="layer-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg> Beats</div>
      </div>
      
      <div class="track-container">
        <div class="playhead"><div class="playhead-marker"></div></div>
        
        <!-- Track 1 Clips -->
        <div style="position:relative; height:48px;">
          <div class="clip active" style="left:0; width:65%;">Cyber_City_Scene_01.img</div>
          <div class="clip" style="left:65.5%; width:34.5%;">Space_Transition.img</div>
        </div>
        <!-- Track 2 Clips -->
        <div style="position:relative; height:48px;">
          <div class="clip" style="left:15%; width:40%; background:var(--accent);">LEVEL UP (Glitched)</div>
        </div>
        <!-- Track 3 Clips -->
        <div style="position:relative; height:48px;">
          <div class="clip" style="left:0; width:100%; opacity:0.6;">Synthesized_Voiceover_EN.wav</div>
        </div>
        <!-- Track 4 Clips -->
        <div style="position:relative; height:48px;">
          <div class="clip" style="left:0; width:100%; background:var(--secondary);">Phonk_Aggressive_128bpm.mp3</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
