      const sideCount = Math.max(3, Math.round(Number(sides) || 3));
      const inner = clamp(Number(innerRatio) || 0, 0, 0.95);
      const star = inner > 0.001;
      const total = star ? sideCount * 2 : sideCount;
      const step = (Math.PI * 2) / total;
      const pts = [];
      for (let i = 0; i < total; i += 1) {
        const rr = star && (i % 2 === 1) ? (r * inner) : r;
        const a = -Math.PI / 2 + (i * step);
        pts.push([cx + (Math.cos(a) * rr), cy + (Math.sin(a) * rr)]);
      }
      return pts;

    const SpringToggle = ({ label, value, min, max, step = 1, onChange, onAddCircle = () => {}, onReset = () => {}, showCircle = true, speed = 1, absolute = false, kfState = 'none', compact = false }) => {
      const trackRef = useRef(null);
      const [dragging, setDragging] = useState(false);
      const tapRef = useRef({ count: 0, ts: 0 });
      const [thumbPos, setThumbPos] = useState(50);
      const dragMetaRef = useRef({ left: 0, width: 1 });
      const dragStartRef = useRef({ x: 0, value: 0, width: 1 });
      const posRef = useRef(50);
      const velRef = useRef(0);
      const valueRef = useRef(Number(value) || 0);
      const lastEmitRef = useRef(Number(value) || 0);
      const rafRef = useRef(null);

      useEffect(() => { 
        valueRef.current = Number(value) || 0; 
        lastEmitRef.current = Number(value) || 0;
      }, [value]);

      const setAbsoluteFromDeltaX = (clientX) => {
        const width = Math.max(1, dragStartRef.current.width || 1);
        const deltaRatio = (clientX - dragStartRef.current.x) / width;
        const raw = dragStartRef.current.value + (deltaRatio * (max - min));
        const snapped = Math.round(raw / step) * step;
        const next = clamp(snapped, min, max);
        const ratio = (next - min) / Math.max(0.0001, (max - min));
        posRef.current = clamp(ratio * 100, 0, 100);
        setThumbPos(posRef.current);
        if (Math.abs(next - valueRef.current) > Math.max(step * 0.25, 0.0001)) {
          valueRef.current = next;
          onChange(next);
        }
      };

      const setFromClientX = (clientX, pointerDown = false) => {
        const { left, width } = dragMetaRef.current;
        const raw = clamp(((clientX - left) / Math.max(1, width)) * 100, 0, 100);
        posRef.current = raw;
        setThumbPos(raw);
        if (absolute) {
          const n = min + ((raw / 100) * Math.max(0.0001, (max - min)));
          const clampedBase = clamp(Math.round(n / step) * step, min, max);
          dragStartRef.current = {
            x: clientX,
            value: clampedBase,
            width: Math.max(1, width)
          };
          if (pointerDown || Math.abs(clampedBase - valueRef.current) > Math.max(step * 0.25, 0.0001)) {
            valueRef.current = clampedBase;
            onChange(clampedBase);
          }
        }
      };

      useEffect(() => {
        const tick = () => {
          if (absolute) {
            if (!dragging) {
              const ratio = clamp((valueRef.current - min) / Math.max(0.0001, (max - min)), 0, 1);
              posRef.current = ratio * 100;
              setThumbPos(posRef.current);
            }
          } else if (dragging) {
              const displacement = (posRef.current - 50) / 50;
              if (Math.abs(displacement) > 0.001) {
              const accel = 1 + (Math.abs(displacement) * 2.5);
              const delta = Math.sign(displacement) * (max - min) * 0.00065 * accel * speed;
                const next = clamp(valueRef.current + delta, min, max);
                valueRef.current = next;
              const snapped = Math.round(next / step) * step;
              const clamped = clamp(snapped, min, max);
              if (Math.abs(clamped - lastEmitRef.current) >= Math.max(step * 0.25, 0.0001)) {
                lastEmitRef.current = clamped;
                onChange(clamped);
              }
            }
          } else {
            const force = (50 - posRef.current) * 0.22;
            velRef.current = (velRef.current + force) * 0.68;
            posRef.current += velRef.current;
            if (Math.abs(50 - posRef.current) < 0.15 && Math.abs(velRef.current) < 0.08) {
              posRef.current = 50;
              velRef.current = 0;
            }
            setThumbPos(posRef.current);
          }
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
      }, [absolute, dragging, max, min, onChange, speed, step]);

        window.addEventListener('pointerup', onUp);

          window.removeEventListener('pointerup', onUp);
        };
      }, [absolute, dragging]);

      const pasteKeyframeAtPlayhead = () => {
        if (!selectedClip || !keyframeClipboard) return;
        const offsetSec = clipAbsToLocal(selectedClip, playhead);
        setProject((prev) => ({
          ...prev,
          clips: prev.clips.map((clip) => {
            if (clip.id !== selectedClip.id) return clip;
            const filtered = (clip.keyframes || []).filter((kf) => Math.abs(kf.offsetSec - offsetSec) > 0.03);
            const next = makeKeyframe(offsetSec, clone(keyframeClipboard.values || {}), keyframeClipboard.mode || 'diamond');
            return { ...clip, keyframes: [...filtered, next].sort((a, b) => a.offsetSec - b.offsetSec) };
          })
        }));
      };

      const addLayerWithClip = (type) => {
        setProject((prev) => {
          const tracks = [...prev.tracks].sort((a, b) => a.order - b.order);
          const visualTracks = tracks.filter((t) => t.kind !== AUDIO_TRACK_KIND);
          const audioTrack = tracks.find((t) => t.kind === AUDIO_TRACK_KIND);
          const targetTrack = (type === 'audio' ? audioTrack : visualTracks[0]) || tracks[0];
          const resolvedType = (type === 'image' || type === 'video') ? 'media' : type;
          const layer = createLayer(resolvedType, targetTrack.id, prev.layers.length);
          if (type === 'image') layer.payload.layerName = `IMAGE_${prev.layers.length + 1}`;
          if (type === 'video') layer.payload.layerName = `VIDEO_${prev.layers.length + 1}`;
          if (type === 'shape') {
            layer.payload.shape = 'rect';
            layer.payload.shapeNeedsChoice = true;
            layer.payload.shapeLocked = false;
          }
          if (type === 'audio') {
            layer.payload.layerName = `AUDIO_${prev.layers.length + 1}`;
            layer.payload.fillColor = COLORS.blue;
            layer.payload.strokeWidth = 0;
            layer.payload.audioSrcType = 'file';
          }
          const len = 4;
          const start = nearestFreeStart(prev.clips, targetTrack.id, playhead, len, null);
          const end = start + len;
          const color = type === 'text' ? COLORS.magenta : type === 'shape' ? COLORS.yellow : type === 'image' ? COLORS.blue : type === 'audio' ? COLORS.blue : COLORS.cyan;
          const clip = createClip(targetTrack.id, layer.id, start, end, color);
          const maxEnd = Math.max(prev.meta.durationSec, end + 1);
          return {
            ...prev,
            meta: { ...prev.meta, durationSec: maxEnd },
            layers: [...prev.layers, layer],
            clips: [...prev.clips, clip]
          };
        });
      };

      const addTemplateToTimeline = () => {
        setProject((prev) => {
          const tracks = [...prev.tracks].sort((a, b) => a.order - b.order);
          const visualTracks = tracks.filter((t) => t.kind !== AUDIO_TRACK_KIND);
          const targetTrack = visualTracks[0] || tracks[0];
          const preset = {
            id: uid('tpl'),
            title: tplCreatorPrimary || 'TEMPLATE',
            primary: tplCreatorPrimary || 'TEMPLATE',
            secondary: tplCreatorSecondary,
            color: tplCreatorColor,
            style: tplCreatorStyle,
            icon: tplCreatorIcon
          };
          const asset = motionAssetFromPreset(preset);
          const templateLayer = createLayer('template', targetTrack.id, prev.layers.length);
          templateLayer.payload.layerName = String(preset.title || 'TEMPLATE').toUpperCase();
          templateLayer.payload.fillColor = asset.color;
          templateLayer.payload.strokeColor = COLORS.black;
          templateLayer.payload.strokeWidth = 2;
          templateLayer.payload.motionAsset = asset;
          templateLayer.payload.templateBundleId = `tpl_bundle_${templateIdSafe(preset.id)}_${prev.layers.length}`;
          templateLayer.payload.templateNodes = buildTemplateNodesForStyle(asset);
          templateLayer.payload.x = asset.posX;
          templateLayer.payload.y = asset.posY;
          templateLayer.payload.scale = asset.scale;
          templateLayer.payload.text = asset.primary;
          templateLayer.payload.width = 960;
          templateLayer.payload.height = 540;
          const len = 5;
          const start = nearestFreeStart(prev.clips, targetTrack.id, playhead, len, null);
          const end = start + len;
          const clip = createClip(targetTrack.id, templateLayer.id, start, end, asset.color);
          clip.isTemplateCompound = true;
          clip.templateBundleId = templateLayer.payload.templateBundleId;
          const matchedPreset = INTRO_PRESETS.find(p => p.name === asset.animation) || INTRO_PRESETS[0];
          clip.introAnimationId = matchedPreset.id;
          clip.introDurationSec = 1;
          clip.introLevel = 1;
          clip.keyframes = [
            makeKeyframe(0, { x: asset.posX, y: asset.posY, scale: asset.scale, rotation: 0, opacity: 1 }, 'diamond'),
            makeKeyframe(1, { x: asset.posX, y: asset.posY, scale: asset.scale, rotation: 0, opacity: 1 }, 'diamond'),
            makeKeyframe(2, { x: asset.posX, y: asset.posY, scale: asset.scale, rotation: 0, opacity: 1 }, 'diamond'),
            makeKeyframe(4, { x: asset.posX, y: asset.posY, scale: asset.scale, rotation: 0, opacity: 1 }, 'diamond'),
            makeKeyframe(5, { x: asset.posX, y: asset.posY, scale: asset.scale, rotation: 0, opacity: 0 }, 'diamond')
          ];
          setSelectedLayerId(templateLayer.id);
          setSelectedClipId(clip.id);
          setSelectedClipIds([clip.id]);
          return {
            ...prev,
            meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, end + 1) },
            layers: [...prev.layers, templateLayer],
            clips: [...prev.clips, clip]
          };
        });
        setShowTemplateCreator(false);
        setTplCreatorStep(1);
      };

      const openTemplateCreator = () => {
        setTplCreatorStep(1);
        setTplCreatorStyle('neo-brutalist');
        setTplCreatorIcon('sparkles');
        setTplCreatorPrimary('');
        setTplCreatorSecondary('');
        setTplCreatorColor('#40C6E9');
        setShowTemplateCreator(true);
      };

      const selectTemplateCombo = (combo) => {
        setTplCreatorPrimary(combo.primary);
        setTplCreatorSecondary(combo.secondary);
        setTplCreatorIcon(combo.icon);
        if (combo.id === 'combo_custom') {
          setTplCreatorPrimary('');
          setTplCreatorSecondary('');
          setTplCreatorIcon('sparkles');
        }
        setTplCreatorStep(2);
      };

      const chooseShapeType = (layerId, shapeType) => {
        const nextShape = shapeType === 'polygon' ? 'polygon' : (shapeType === 'circle' ? 'circle' : 'rect');
        updateLayerPayload(layerId, { shape: nextShape, shapeNeedsChoice: false, shapeLocked: true });
      };

      const removeClipAndLayer = (clipId) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          return {
            ...prev,
            clips: prev.clips.filter((c) => c.id !== clipId),
            layers: prev.layers.filter((l) => l.id !== clip.layerId)
          };
        });
      };

      const duplicateClipAndLayer = (clipId) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          const layer = prev.layers.find((l) => l.id === clip.layerId);
          if (!layer) return prev;
          const len = durationOf(clip);
          const start = nearestFreeStart(prev.clips, clip.trackId, clip.start + 0.25, len, null);
          const end = start + len;
          const newLayerId = uid('layer');
          const newClipId = uid('clip');
          return {
            ...prev,
            layers: [
              ...prev.layers,
              {
                ...clone(layer),
                id: newLayerId,
                payload: {
                  ...clone(layer.payload),
                  layerName: `${layer.payload.layerName || layer.type}_${prev.layers.length + 1}`
                }
              }
            ],
            clips: [
              ...prev.clips,
              {
                ...clone(clip),
                id: newClipId,
                layerId: newLayerId,
                start,
                end,
                keyframes: (clip.keyframes || []).map((kf) => ({ ...clone(kf), id: uid('kf') }))
              }
            ],
            transitions: (prev.transitions || []).filter((t) => t.leftClipId !== clip.id && t.rightClipId !== clip.id),
            meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, end + 1) }
          };
        });
      };

      const removeClipsAndLayers = (clipIds) => {
        const ids = new Set((clipIds || []).filter(Boolean));
        if (!ids.size) return;
        setProject((prev) => {
          const clipsToRemove = prev.clips.filter((c) => ids.has(c.id));
          if (!clipsToRemove.length) return prev;
          const layerIdsToRemove = new Set(clipsToRemove.map((c) => c.layerId));
          const next = {
            ...prev,
            clips: prev.clips.filter((c) => !ids.has(c.id)),
            layers: prev.layers.filter((l) => !layerIdsToRemove.has(l.id)),
            transitions: (prev.transitions || []).filter((t) => !ids.has(t.leftClipId) && !ids.has(t.rightClipId))
          };
          return next;
        });
        setSelectedClipIds((prev) => prev.filter((id) => !ids.has(id)));
        if (selectedClipId && ids.has(selectedClipId)) {
          setSelectedClipId(null);
          setSelectedLayerId(null);
        }
      };

      useEffect(() => {
        setProject((prev) => {
          // Keep unused visual tracks for stable timeline editing; no auto-pruning.
          return prev;
        });
      }, [project.clips]);

      const splitClipAt = (clip, cutTimeAbs, mode) => {
        if (cutTimeAbs <= clip.start || cutTimeAbs >= clip.end) return;

        setProject((prev) => {
          const safeFps = Math.max(1, Number(prev.meta?.fps || 30));
          const baseClip = prev.clips.find((c) => c.id === clip.id);
          if (!baseClip) return prev;
          const normalizedBase = normalizeClipFrameFields(baseClip, safeFps);
          const cutFrameAbs = clamp(secToFrame(cutTimeAbs, safeFps), normalizedBase.startFrame + 1, normalizedBase.startFrame + normalizedBase.durationInFrames - 1);
          const cutOffsetFrame = cutFrameAbs - normalizedBase.startFrame;
          const cutOffsetSec = frameToSec(cutOffsetFrame, safeFps);
          const others = prev.clips.filter((c) => c.id !== clip.id);

          const leftTiming = frameNativeClipTiming(normalizedBase.start, frameToSec(cutFrameAbs, safeFps), safeFps);
          const rightTiming = frameNativeClipTiming(frameToSec(cutFrameAbs, safeFps), normalizedBase.end, safeFps);

          const left = normalizeClipFrameFields({
            ...normalizedBase,
            id: uid('clipL'),
            ...leftTiming,
            keyframes: (normalizedBase.keyframes || [])
              .filter((kf) => kf.offsetSec <= cutOffsetSec)
              .map((kf) => ({ ...kf, id: uid('kf') }))
          }, safeFps);

          const right = normalizeClipFrameFields({
            ...normalizedBase,
            id: uid('clipR'),
            ...rightTiming,
            keyframes: (normalizedBase.keyframes || [])
              .filter((kf) => kf.offsetSec >= cutOffsetSec)
              .map((kf) => ({ ...kf, id: uid('kf'), offsetSec: Math.max(0, kf.offsetSec - cutOffsetSec) }))
          }, safeFps);

          const next = mode === 'keep-left' ? [left] : mode === 'keep-right' ? [right] : [left, right];
          return { ...prev, clips: normalizeClipsFrameNative([...others, ...next], safeFps) };
        });
      };

      const addTrack = (insertAtIndex = null) => {
        setProject((prev) => {
          const ordered = [...prev.tracks].sort((a, b) => a.order - b.order);
          const audioTrack = ordered.find((t) => t.kind === AUDIO_TRACK_KIND);
          const visuals = ordered.filter((t) => t.kind !== AUDIO_TRACK_KIND);
          const safeIndex = Number.isInteger(insertAtIndex) ? clamp(insertAtIndex, 0, visuals.length) : visuals.length;
          const newTrackId = uid('track');
          const nextVisuals = [...visuals];
          nextVisuals.splice(safeIndex, 0, { id: newTrackId, name: `V${safeIndex + 1}`, order: safeIndex, visible: true, kind: 'visual' });
          const normalizedVisuals = nextVisuals.map((t, i) => ({ ...t, order: i, name: `V${i + 1}`, kind: 'visual' }));
          const nextTracks = audioTrack
            ? [...normalizedVisuals, { ...audioTrack, order: normalizedVisuals.length, name: AUDIO_TRACK_NAME, kind: AUDIO_TRACK_KIND }]
            : [...normalizedVisuals, { id: uid('track'), name: AUDIO_TRACK_NAME, order: normalizedVisuals.length, visible: true, kind: AUDIO_TRACK_KIND }];
          return {
            ...prev,
            tracks: nextTracks,
            trackUiState: {
              ...(prev.trackUiState || {}),
              [newTrackId]: { ...(prev.trackUiState?.[newTrackId] || {}), sizeMode: 1, collapsedAuto: false, justCreatedUntil: Date.now() + 1200 }
            }
          };
        });
      };

      const removeTrack = (trackId) => {
        if (!trackId) return;
        setProject((prev) => {
          const track = prev.tracks.find((t) => t.id === trackId);
          if (!track) return prev;
          if (track.kind === AUDIO_TRACK_KIND) return prev;
          const visuals = prev.tracks.filter((t) => t.kind !== AUDIO_TRACK_KIND);
          if (visuals.length <= 1) return prev;
          const removeClipIds = new Set(prev.clips.filter((c) => c.trackId === trackId).map((c) => c.id));
          const removeLayerIds = new Set(prev.layers.filter((l) => l.trackId === trackId).map((l) => l.id));
          const keptVisuals = visuals.filter((t) => t.id !== trackId).map((t, i) => ({ ...t, order: i, name: `V${i + 1}` }));
          const audioTrack = prev.tracks.find((t) => t.kind === AUDIO_TRACK_KIND);
          const nextTracks = audioTrack
            ? [...keptVisuals, { ...audioTrack, order: keptVisuals.length, name: AUDIO_TRACK_NAME }]
            : keptVisuals;
          const nextTrackUiState = { ...(prev.trackUiState || {}) };
          delete nextTrackUiState[trackId];
          return {
            ...prev,
            tracks: nextTracks,
            layers: prev.layers.filter((l) => !removeLayerIds.has(l.id)),
            clips: prev.clips.filter((c) => !removeClipIds.has(c.id)),
            transitions: (prev.transitions || []).filter((t) => !removeClipIds.has(t.leftClipId) && !removeClipIds.has(t.rightClipId)),
            trackUiState: nextTrackUiState
          };
        });
      };

      const getTrackSeams = (trackId) => {
        const clips = project.clips
          .filter((c) => c.trackId === trackId)
          .sort((a, b) => a.start - b.start);
        const seams = [];
        for (let i = 0; i < clips.length - 1; i += 1) {
          const left = clips[i];
          const right = clips[i + 1];
          seams.push({
            id: `${left.id}_${right.id}`,
            trackId,
            leftClipId: left.id,
            rightClipId: right.id,
            seamTime: (left.end + right.start) / 2,
            gap: right.start - left.end
          });
        }
        return seams;
      };
      const seamKey = (leftClipId, rightClipId) => `${leftClipId}_${rightClipId}`;
      const toggleSeamGrouping = (leftClipId, rightClipId) => {
        setProject((prev) => {
          const left = prev.clips.find((clip) => clip.id === leftClipId);
          const right = prev.clips.find((clip) => clip.id === rightClipId);
          if (!left || !right) return prev;
          const key = seamKey(leftClipId, rightClipId);
          const seamLinks = [...(prev.seamLinks || [])];
          const existing = seamLinks.find((s) => seamKey(s.leftClipId, s.rightClipId) === key && s.mode === 'group');
          const enable = !existing;
          const nextSeamLinks = enable
            ? [...seamLinks.filter((s) => seamKey(s.leftClipId, s.rightClipId) !== key), { id: uid('seam'), leftClipId, rightClipId, mode: 'group' }]
            : seamLinks.filter((s) => seamKey(s.leftClipId, s.rightClipId) !== key);
          const groupId = enable ? (left.groupId || right.groupId || uid('grp')) : null;
          return {
            ...prev,
            seamLinks: nextSeamLinks,
            clips: prev.clips.map((clip) => {
              if (clip.id === leftClipId || clip.id === rightClipId) return { ...clip, groupId };
              return clip;
            })
          };
        });
      };

      const upsertTransition = (leftClipId, rightClipId, patch = {}) => {
        setProject((prev) => {
          const left = prev.clips.find((c) => c.id === leftClipId);
          const right = prev.clips.find((c) => c.id === rightClipId);
          if (!left || !right) return prev;
          const safeFps = Math.max(1, Number(prev.meta?.fps || 30));
          const maxTransitionFrames = Math.max(1, Math.min(Number(left.durationInFrames || secToFrame(durationOf(left, safeFps), safeFps)), Number(right.durationInFrames || secToFrame(durationOf(right, safeFps), safeFps))));
          const maxDur = Math.max(0.05, Math.min(maxTransitionFrames / safeFps, 8));
          const existing = prev.transitions.find((t) => t.leftClipId === leftClipId && t.rightClipId === rightClipId);
          if (existing) {
            const next = prev.transitions.map((t) => {
              if (t.id !== existing.id) return t;
              const durationSec = clamp(Number(patch.durationSec ?? t.durationSec ?? 0.35), 0.05, maxDur);
              const type = patch.type || t.type || 'cut';
              const params = normalizeTransitionParams({ ...(t.params || {}), ...(patch.params || {}) });
              return { ...t, ...patch, params, type, durationSec };
            });
            return { ...prev, transitions: next };
          }
          const nextTr = makeTransition(
            leftClipId,
            rightClipId,
            patch.type || 'fade',
            clamp(Number(patch.durationSec ?? 0.35), 0.05, maxDur),
            normalizeTransitionParams({ intensity: 1, amount: 1, blurPx: 12, rotateDeg: 42, direction: 'left', frequency: 80, ...(patch.params || {}) })
          );
          return { ...prev, transitions: [...(prev.transitions || []), nextTr] };
        });
      };

      const removeTransition = (transitionId) => {
        setProject((prev) => ({
          ...prev,
          transitions: (prev.transitions || []).filter((t) => t.id !== transitionId)
        }));
        if (selectedTransitionId === transitionId) setSelectedTransitionId(null);
      };
      const applyTransitionPreset = (presetId) => {
        if (!selectedTransition) return;
        const preset = TRANSITION_PRESET_PACKS.find((entry) => entry.id === presetId);
        if (!preset) return;
        upsertTransition(selectedTransition.leftClipId, selectedTransition.rightClipId, {
          type: preset.type,
          durationSec: Number(preset.durationSec || selectedTransition.durationSec || 0.35),
          params: normalizeTransitionParams({ ...(selectedTransition.params || {}), ...(preset.params || {}), blendTypes: [] })
        });
      };
      const applyCompoundTransitionTemplate = (templateId) => {
        if (!selectedTransition) return;
        const template = TRANSITION_COMPOUND_TEMPLATES.find((entry) => entry.id === templateId);
        if (!template || !Array.isArray(template.steps) || !template.steps.length) return;
        const primaryStep = template.steps[0];
        const blendTypes = template.steps.slice(1).map((step) => step.type).filter(Boolean);
        const mergedParams = template.steps.reduce((acc, step) => ({ ...acc, ...(step.params || {}) }), {});
        upsertTransition(selectedTransition.leftClipId, selectedTransition.rightClipId, {
          type: primaryStep.type || selectedTransition.type || 'fade',
          durationSec: Number(template.durationSec || selectedTransition.durationSec || 0.35),
          params: normalizeTransitionParams({ ...(selectedTransition.params || {}), ...mergedParams, blendTypes })
        });
      };

      const moveClipToTrackNoOverlap = (clipId, nextTrackId, desiredStart) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          const safeFps = Math.max(1, Number(prev.meta?.fps || 30));
          const len = durationOf(clip, safeFps);
          const start = nearestFreeStart(prev.clips, nextTrackId, desiredStart, len, clip.id);
          const end = start + len;
          const nextClips = prev.clips.map((c) => c.id === clipId ? normalizeClipFrameFields({ ...c, trackId: nextTrackId, ...frameNativeClipTiming(start, end, safeFps) }, safeFps) : c);
          return {
            ...prev,
            clips: normalizeClipsFrameNative(nextClips, safeFps),
            layers: prev.layers.map((l) => l.id === clip.layerId ? { ...l, trackId: nextTrackId } : l),
            meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, end + 1) }
          };
        });
      };

      const moveClipGroupNoOverlap = (clipIds, anchorClipId, desiredAnchorStart) => {
        const idSet = new Set((clipIds || []).filter(Boolean));
        if (!idSet.size || !anchorClipId || !idSet.has(anchorClipId)) return;
        setProject((prev) => {
          const group = prev.clips
            .filter((c) => idSet.has(c.id))
            .sort((a, b) => a.start - b.start);
          const anchor = group.find((c) => c.id === anchorClipId);
          if (!anchor) return prev;
          const stationary = prev.clips.filter((c) => !idSet.has(c.id));
          const baseDelta = desiredAnchorStart - anchor.start;
          const minShift = Math.min(...group.map((clip) => clip.start + baseDelta));
          let groupShift = minShift < 0 ? -minShift : 0;
          for (let i = 0; i < 320; i += 1) {
            const blockers = [];
            group.forEach((clip) => {
              const nextStart = clip.start + baseDelta + groupShift;
              const nextEnd = clip.end + baseDelta + groupShift;
              stationary.forEach((other) => {
                if (other.trackId !== clip.trackId) return;
                if (nextEnd <= other.start || nextStart >= other.end) return;
                blockers.push(other.end - nextStart);
              });
            });
            if (!blockers.length) break;
            groupShift += Math.max(...blockers, 0.01);
          }
          const moved = group.map((clip) => {
            const nextStart = Math.max(0, clip.start + baseDelta + groupShift);
            const len = durationOf(clip);
            return { ...clip, start: nextStart, end: nextStart + len };
          });
          const movedById = new Map(moved.map((nextClip) => [nextClip.id, nextClip]));
          const nextClips = prev.clips.map((c) => movedById.get(c.id) || c);
          const maxEnd = nextClips.reduce((m, c) => Math.max(m, c.end), prev.meta.durationSec);
          return {
            ...prev,
            clips: nextClips,
            meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, maxEnd + 1) }
          };
        });
      };

      const updateClipBoundsNoOverlap = (clipId, nextStart, nextEnd) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          const safeFps = Math.max(1, Number(prev.meta?.fps || 30));
          const len = Math.max(frameToSec(1, safeFps), nextEnd - nextStart);
          const start = nearestFreeStart(prev.clips, clip.trackId, nextStart, len, clip.id);
          const end = start + len;
          const nextClips = prev.clips.map((c) => c.id === clipId ? normalizeClipFrameFields({ ...c, ...frameNativeClipTiming(start, end, safeFps) }, safeFps) : c);
          return {
            ...prev,
            clips: normalizeClipsFrameNative(nextClips, safeFps),
            meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, end + 1) }
          };
        });
      };

      const applyLeftTrim = (clipId, newStart) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          const safeFps = Math.max(1, Number(prev.meta?.fps || 30));
          const normalized = normalizeClipFrameFields(clip, safeFps);
          const oldStart = normalized.start;
          const minDurSec = frameToSec(1, safeFps);
          const start = clamp(newStart, 0, normalized.end - minDurSec);
          const len = normalized.end - start;
          const fixedStart = nearestFreeStart(prev.clips, normalized.trackId, start, len, normalized.id);
          const deltaApplied = oldStart - fixedStart;
          const nextClips = prev.clips.map((c) => {
            if (c.id !== clipId) return c;
            const dur = normalized.end - fixedStart;
            const keyframes = (c.keyframes || []).map((kf) => ({
              ...kf,
              offsetSec: clamp(kf.offsetSec + deltaApplied, 0, dur)
            }));
            return normalizeClipFrameFields({ ...c, ...frameNativeClipTiming(fixedStart, normalized.end, safeFps), keyframes }, safeFps);
          });
          return { ...prev, clips: normalizeClipsFrameNative(nextClips, safeFps) };
        });
      };

      const applyRightTrim = (clipId, newEnd) => {
        setProject((prev) => {
          const safeFps = Math.max(1, Number(prev.meta?.fps || 30));
          const nextClips = prev.clips.map((c) => {
            if (c.id !== clipId) return c;
            const maxBlockedEnd = prev.clips
              .filter((o) => o.trackId === c.trackId && o.id !== c.id && o.start >= c.start)

                const clip = prev.clips.find((c) => c.id === ds.clipId);
                if (!clip) return prev;
                const visualTracks = [...prev.tracks]
                  .filter((t) => t.kind !== AUDIO_TRACK_KIND)
                  .sort((a, b) => a.order - b.order);
                const audioTrack = prev.tracks.find((t) => t.kind === AUDIO_TRACK_KIND);
                const newTrackId = uid('track');
                const len = durationOf(clip);
                const nextVisuals = [
                  ...visualTracks.map((t, i) => ({ ...t, order: i, name: `V${i + 1}`, kind: 'visual' })),
                  { id: newTrackId, name: `V${visualTracks.length + 1}`, order: visualTracks.length, visible: true, kind: 'visual' }
                ];
                const nextTrackId = newTrackId;
                const start = nearestFreeStart(prev.clips, nextTrackId, pendingStart, len, clip.id);
                const nextClips = prev.clips.map((c) => c.id === ds.clipId ? { ...c, trackId: nextTrackId, start, end: start + len } : c);
                return {
                  ...prev,
                  tracks: [
                    ...nextVisuals,
                    ...(audioTrack ? [{ ...audioTrack, order: nextVisuals.length, name: AUDIO_TRACK_NAME, kind: AUDIO_TRACK_KIND }] : [])
                  ],
                  clips: nextClips,
                  trackUiState: {
                    ...(prev.trackUiState || {}),
                    [newTrackId]: { ...(prev.trackUiState?.[newTrackId] || {}), sizeMode: 1, collapsedAuto: false, justCreatedUntil: Date.now() + 1200 }
                  }
                };
              });
            } else if (pendingTrackId) {
              moveClipToTrackNoOverlap(ds.clipId, pendingTrackId, pendingStart);
            }
          }
          if (dragRef.current?.type === 'box-select') {
            setBoxSelect((prev) => {
              if (prev) selectClipsInBox(prev, !!prev.additive);
              return null;
            });
          }
          dragRef.current = { type: null };
          setDragState({ type: null });
          setDragPreview(null);
          setHoverTrackId(null);
          dividerHoldRef.current = { index: null, startAt: 0 };
          setDividerCue({ index: null, flash: false });
          setProject((prev) => {
            const nextUi = { ...(prev.trackUiState || {}) };
            let changed = false;
            Object.keys(nextUi).forEach((k) => {
              if (nextUi[k]?.isDropTarget) {
                nextUi[k] = { ...nextUi[k], isDropTarget: false };
                changed = true;
              }
            });
            return changed ? { ...prev, trackUiState: nextUi } : prev;
          });
        };

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        return () => {
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
        };
      }, [project.clips, project.meta.durationSec, sortedTracks, mods, snapEnabled, trackLayout, selectedClipIds, timelineContentWidth, cameraTrackHeight, timelineRowsHeight]);

      useEffect(() => {
        setProject((prev) => {
          const byId = Object.fromEntries(prev.clips.map((c) => [c.id, c]));
          const clean = (prev.transitions || []).filter((t) => {
            const left = byId[t.leftClipId];
            const right = byId[t.rightClipId];
            if (!left || !right) return false;
            if (left.trackId !== right.trackId) return false;
            return Math.abs(right.start - left.end) <= 0.08;
          });
          if (clean.length === (prev.transitions || []).length) return prev;
          return { ...prev, transitions: clean };
        });
      }, [project.clips]);
      useEffect(() => {
        setProject((prev) => {
          const byId = new Set((prev.clips || []).map((clip) => clip.id));
          const cleanSeams = (prev.seamLinks || []).filter((seam) => byId.has(seam.leftClipId) && byId.has(seam.rightClipId));
          if (cleanSeams.length === (prev.seamLinks || []).length) return prev;

      const validateExportContract = (resolvedMeta) => {

        if (!Number.isFinite(resolvedMeta.height) || resolvedMeta.height <= 0) errors.push('composition height must be > 0');
        if (!Number.isFinite(resolvedMeta.fps) || resolvedMeta.fps <= 0) errors.push('fps must be > 0');
        if (!Number.isFinite(resolvedMeta.durationInFrames) || resolvedMeta.durationInFrames <= 0) errors.push('durationInFrames must be > 0');

          warnings,
          normalizedMeta: resolvedMeta

      const exportJson = () => {

      const importJson = async (file) => {

      };

      const toSvgCode = () => {
        const width = project.meta.aspectRatio === '16:9' ? 1920 : 1080;
        const height = project.meta.aspectRatio === '16:9' ? 1080 : 1920;

        const trackOrderMap = Object.fromEntries(sortedTracks.map((t, i) => [t.id, i]));
        const drawables = [];

        project.layers.forEach((layer) => {
          if (layer.type === 'audio') return;
          if (!layer.visible) return;
          const clip = project.clips.find((c) => c.layerId === layer.id && playhead >= c.start && playhead <= c.end);
          if (!clip) return;
          const p = evaluateLayerPayloadAt(layer, clip, playhead);
          if (!p || Number(p.opacity) <= 0) return;
          drawables.push({ layer, clip, p, order: trackOrderMap[layer.trackId] ?? 999 });
        });

        drawables.sort((a, b) => b.order - a.order);

        const nodes = drawables.map(({ layer, clip, p }) => {
          const ox = width / 2 + Number(p.x || 0);
          const oy = height / 2 + Number(p.y || 0);
          const w = Number(p.width || 0);
          const h = Number(p.height || 0);
          const transFx = transitionInfluence(clip || { id: '' });
          const animFx = clipEntryExitInfluence(clip || null);
          const tx = `${transFx.transformExtra || ''} ${animFx.transformExtra || ''}`;
          const extraX = Number((tx.match(/translateX\(([-\d.]+)px\)/) || [])[1] || 0);
          const extraY = Number((tx.match(/translateY\(([-\d.]+)px\)/) || [])[1] || 0);
          const extraScale = Number((tx.match(/scale\(([-\d.]+)\)/) || [])[1] || 1);
          const extraRotate = Number((tx.match(/rotate\(([-\d.]+)deg\)/) || [])[1] || 0);
          const transform = `translate(${ox + extraX} ${oy + extraY}) rotate(${Number(p.rotation || 0) + extraRotate}) scale(${Number(p.scale || 1) * extraScale})`;
          const mergedOpacity = clamp(Number(p.opacity || 1) * (transFx.opacity ?? 1) * (animFx.opacity ?? 1), 0, 1);
          const compositeFilter = `${buildEffectFilter(p, project.meta.visualDNA)} ${transFx.filterExtra || ''}`.trim();
          const common = `opacity="${mergedOpacity}" filter="${compositeFilter}"`;

          if (layer.type === 'text') {
            const sw = Math.max(0, Number(p.strokeWidth ?? 0));
            const stroke = sw > 0 ? `stroke="${p.strokeColor || '#111'}" stroke-width="${sw * 2}" paint-order="stroke fill"` : '';
            return `<g transform="${transform}"><text x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-size="${Number(p.fontSize || 40)}" font-family="${p.fontFamily || 'Outfit'}" font-weight="900" fill="${p.fillColor || '#fff'}" ${stroke} ${common}>${String(p.text || '').replace(/</g, '&lt;')}</text></g>`;
          }

          if (layer.type === 'shape') {
            const fillValue = project.meta.visualDNA === 'wireframe' || project.meta.visualDNA === 'hologram'
              ? 'none'
              : (p.fillColor || '#ffffff');
            if (p.shape === 'circle') {
              const r = Math.max(5, Math.min(w, h) / 2);
              const sw = Number(p.strokeWidth ?? 0);
              const strokeColor = project.meta.visualDNA === 'blueprint' ? '#3b82f6' : (sw > 0 ? p.strokeColor : 'none');
              return `<g transform="${transform}"><circle cx="0" cy="0" r="${r}" fill="${fillValue}" stroke="${strokeColor}" stroke-width="${sw}" ${common} /></g>`;
            }
            if (p.shape === 'polygon') {
              const sw = Number(p.strokeWidth ?? 0);
              const strokeColor = project.meta.visualDNA === 'blueprint' ? '#3b82f6' : (sw > 0 ? p.strokeColor : 'none');
              const d = polygonPathD(Math.round(Number(p.polygonSides || 5)), Number(p.polygonInnerRadius || 0), 0, 0, Math.min(w, h) / 2);
              return `<g transform="${transform}"><path d="${d}" fill="${fillValue}" stroke="${strokeColor}" stroke-width="${sw}" ${common} /></g>`;
            }
            const sw = Number(p.strokeWidth ?? 0);
            const strokeColor = project.meta.visualDNA === 'blueprint' ? '#3b82f6' : (sw > 0 ? p.strokeColor : 'none');
            const dash = project.meta.visualDNA === 'blueprint' || project.meta.visualDNA === 'hologram' ? ' stroke-dasharray="4 3"' : '';
            return `<g transform="${transform}"><rect x="${-w / 2}" y="${-h / 2}" width="${w}" height="${h}" rx="${Number(p.cornerRadius || 0)}" fill="${fillValue}" stroke="${strokeColor}" stroke-width="${sw}"${dash} ${common} /></g>`;
          }

          if (p.mediaUrl) {
            return `<g transform="${transform}"><image x="${-w / 2}" y="${-h / 2}" width="${w}" height="${h}" href="${String(p.mediaUrl).replace(/"/g, '&quot;')}" preserveAspectRatio="xMidYMid slice" ${common}/></g>`;
          }
          const fillMedia = project.meta.visualDNA === 'wireframe' ? 'none' : (p.fillColor || '#444');
          return `<g transform="${transform}"><rect x="${-w / 2}" y="${-h / 2}" width="${w}" height="${h}" fill="${fillMedia}" stroke="none" ${common} /></g>`;
        });

        return `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">\n  <rect width="100%" height="100%" fill="${project.meta.chromaEnabled ? project.meta.chromaColor : '#111'}" />\n  ${nodes.join('\n  ')}\n</svg>`;
      };

      const toHtmlCode = () => {
        const ratio = project.meta.aspectRatio === '16:9' ? '16 / 9' : '9 / 16';

        const a = document.createElement('a');
        a.href = url;
        a.download = 'CODEX_EDITOR_X_V1_frame.html';
        a.click();
        URL.revokeObjectURL(url);
      };

      const exportRemotionJob = (format = 'mp4') => {
        const resolvedMeta = buildResolvedCompositionMeta();
        const validation = validateExportContract(resolvedMeta);
        const clipContractErrors = (project.clips || []).flatMap((clip) => {
          const errs = [];
          const startFrame = Number(clip.startFrame);
          const durationInFrames = Number(clip.durationInFrames);
          if (!Number.isFinite(startFrame) || !Number.isFinite(durationInFrames) || durationInFrames <= 0) errs.push(`${clip.id}: invalid frame bounds`);

          hash: compileSnapshotHash,

        const payload = {
          kind: 'remotionRender',
          targetFormat: format,
          renderMode,
          qualityProfile: renderProfile === 'final' ? 'final' : 'draft',
          schemaVersion: VT_E1_EXPORT_SCHEMA_VERSION,
          sourceEditor: 'VT_E1',
          validation,

          propsResolutionTrace: buildPropsResolutionTrace(resolvedMeta),
          renderProfile,

              effectSeeds: (Array.isArray(clip.effects) ? clip.effects : []).map((fx, idx) => ({

        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const u = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = u;
        a.download = `VT_E1.remotion.${format}.job.v3.json`;
        a.click();
        URL.revokeObjectURL(u);
      };

      const runParitySmoke = () => {
        const dims = getExportDims();
        const fitRatio = Number(stageFitBox.renderWidth || 0) / Math.max(1, Number(stageFitBox.renderHeight || 1));
        const compositionRatio = Number(stageFitBox.compositionWidth || 0) / Math.max(1, Number(stageFitBox.compositionHeight || 1));
        const sampleTimes = renderMode === 'frame-perfect'
          ? Array.from({ length: Math.max(1, Math.ceil(project.meta.durationSec * Number(project.meta?.fps || 30))) }, (_, frame) => frame / Math.max(1, Number(project.meta?.fps || 30)))
          : [0, project.meta.durationSec / 2, Math.max(0, project.meta.durationSec - (1 / 30))];
        const issues = [];
        if (!(stageFitBox.renderWidth > 0 && stageFitBox.renderHeight > 0)) issues.push('fit: render box is empty');
        if (!(stageFitBox.slotWidth > 0 && stageFitBox.slotHeight > 0)) issues.push('fit: slot box is empty');
        if (Math.abs(fitRatio - compositionRatio) > 0.015) issues.push(`fit: ratio drift ${fitRatio.toFixed(4)} vs ${compositionRatio.toFixed(4)}`);
        if (Number(stageFitBox.renderWidth || 0) - Number(stageFitBox.slotWidth || 0) > 1 || Number(stageFitBox.renderHeight || 0) - Number(stageFitBox.slotHeight || 0) > 1) issues.push('fit: render box exceeds slot bounds');
        const byTrack = Object.fromEntries(sortedTracks.map((t, i) => [t.id, i]));
        sampleTimes.forEach((tAbs) => {
          const active = [];
          project.layers.forEach((layer) => {
            if (layer.type === 'audio' || !layer.visible) return;
            const clip = project.clips.find((c) => c.layerId === layer.id && tAbs >= c.start && tAbs <= c.end);
            if (!clip) return;
            const p = evaluateLayerPayloadAt(layer, clip, tAbs);
            if (!p || Number(p.opacity) <= 0) return;
            active.push({ layer, clip, p, order: byTrack[layer.trackId] ?? 999 });
          });
          active.forEach(({ layer, p }) => {
            const name = layer.payload?.layerName || layer.id;
            const w = Math.max(1, Number(p.width || 0));
            const h = Math.max(1, Number(p.height || 0));
            const cx = (dims.width / 2) + Number(p.x || 0);
            const cy = (dims.height / 2) + Number(p.y || 0);
            const left = cx - (w / 2);
            const right = cx + (w / 2);
            const top = cy - (h / 2);
            const bottom = cy + (h / 2);
            if (!Number.isFinite(w) || !Number.isFinite(h)) {
              issues.push(`[${formatHMS(tAbs)}] ${name}: invalid geometry`);
              return;
            }
            if (right < 0 || left > dims.width || bottom < 0 || top > dims.height) {
              issues.push(`[${formatHMS(tAbs)}] ${name}: fully out of frame`);
            }
            if (w > dims.width || h > dims.height) {
              issues.push(`[${formatHMS(tAbs)}] ${name}: larger than frame (${Math.round(w)}x${Math.round(h)} > ${dims.width}x${dims.height})`);
            }
          });
        });
        const report = {
          variant: 'clay',
          snapshotHash: compileSnapshotHash,
          profile: renderProfile,
          sampleTimes,
          issueCount: issues.length,
          issues: issues.slice(0, 20),
          fit: {
            slotWidth: Math.round(stageFitBox.slotWidth),
            slotHeight: Math.round(stageFitBox.slotHeight),
            compositionWidth: stageFitBox.compositionWidth,
            compositionHeight: stageFitBox.compositionHeight,
            renderWidth: Math.round(stageFitBox.renderWidth),
            renderHeight: Math.round(stageFitBox.renderHeight),
            mode: stageFitBox.mode
          },
          generatedAt: new Date().toISOString()
        };
        setParityReport(report);
        if (!issues.length) {
          if (renderMode === 'frame-perfect') {
            alert(`Frame-perfect parity passed across ${sampleTimes.length} frame samples.`);
            return;
          }
          alert(`Parity smoke passed at 3 samples (${formatHMS(sampleTimes[0])}, ${formatHMS(sampleTimes[1])}, ${formatHMS(sampleTimes[2])}).`);
          return;
        }
        alert(`Parity smoke found ${issues.length} issue(s):\n${issues.slice(0, renderMode === 'frame-perfect' ? 20 : 10).join('\n')}`);
      };
      const runOneFrameSanity = () => {
        const issues = [];
        stageLayers.forEach(({ layer, payload }) => {
          const name = layer.payload?.layerName || layer.id;
          const width = Number(payload?.width || 0);
          const height = Number(payload?.height || 0);
          if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) {
            issues.push(`${name}: invalid size`);
          }
          if (Number(payload?.opacity ?? 1) < 0 || Number(payload?.opacity ?? 1) > 1) {
            issues.push(`${name}: opacity out of range`);
          }
        });
        if (!issues.length) {
          alert(`One-frame sanity passed at ${formatHMS(previewSec)} (${stageLayers.length} active layers).`);
          return;
        }
        alert(`One-frame sanity found ${issues.length} issue(s):\n${issues.slice(0, 10).join('\n')}`);
      };
      useEffect(() => {
        const fps = Math.max(1, Number(project.meta?.fps || 30));
        const needsNormalize = (project.clips || []).some((clip) => {
          const normalized = normalizeClipFrameFields(clip, fps);
          return normalized.startFrame !== clip.startFrame || normalized.durationInFrames !== clip.durationInFrames || Math.abs(Number(normalized.start || 0) - Number(clip.start || 0)) > 1e-4 || Math.abs(Number(normalized.end || 0) - Number(clip.end || 0)) > 1e-4;

      }, [project.clips, project.meta?.fps]);

      const runPreflightDiagnostics = () => {

        const warnings = [];

        const trackIds = new Set((project.tracks || []).map((t) => t.id));
        const resolvedMeta = buildResolvedCompositionMeta();
        const validation = validateExportContract(resolvedMeta);
        if (!validation.valid) {
          validation.errors.forEach((err) => issues.push(`Contract: ${err}`));
        }
        validation.warnings.forEach((warn) => warnings.push(`Contract warning: ${warn}`));
        (project.clips || []).forEach((clip) => {
          if (!layerIds.has(clip.layerId)) issues.push(`Clip ${clip.id}: missing layer`);
          if (!trackIds.has(clip.trackId)) issues.push(`Clip ${clip.id}: missing track`);
          if (!Number.isFinite(Number(clip.startFrame)) || !Number.isFinite(Number(clip.durationInFrames)) || Number(clip.durationInFrames) <= 0) {
            issues.push(`Clip ${clip.id}: invalid frame timing`);

          if (!Number.isFinite(Number(clip.start)) || !Number.isFinite(Number(clip.end)) || Number(clip.end) <= Number(clip.start)) {
            issues.push(`Clip ${clip.id}: invalid second timing`);
          }
          if ((Number(clip.startFrame) + Number(clip.durationInFrames)) > Number(resolvedMeta.durationInFrames || 0)) {

      const capturePreviewVideo = async (format = 'webm') => {

            project.layers.forEach((layer) => {

        setStartupRecoveryState((prev) => ({ ...prev, checking: true, phase: 'checking', error: null }));
        window.setTimeout(() => {
          try {
            const hasSaved = Boolean(localStorage.getItem(MANUAL_SESSION_KEY)) || autosaveSnapshots.length > 0;
            setStartupRecoveryState((prev) => ({
              ...prev,
              hasSavedSession: hasSaved,
              checking: false,
              phase: 'ready'
            }));
          } catch (error) {
            setStartupRecoveryState((prev) => ({
              ...prev,
              checking: false,
              phase: 'failed',
              error: String(error?.message || error || 'unknown')
            }));
          }
        }, 220);
      };
      const continueWithoutRestore = () => {
        setStartupRecoveryState((prev) => ({
          ...prev,
          hasSavedSession: false,
          error: null,
          checking: false,
          phase: 'ready'
        }));
      };
      const alignSelectedLayer = (anchor) => {
        if (!selectedLayer) return;
        const stageWidth = Number(project?.meta?.width || 1920);
        const stageHeight = Number(project?.meta?.height || 1080);
        const layerWidth = Number(selectedLayer.payload?.width || 420);
        const layerHeight = Number(selectedLayer.payload?.height || 220);
        const maxX = Math.max(0, (stageWidth - layerWidth) / 2);
        const maxY = Math.max(0, (stageHeight - layerHeight) / 2);
        const anchorMap = {
          tl: { x: -maxX, y: -maxY },
          tc: { x: 0, y: -maxY },
          tr: { x: maxX, y: -maxY },
          cl: { x: -maxX, y: 0 },
          cc: { x: 0, y: 0 },
          cr: { x: maxX, y: 0 },
          bl: { x: -maxX, y: maxY },
          bc: { x: 0, y: maxY },
          br: { x: maxX, y: maxY }
        };
        updateLayerPayload(selectedLayer.id, anchorMap[anchor] || anchorMap.cc);
      };
      const resetSelectedLayerCanvas = () => {
        if (!selectedLayer) return;
        updateLayerPayload(selectedLayer.id, {
          x: 0,
          y: 0,
          rotation: 0,
          scale: 1,
          opacity: 1,
          fit: (selectedLayer.type === 'media' || selectedLayer.type === 'template') ? 'cover' : selectedLayer.payload.fit
        });
      };

      const applyJsonDraft = () => {
        try {
          const parsed = JSON.parse(codeJsonDraft);
          if (parsed?.schemaVersion !== SCHEMA_VERSION) {
            setCodeError(`Expected ${SCHEMA_VERSION}.`);
            return;
          }
          const normalized = normalizeProject(parsed);
          setPendingJsonDraft(normalized);
          setShowPatchDiff(true);
          setCodeError('');
        } catch (err) {
          setCodeError(err.message || 'Invalid JSON');
        }
      };

      const resetJsonDraft = () => {
        setCodeJsonDraft(JSON.stringify(project, null, 2));
        setCodeError('');
      };

      const buildTimelinePatchDiff = (currentProject, nextProject) => {
        if (!nextProject) return null;
        const currentIds = new Set((currentProject?.clips || []).map((c) => c.id));
        const nextIds = new Set((nextProject?.clips || []).map((c) => c.id));
        const addedClipIds = [...nextIds].filter((id) => !currentIds.has(id));
        const removedClipIds = [...currentIds].filter((id) => !nextIds.has(id));
        const movedClips = (nextProject?.clips || []).filter((clip) => {
          const before = (currentProject?.clips || []).find((c) => c.id === clip.id);
          if (!before) return false;
          return before.trackId !== clip.trackId || Math.abs(before.start - clip.start) > 0.001 || Math.abs(before.end - clip.end) > 0.001;
        }).length;
        return {
          addedClipIds,
          removedClipIds,
          movedClips,
          beforeDurationSec: Number(currentProject?.meta?.durationSec || 0),
          nextDurationSec: Number(nextProject?.meta?.durationSec || 0),
          beforeTrackCount: Number((currentProject?.tracks || []).length),
          nextTrackCount: Number((nextProject?.tracks || []).length),
          beforeLayerCount: Number((currentProject?.layers || []).length),
          nextLayerCount: Number((nextProject?.layers || []).length)
        };
      };

      const applyPendingJsonDraft = () => {
        if (!pendingJsonDraft) return;
        setProject(pendingJsonDraft);
        markSaved(pendingJsonDraft);
        setPendingJsonDraft(null);
        setShowPatchDiff(false);
      };

      const saveCustomTemplate = () => {
        const tpl = {
          id: uid('tpl'),
          name: templateName || `Template ${project.templatesCustom.length + 1}`,
          schema: 'TemplateV2',
          meta: { createdAt: new Date().toISOString() },
          project: clone(project)
        };
        setProject((prev) => ({ ...prev, templatesCustom: [tpl, ...prev.templatesCustom] }));
      };

      const applyTemplate = (tpl) => {
        if (!tpl?.project) return;
        setProject((prev) => {
          const p = clone(prev);
          const insertAt = playhead;
          const idMapLayer = new Map();
          const idMapTrack = new Map();
          const idMapClip = new Map();

          const templateTracks = Array.isArray(tpl.project.tracks) ? [...tpl.project.tracks] : [];
          const sortedTemplateTracks = templateTracks.sort((a, b) => safeNumber(a.order, 0, -999, 999) - safeNumber(b.order, 0, -999, 999));
          const visualTemplateTracks = sortedTemplateTracks.filter((track) => track.kind !== AUDIO_TRACK_KIND).reverse();
          const audioTemplateTracks = sortedTemplateTracks.filter((track) => track.kind === AUDIO_TRACK_KIND);
          const orderedTemplateTracks = [...visualTemplateTracks, ...audioTemplateTracks];

          orderedTemplateTracks.forEach((track) => {
            const newTrack = { ...track, id: uid('track'), order: p.tracks.length };
            idMapTrack.set(track.id, newTrack.id);
            p.tracks.push(newTrack);
          });

          tpl.project.layers.forEach((layer) => {
            const nl = {
              ...layer,
              id: uid('layer'),
              trackId: idMapTrack.get(layer.trackId) || p.tracks[0].id,
              payload: normalizeLayerPayload(layer, p.layers.length)
            };
            idMapLayer.set(layer.id, nl.id);
            p.layers.push(nl);
          });

          tpl.project.clips.forEach((clip) => {
            const len = durationOf(clip);
            const trackId = idMapTrack.get(clip.trackId) || p.tracks[0].id;
            const start = nearestFreeStart(p.clips, trackId, insertAt + clip.start, len);
            const newClipId = uid('clip');
            const nc = {
              ...clip,
              id: newClipId,
              trackId,
              layerId: idMapLayer.get(clip.layerId),
              start,
              end: start + len,
              introAnimationId: normalizeAnimId(clip.introAnimationId),
              introDurationSec: normalizeAnimDuration(clip.introDurationSec),
              introLevel: normalizeAnimLevel(clip.introLevel),
              outroAnimationId: normalizeAnimId(clip.outroAnimationId),
              outroDurationSec: normalizeAnimDuration(clip.outroDurationSec),
              outroLevel: normalizeAnimLevel(clip.outroLevel),
              keyframes: (clip.keyframes || []).map((kf) => ({ ...kf, id: uid('kf') }))
            };
            idMapClip.set(clip.id, newClipId);
            p.clips.push(nc);
            p.meta.durationSec = Math.max(p.meta.durationSec, nc.end + 1);
          });

          (tpl.project.transitions || []).forEach((tr) => {
            const leftClipId = idMapClip.get(tr.leftClipId);
            const rightClipId = idMapClip.get(tr.rightClipId);
            if (!leftClipId || !rightClipId) return;
            p.transitions.push({
              ...tr,
              id: uid('tr'),
              leftClipId,
              rightClipId
            });
          });

          return p;
        });
      };

      const composeV3ProjectPayload = () => {

        if (!res.ok) throw new Error(`Project list failed (${res.status})`);
        const data = await res.json();

      const saveProjectToCloud = async ({ explicit = false, saveAs = false } = {}) => {
        if (!(await ensureProjectApiAvailable())) {
          setProjectSaveState('failed');
          setProjectSaveError('Cloud API unavailable. Local save is still available.');
          return null;
        }
        const ownerId = resolveProjectOwnerId();
        setProjectOwnerId(ownerId);
        setProjectSaveState('saving');
        setProjectSaveError('');
        const payload = {
          ownerUserId: ownerId,
          name: project.meta?.projectName || 'UNTITLED PROJECT',
          sourceEditor: 'VT_E1',
          schemaVersion: 'EditorProjectV3',
          editorVersion: 'VT_E1',
          status: explicit ? 'saved' : 'draft',
          projectData: composeV3ProjectPayload()
        };
        const isCreate = saveAs || !activeProjectId;
        const targetUrl = isCreate
          ? `${PROJECT_API_BASE}/api/projects`
          : `${PROJECT_API_BASE}/api/projects/${encodeURIComponent(activeProjectId)}?userId=${encodeURIComponent(ownerId)}`;
        const method = isCreate ? 'POST' : 'PUT';
        const headers = { 'Content-Type': 'application/json' };
        if (!isCreate && projectEtag) headers['If-Match'] = projectEtag;

        const res = await fetch(targetUrl, { method, headers, body: JSON.stringify(payload) });
        const data = await res.json().catch(() => ({}));
        if (res.status === 409 && data?.error === 'PROJECT_CONFLICT') {
          const useLocal = window.confirm('Cloud project changed in another session. Use LOCAL version and overwrite cloud?');
          if (!useLocal) {
            setProjectSaveState('failed');
            setProjectSaveError('Conflict: user kept cloud copy.');
            return null;
          }
          const forceRes = await fetch(targetUrl, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          const forceData = await forceRes.json();
          if (!forceRes.ok) throw new Error(forceData?.error || `Cloud save failed (${forceRes.status})`);
          const record = forceData?.project;
          setActiveProjectId(record?.projectId || activeProjectId || null);
          setProjectRevision(Number(record?.revision || projectRevision || 1));
          setProjectEtag(String(record?.etag || ''));
          setProjectSaveState('saved');
          setLastSavedAt(new Date());
          markSaved(project);
          await fetchProjectList(ownerId);
          return record;
        }
        if (!res.ok) throw new Error(data?.error || `Cloud save failed (${res.status})`);
        const record = data?.project;
        setActiveProjectId(record?.projectId || activeProjectId || null);
        setProjectRevision(Number(record?.revision || projectRevision || 1));
        setProjectEtag(String(record?.etag || ''));
        setProjectSaveState('saved');
        setLastSavedAt(new Date());
        markSaved(project);
        await fetchProjectList(ownerId);
        return record;
      };

      const loadProjectFromCloud = async (projectId) => {
        if (!(await ensureProjectApiAvailable())) throw new Error('Cloud API unavailable.');
        const ownerId = resolveProjectOwnerId();
        const res = await fetch(`${PROJECT_API_BASE}/api/projects/${encodeURIComponent(projectId)}?userId=${encodeURIComponent(ownerId)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data?.error || `Load failed (${res.status})`);
        const record = data?.project;
        const validation = validateCloudProjectEnvelope(record);
        if (!validation.valid) throw new Error(`Project payload invalid: ${validation.reason}`);
        const normalized = mapV3ToEditorProject(record.projectData);
        setProject(normalized);
        setActiveProjectId(record.projectId);
        setProjectRevision(Number(record.revision || 1));
        setProjectEtag(String(record.etag || ''));
        setProjectSaveState('saved');
        setLastSavedAt(new Date());
        setSelectedClipId(normalized.clips[0]?.id || null);
        setSelectedClipIds(normalized.clips[0]?.id ? [normalized.clips[0].id] : []);
        setSelectedLayerId(normalized.layers[0]?.id || null);
        setPlayhead(0);

        const ownerId = resolveProjectOwnerId();
        const res = await fetch(`${PROJECT_API_BASE}/api/projects/${encodeURIComponent(activeProjectId)}/duplicate?userId=${encodeURIComponent(ownerId)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },

        });
        const data = await res.json();
        if (!res.ok) throw new Error(data?.error || `Duplicate failed (${res.status})`);

      const saveManualSession = () => {

      const runAiJob = async (type) => {

      const buildEffectFilter = (payload, variant = project.meta.visualDNA) => {
        const fx = Array.isArray(payload.effects) ? payload.effects : [];
        const segments = [
          `blur(${Number(payload.blur || 0)}px)`,
          `saturate(${Number(payload.saturation || 1)})`,
          `brightness(${Number(payload.brightness || 1)})`,
          `hue-rotate(${Number(payload.hue || 0)}deg)`
        ];
        fx.forEach((node) => {
          if (!node || node.enabled === false) return;
          const amt = Number(node.params?.amount ?? 0);
          switch (node.type) {
            case 'grayscale': segments.push(`grayscale(${clamp(amt, 0, 1)})`); break;
            case 'sepia': segments.push(`sepia(${clamp(amt, 0, 1)})`); break;
            case 'invert': segments.push(`invert(${clamp(amt, 0, 1)})`); break;
            case 'contrast': segments.push(`contrast(${Math.max(0, amt || 1)})`); break;
            case 'brightnessFx': segments.push(`brightness(${Math.max(0, amt || 1)})`); break;
            case 'saturationFx': segments.push(`saturate(${Math.max(0, amt || 1)})`); break;
            case 'hueRotate': segments.push(`hue-rotate(${amt}deg)`); break;
            case 'opacityFx': segments.push(`opacity(${clamp(amt, 0, 1)})`); break;
            case 'vibrance': segments.push(`saturate(${1 + amt})`); break;
            case 'temperature':
              if (amt >= 0) segments.push(`sepia(${clamp(amt, 0, 1)})`);
              else segments.push(`hue-rotate(${Math.abs(amt) * -45}deg)`);
              break;
            case 'tint': segments.push(`hue-rotate(${amt * 160}deg)`); break;
            case 'exposure': segments.push(`brightness(${1 + amt})`); break;
            case 'highlights': segments.push(`contrast(${1 + amt * 0.5})`); break;
            case 'shadows': segments.push(`brightness(${1 + amt * 0.4})`); break;
            case 'clarity': segments.push(`contrast(${1 + amt * 0.7})`); break;
            case 'sharpen': segments.push(`contrast(${1 + amt * 0.2})`); break;
            case 'noise': segments.push(`grayscale(${Math.max(0, amt * 0.15)})`); break;
            case 'pixelate': segments.push(`contrast(${1 + amt * 0.05})`); break;
            case 'vignette': segments.push(`brightness(${1 - clamp(amt, 0, 1) * 0.2})`); break;
            case 'chromaticAberration': segments.push(`drop-shadow(${Math.max(1, amt * 6)}px 0 0 rgba(255,0,120,.7)) drop-shadow(${Math.max(1, amt * -6)}px 0 0 rgba(0,220,255,.7)) contrast(${1 + amt * 0.25})`); break;
            case 'posterize': segments.push(`contrast(${1 + amt * 0.8})`); break;
            case 'glowBloom': segments.push(`drop-shadow(0 0 ${Math.max(0, amt * 12)}px rgba(255,255,255,.3))`); break;
            case 'scanlines': segments.push(`contrast(${1 + amt * 0.12})`); break;
            case 'filmGrain': segments.push(`grayscale(${clamp(amt * 0.22, 0, 1)}) contrast(${1 + amt * 0.3})`); break;
            case 'halation': segments.push(`drop-shadow(0 0 ${Math.max(0, amt * 18)}px rgba(255,210,170,.35))`); break;
            case 'bleachBypass': segments.push(`contrast(${1 + amt * 0.9}) saturate(${1 - amt * 0.45})`); break;
            case 'gamma': segments.push(`brightness(${1 + (amt * 0.35)}) contrast(${1 + (amt * 0.35)})`); break;
            case 'fade': segments.push(`opacity(${1 - clamp(amt, 0, 1) * 0.45})`); break;
            case 'lumaLift': segments.push(`brightness(${1 + (amt * 0.4)})`); break;
            case 'duotone': segments.push(`grayscale(${clamp(amt, 0, 1)}) hue-rotate(${amt * 130}deg) saturate(${1 + amt * 0.6})`); break;
            case 'tealOrange': segments.push(`hue-rotate(${amt * 26}deg) saturate(${1 + amt * 0.4}) contrast(${1 + amt * 0.35})`); break;
            case 'coolBlue': segments.push(`hue-rotate(${amt * -60}deg) brightness(${1 + amt * 0.2})`); break;
            case 'warmGold': segments.push(`sepia(${Math.max(0, amt)}) hue-rotate(${amt * 20}deg) brightness(${1 + Math.max(0, amt) * 0.18})`); break;
            case 'crt': segments.push(`contrast(${1 + amt * 0.45}) saturate(${1 + amt * 0.2})`); break;
            case 'edgeGlow': segments.push(`drop-shadow(0 0 ${Math.max(0, amt * 44)}px rgba(64,198,233,.95)) drop-shadow(0 0 ${Math.max(0, amt * 24)}px rgba(255,255,255,.45))`); break;

                            : mirrorFeedMode === 'both'

                              : mirrorFeedMode === 'diag-fwd'
                                ? 'left 0px'
                                : mirrorFeedMode === 'diag-back'
                                  ? 'right 0px'
                                  : undefined
                    }}
                  >
                    <div
                      style={{
                        position: 'absolute',
                        inset: 0,
                        width: '100%',
                        height: '100%',
                        overflow: mirrorFeedMode === 'both' ? 'hidden' : 'visible',
                        clipPath: mirrorFeedMode === 'both'

                          : undefined,
                        WebkitBoxReflect: mirrorFeedMode === 'both'
                          ? (mirrorHorizontalSource === 'bottom' ? 'above 0px' : 'below 0px')

                    >
                    {stageLayers.map(({ layer, clip, payload }) => {

                        position: 'absolute',
                        left: '50%',
                        top: '50%',
                        transform: `translate(calc(-50% + ${payload.x || 0}px), calc(-50% + ${payload.y || 0}px)) scale(${payload.scale || 1}) rotate(${payload.rotation || 0}deg)${transFx.transformExtra || ''}${animFx.transformExtra || ''}`,
                        opacity: clamp((payload.opacity ?? 1) * (transFx.opacity ?? 1) * (animFx.opacity ?? 1), 0, 1),
                        filter: `${buildEffectFilter(payload, project.meta.visualDNA)} ${transFx.filterExtra || ''}`.trim(),
                        boxShadow: selectedLayerId === layer.id && layer.type === 'media'
                          ? '0 0 0 1px rgba(87,154,255,0.95), 0 0 8px rgba(87,154,255,0.55)'
                          : undefined,
                        ...dnaStyle.style
                      };
                      if (layer.type === 'template' && payload.motionAsset) {
                        return renderTemplateAsset(layer, payload, clip, common);
                      }
                      if (payload.overlayKind === 'noise-surface') {
                        const cfg = payload.overlayConfig || {};
                        const rows = 10;
                        const cols = 15;
                        const overscan = 100;
                        const width = Math.max(200, Number(payload.width || 1920));
                        const height = Math.max(120, Number(payload.height || 1080));
                        const localSec = clip ? clamp(previewSec - clip.start, 0, Math.max(0, clip.end - clip.start)) : previewSec;
                        const t = Number(localSec || 0) * Number(cfg.speed || 0.01) * 30;
                        const maxOffset = Number(cfg.maxOffset || 50);
                        const r = Number(cfg.circleRadius || 5);
                        const dots = [];
                        for (let col = 0; col < cols; col += 1) {
                          for (let row = 0; row < rows; row += 1) {
                            const x = col * ((width + overscan) / cols);
                            const y = row * ((height + overscan) / rows);
                            const px = col / cols;
                            const py = row / rows;
                            const dx = pseudoNoise3D('x', px, py, t) * maxOffset;
                            const dy = pseudoNoise3D('y', px, py, t) * maxOffset;
                            const alpha = (pseudoNoise3D('opacity', col, row, t) + 1) / 2;
                            dots.push({ key: `${col}-${row}`, cx: x + dx, cy: y + dy, opacity: clamp(alpha, 0, 1) });
                          }
                        }

                      const intensity = clamp(raw * (fxTurbo ? 2.2 : 1.65), 0, 1);
                      const rotate = Number(cfg.masterRotate ?? 0);
                      const rX = Number(cfg.rX ?? 10) * intensity * 0.08;
                      const rY = Number(cfg.rY ?? -4) * intensity * 0.08;
                      const gX = Number(cfg.gX ?? 0) * intensity * 0.08;
                      const gY = Number(cfg.gY ?? 0) * intensity * 0.08;

                            <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(circle at 50% 50%, rgba(80,255,120,0.26), rgba(80,255,120,0))', transform: `translate(${gX}px, ${gY}px)`, mixBlendMode: 'screen', filter: `blur(${5 + intensity * 14}px)` }} />
                            <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(circle at 50% 50%, rgba(70,140,255,0.34), rgba(70,140,255,0))', transform: `translate(${bX}px, ${bY}px)`, mixBlendMode: 'screen', filter: `blur(${6 + intensity * 16}px)` }} />

                          })() :

                          })() :
                          effectSession.activeEffectId === 'halftone-pop' ? (() => {

                          })() :
                          ['mirror-matrix', 'mirror-matrix-duplicate'].includes(effectSession.activeEffectId) ? (() => {
                            const mirrorEffectId = effectSession.activeEffectId;
                            const mirror = ensureMirrorState(effectSession.valuesByEffect?.[mirrorEffectId] || {}, mirrorEffectId);
                            const lineThickness = clamp(Number(mirror.lineThickness ?? 40), 0, 100);
                            const centerX = clamp(Number(mirror.circleCenterX ?? 50), 0, 100);
                            const centerY = clamp(Number(mirror.circleCenterY ?? 50), 0, 100);
                            const circleRadius = clamp(Number(mirror.circleRadius ?? 48), 0, 100);
                            const circleFalloff = clamp(Number(mirror.circleFalloff ?? 35), 0, 100);
                            const lines = mirror.lineToggles || {};
                            const circular = mirror.circular || {};
                            const thicknessPx = Math.max(1, lineThickness / 5);
                            const layers = [];
                            if (lines.vertical || lines.both) layers.push(`linear-gradient(90deg, rgba(255,255,255,0) calc(50% - ${thicknessPx}px), rgba(255,255,255,.28) 50%, rgba(255,255,255,0) calc(50% + ${thicknessPx}px))`);
                            if (lines.horizontal || lines.both) layers.push(`linear-gradient(0deg, rgba(255,255,255,0) calc(50% - ${thicknessPx}px), rgba(255,255,255,.28) 50%, rgba(255,255,255,0) calc(50% + ${thicknessPx}px))`);
                            if (lines.diagonalFwd) layers.push(`linear-gradient(45deg, rgba(255,255,255,0) calc(50% - ${thicknessPx}px), rgba(255,255,255,.26) 50%, rgba(255,255,255,0) calc(50% + ${thicknessPx}px))`);
                            if (lines.diagonalBack) layers.push(`linear-gradient(135deg, rgba(255,255,255,0) calc(50% - ${thicknessPx}px), rgba(255,255,255,.26) 50%, rgba(255,255,255,0) calc(50% + ${thicknessPx}px))`);
                            if (circular.insideOut) layers.push(`radial-gradient(circle at ${centerX}% ${centerY}%, rgba(255,255,255,.24) 0%, rgba(255,255,255,0) ${Math.max(5, circleRadius)}%, rgba(255,255,255,.18) ${Math.min(100, circleRadius + circleFalloff)}%, rgba(255,255,255,0) 100%)`);
                            if (circular.outsideIn) layers.push(`radial-gradient(circle at ${centerX}% ${centerY}%, rgba(255,255,255,0) ${Math.max(3, circleRadius * 0.45)}%, rgba(255,255,255,.2) ${Math.max(8, circleRadius)}%, rgba(255,255,255,.26) 100%)`);
                            return layers.length ? layers.join(',') : 'none';

                          effectSession.activeEffectId === 'vignette-pulse' ? (() => {

                          : effectSession.activeEffectId === 'halftone-pop'

                          ? `blur(${Math.max(0, clamp(Number(effectSession.valuesByEffect?.[effectSession.activeEffectId]?.softness ?? 35), 0, 100) / 8)}px)`
                          : undefined
                      }}
                    />

                      targetSec = t;

                                setSelectedClipId(clip.id);
                                setSelectedLayerId(layer?.id || null);
                                const downX = e.clientX;
                                const downY = e.clientY;
                                const cutTimeAbs = snapTime(clientXToTime(e.clientX));
                                const anchorRect = e.currentTarget.getBoundingClientRect();
                                let dragged = false;
                                let cutTriggered = false;
                                if (cutHoldRef.current) clearTimeout(cutHoldRef.current);

                                  cutTriggered = true;
                                  splitClipAt(clip, cutTimeAbs, 'split');

                                    clearTimeout(cutHoldRef.current);
                                    cutHoldRef.current = null;

                                window.addEventListener('pointerup', onUp);
