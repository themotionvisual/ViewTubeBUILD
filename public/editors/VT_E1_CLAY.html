                                    ]
                                  }));
                                  setSelectedTransitionId(newId);
                                  return;
                                }
                                setSelectedTransitionId(transition.id);
                              }}
                              title="Click seam to edit transition, Shift+Click toggles group seam"
                            >
                              {label}
                            </button>
                          );
                        })}
                      </div>
                    )})}
                  </div>
                  {boxSelect && (
                    <div
                      style={{
                        position: 'absolute',
                        left: `${Math.min(boxSelect.x1, boxSelect.x2)}px`,
                        top: `${Math.min(boxSelect.y1, boxSelect.y2)}px`,
                        width: `${Math.abs(boxSelect.x2 - boxSelect.x1)}px`,
                        height: `${Math.abs(boxSelect.y2 - boxSelect.y1)}px`,
                        border: '1px dashed rgba(64,198,233,.95)',
                        background: 'rgba(64,198,233,.16)',
                        zIndex: 75,
                        pointerEvents: 'none'
                      }}
                    />
                  )}

                  <div style={{ position: 'absolute', top: 0, bottom: 0, left: `${timeToPx(playhead)}px`, width: '3px', background: COLORS.pink, zIndex: 82, pointerEvents: 'none' }} />
                  {hoverMarkerSec !== null && (
                    <div style={{ position: 'absolute', top: 0, bottom: 0, left: `${timeToPx(hoverMarkerSec)}px`, width: '2px', background: 'rgba(64,198,233,.35)', zIndex: 80, pointerEvents: 'none' }} />
                  )}
                  {previewMarkerSec !== null && (
                    <div style={{ position: 'absolute', top: 0, bottom: 0, left: `${timeToPx(previewMarkerSec)}px`, width: '4px', background: cursorPreviewMode === 'lite' ? 'rgba(64,198,233,.55)' : 'rgba(64,198,233,.9)', zIndex: 81, pointerEvents: 'none' }} />
                  )}
                </div>
              </div>
            </section>
          </main>

          <div style={{ display: 'none' }}>
            {audioClips.map(({ clip, layer }) => (
              <audio
                key={clip.id}
                ref={(node) => {
                  if (node) audioNodeMapRef.current.set(clip.id, node);
                  else audioNodeMapRef.current.delete(clip.id);
                }}
                src={layer.payload.mediaUrl || ''}
                preload="auto"
                playsInline
              />
            ))}
          </div>

          {contextMenu && (
            <div
              className="media-popup-card"
              style={{
                left: `${clamp(contextMenu.x, 146, window.innerWidth - 146)}px`,
                top: `${clamp(contextMenu.y, 136, window.innerHeight - 18)}px`,
                transform: 'translate(-50%, -100%)',
                width: '224px',
                padding: '8px',
                zIndex: 140,
                borderWidth: '4px'
              }}
              onClick={(e) => e.stopPropagation()}
            >
              <div className="flex flex-wrap justify-between gap-1 mb-2">
                {contextColorSwatches.map((c) => (
                  <button
                    key={c}
                    className="w-7 h-9 border-[3px] border-black rounded-full"
                    style={{ background: c }}
                    onClick={() => {
                      setClipColor(contextMenu.clipId, c);
                      setContextMenu(null);
                    }}
                  />
                ))}
              </div>
              <div className="flex items-center justify-center gap-1">
                <button className="neo-btn w-12 h-12 p-0 inline-flex items-center justify-center" style={{ borderWidth: '2px', background: COLORS.cyan }} onClick={() => {
                  setClipVisible(contextMenu.clipId, !contextMenu.visible);
                  setContextMenu(null);
                }} title="Toggle visibility">{contextMenu.visible ? <Eye size={24} /> : <EyeOff size={24} />}</button>
                <button className="neo-btn w-12 h-12 p-0 inline-flex items-center justify-center" style={{ borderWidth: '2px', background: COLORS.yellow }} onClick={() => {
                  duplicateClipAndLayer(contextMenu.clipId);
                  setContextMenu(null);
                }} title="Duplicate clip"><Copy size={24} /></button>
                <button className="neo-btn w-12 h-12 p-0 inline-flex items-center justify-center" style={{ background: COLORS.magenta, borderWidth: '2px' }} onClick={() => {
                  removeClipAndLayer(contextMenu.clipId);
                  setContextMenu(null);
                }} title="Delete clip"><Trash2 size={24} /></button>
                {selectedClipIds.length > 1 && (
                  <button className="neo-btn w-12 h-12 p-0 inline-flex items-center justify-center" style={{ background: COLORS.green, borderWidth: '2px' }} onClick={() => toggleGroupClips()} title="Group/Ungroup selected clips"><Link size={24} /></button>
                )}
              </div>
              <div style={{ position: 'absolute', left: '50%', bottom: '-10px', transform: 'translateX(-50%)', width: 0, height: 0, borderLeft: '8px solid transparent', borderRight: '8px solid transparent', borderTop: '10px solid #111' }} />
              <div style={{ position: 'absolute', left: '50%', bottom: '-8px', transform: 'translateX(-50%)', width: 0, height: 0, borderLeft: '7px solid transparent', borderRight: '7px solid transparent', borderTop: '9px solid #fff' }} />
            </div>
          )}
          {featureFlags.commandPalette && showCommandPalette && (
            <div
              className="media-popup-overlay"
              onClick={() => setShowCommandPalette(false)}
              style={{ zIndex: 190 }}
            >
              <div className="media-popup-card" style={{ width: 'min(560px, 92vw)', zIndex: 191 }} onClick={(e) => e.stopPropagation()}>
                <div className="text-xs font-black uppercase mb-2">Command Palette</div>
                <input
                  autoFocus
                  className="w-full border-4 border-black p-2 text-xs font-black mb-2"
                  placeholder="Type command..."
                  value={paletteQuery}
                  onChange={(e) => setPaletteQuery(e.target.value)}
                />
                <div className="max-h-[320px] overflow-y-auto neo-scroll space-y-1">
                  {filteredCommandActions.map((item) => (
                    <button
                      key={item.id}
                      className="neo-btn w-full justify-start"
                      onClick={() => {
                        item.run();
                        setShowCommandPalette(false);
                        setPaletteQuery('');
                      }}
                    >
                      {item.label}
                    </button>
                  ))}
                  {!filteredCommandActions.length && (
                    <div className="text-[11px] font-black opacity-70">No commands found.</div>
                  )}
                </div>
              </div>
            </div>
          )}
          {showTopbarHelp && (
            <div className="media-popup-overlay" style={{ zIndex: 191 }} onClick={() => setShowTopbarHelp(false)}>
              <div className="media-popup-card" style={{ width: 'min(560px, 92vw)', zIndex: 192 }} onClick={(e) => e.stopPropagation()}>
                <div className="text-xs font-black uppercase mb-2">Top Timeline Controls</div>
                <div className="grid grid-cols-2 gap-2 text-[11px] font-black">
                  <div className="border-2 border-black p-2 bg-white inline-flex items-center gap-2"><Workflow size={14} /> Split selected clips at playhead.</div>
                  <div className="border-2 border-black p-2 bg-white inline-flex items-center gap-2"><Link size={14} /> Close timeline gaps per track.</div>
                  <div className="border-2 border-black p-2 bg-white inline-flex items-center gap-2"><Crosshair size={14} /> Fit zoom to selected clips.</div>
                  <div className="border-2 border-black p-2 bg-white inline-flex items-center gap-2"><Layers size={14} /> Fit zoom to all clips.</div>
                  <div className="border-2 border-black p-2 bg-white inline-flex items-center gap-2"><Undo2 size={14} /> Open undo history jump panel.</div>
                  <div className="border-2 border-black p-2 bg-white inline-flex items-center gap-2"><Magnet size={14} /> Snap toggle and strength selector.</div>
                  <div className="border-2 border-black p-2 bg-white inline-flex items-center gap-2"><Play size={14} /> Play / pause preview timeline.</div>
                  <div className="border-2 border-black p-2 bg-white inline-flex items-center gap-2"><HelpCircle size={14} /> Toggle this help popup.</div>
                </div>
              </div>
            </div>
          )}
          {showShortcutsHelp && (
            <div className="media-popup-overlay" style={{ zIndex: 192 }} onClick={() => setShowShortcutsHelp(false)}>
              <div className="media-popup-card" style={{ width: 'min(520px, 92vw)', zIndex: 193 }} onClick={(e) => e.stopPropagation()}>
                <div className="text-xs font-black uppercase mb-2">Keyboard Shortcuts</div>
                <div className="grid grid-cols-2 gap-2 text-[11px] font-black">
                  <div className="border-2 border-black p-2 bg-white">`?` · Toggle this panel</div>
                  <div className="border-2 border-black p-2 bg-white">`/` · Command palette</div>
                  <div className="border-2 border-black p-2 bg-white">`Space` · Play / Pause</div>
                  <div className="border-2 border-black p-2 bg-white">`S` · Split selected clip</div>
                  <div className="border-2 border-black p-2 bg-white">`Shift+S` · Split all selected</div>
                  <div className="border-2 border-black p-2 bg-white">`Cmd/Ctrl+Z` · Undo</div>
                  <div className="border-2 border-black p-2 bg-white">`Shift+Cmd/Ctrl+Z` · Redo</div>
                  <div className="border-2 border-black p-2 bg-white">`Backspace/Delete` · Delete selected</div>
                </div>
              </div>
            </div>
          )}
          {showHistoryPanel && (
            <div className="media-popup-overlay" style={{ zIndex: 194 }} onClick={() => setShowHistoryPanel(false)}>
              <div className="media-popup-card" style={{ width: 'min(620px, 92vw)', zIndex: 195 }} onClick={(e) => e.stopPropagation()}>
                <div className="text-xs font-black uppercase mb-2">Undo History</div>
                <div className="max-h-[360px] overflow-y-auto neo-scroll space-y-1">
                  {historyRef.current.map((snap, idx) => (
                    <button
                      key={`hist_${idx}`}
                      className="neo-btn w-full justify-between"
                      style={{ background: idx === historyIndexRef.current ? COLORS.yellow : COLORS.white }}
                      onClick={() => jumpToHistoryIndex(idx)}
                    >
                      <span>State {idx + 1}</span>
                      <span>{formatHMS(snap?.meta?.durationSec || 0)} · {(snap?.clips || []).length} clips</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}
          {showPatchDiff && pendingJsonDraft && (
            <div className="media-popup-overlay" style={{ zIndex: 197 }} onClick={() => { setShowPatchDiff(false); setPendingJsonDraft(null); }}>
              <div className="media-popup-card" style={{ width: 'min(640px, 92vw)', zIndex: 198 }} onClick={(e) => e.stopPropagation()}>
                <div className="text-xs font-black uppercase mb-2">Timeline Patch Diff</div>
                {(() => {
                  const diff = buildTimelinePatchDiff(project, pendingJsonDraft);
                  if (!diff) return null;
                  return (
                    <div className="text-[11px] font-black space-y-1 border-2 border-black p-2 bg-white mb-2">
                      <div>Added clips: {diff.addedClipIds.length}</div>
                      <div>Removed clips: {diff.removedClipIds.length}</div>
                      <div>Moved clips: {diff.movedClips}</div>
                      <div>Duration: {formatHMS(diff.beforeDurationSec)} → {formatHMS(diff.nextDurationSec)}</div>
                      <div>Tracks: {diff.beforeTrackCount} → {diff.nextTrackCount}</div>
                      <div>Layers: {diff.beforeLayerCount} → {diff.nextLayerCount}</div>
                    </div>
                  );
                })()}
                <div className="grid grid-cols-2 gap-2">
                  <button className="neo-btn" style={{ background: COLORS.green }} onClick={applyPendingJsonDraft}>Apply Patch</button>
                  <button className="neo-btn" style={{ background: COLORS.white }} onClick={() => { setShowPatchDiff(false); setPendingJsonDraft(null); }}>Cancel</button>
                </div>
              </div>
            </div>
          )}
          {trackSettingsFor && (
            <div className="media-popup-overlay" style={{ zIndex: 196 }} onClick={() => setTrackSettingsFor(null)}>
              <div className="media-popup-card" style={{ width: 'min(420px, 90vw)', zIndex: 197 }} onClick={(e) => e.stopPropagation()}>
                <div className="text-xs font-black uppercase mb-2">Timeline Layer Settings</div>
                <div className="text-[11px] font-black mb-2">
                  {project.tracks.find((t) => t.id === trackSettingsFor)?.name || 'Layer'}
                </div>
                {(() => {
                  const track = project.tracks.find((t) => t.id === trackSettingsFor);
                  if (!track) return null;
                  return (
                    <>
                      <div className="text-[10px] font-black uppercase mb-1">Track Controls</div>
                      <div className="grid grid-cols-4 gap-2 mb-2">
                        <button className="neo-btn" style={{ background: track.locked ? COLORS.green : COLORS.white }} onClick={() => toggleTrackFlag(track.id, 'locked')}>Lock</button>
                        <button className="neo-btn" style={{ background: track.solo ? COLORS.green : COLORS.white }} onClick={() => toggleTrackFlag(track.id, 'solo')}>Solo</button>
                        <button className="neo-btn" style={{ background: track.muted ? COLORS.orange : COLORS.white }} onClick={() => toggleTrackFlag(track.id, 'muted')}>Mute</button>
                        <button className="neo-btn" style={{ background: COLORS.yellow }} onClick={resetTrackMixFlags}>Reset</button>
                      </div>
                    </>
                  );
                })()}
                <div className="text-[10px] font-black uppercase mb-1">Tint Overlay (20%)</div>
                <div className="flex flex-wrap gap-1 mb-2">
                  {contextColorSwatches.map((c) => (
                    <button
                      key={`tint_${c}`}
                      className="w-8 h-8 border-2 border-black rounded-md"
                      style={{ background: c }}
                      onClick={() => updateTrackUiState(trackSettingsFor, { tintColor: c })}
                    />
                  ))}
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <button className="neo-btn" style={{ background: COLORS.white }} onClick={() => updateTrackUiState(trackSettingsFor, { tintColor: null })}>Clear Tint</button>
                  <button className="neo-btn" style={{ background: COLORS.cyan }} onClick={() => setTrackSettingsFor(null)}>Done</button>
                </div>
              </div>
            </div>
          )}
          {showProjectPicker && (
            <div className="media-popup-overlay" style={{ zIndex: 195 }} onClick={() => setShowProjectPicker(false)}>
              <div className="media-popup-card" style={{ width: 'min(700px, 92vw)', zIndex: 196 }} onClick={(e) => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-2">
                  <div className="text-xs font-black uppercase">Load Project</div>
                  <button className="neo-btn !min-h-0 px-2 py-1" style={{ background: COLORS.white }} onClick={() => {
                    fetchProjectList(projectOwnerId).catch((error) => setProjectSaveError(String(error?.message || error || 'Could not refresh projects.')));
                  }}>
                    Refresh
                  </button>
                </div>
                <div className="flex items-center gap-2 border-2 border-black rounded-md p-2 bg-white mb-2">
                  <Search size={14} />
                  <input
                    className="w-full text-xs font-black outline-none"
                    placeholder="Search projects..."
                    value={projectPickerSearch}
                    onChange={(e) => setProjectPickerSearch(e.target.value)}
                  />
                </div>
                <div className="max-h-[320px] overflow-y-auto neo-scroll space-y-1 mb-2">
                  {projectList
                    .filter((entry) => {
                      const q = projectPickerSearch.trim().toLowerCase();
                      if (!q) return true;
                      return String(entry?.name || '').toLowerCase().includes(q) || String(entry?.projectId || '').toLowerCase().includes(q);
                    })
                    .map((entry) => (
                      <button
                        key={entry.projectId}
                        className="neo-btn w-full justify-between"
                        style={{ background: entry.projectId === activeProjectId ? COLORS.yellow : COLORS.white }}
                        onClick={() => {
                          loadProjectFromCloud(entry.projectId).then(() => setShowProjectPicker(false)).catch((error) => {
                            setProjectSaveState('failed');
                            setProjectSaveError(String(error?.message || error || 'Load failed.'));
                          });
                        }}
                      >
                        <span className="truncate max-w-[65%]">{entry.name || 'Untitled Project'}</span>
                        <span className="text-[10px]">{entry.updatedAt ? new Date(entry.updatedAt).toLocaleString() : ''}</span>
                      </button>
                    ))}
                  {!projectList.length && (
                    <div className="text-[11px] font-black opacity-70">No cloud projects yet. Save one first.</div>
                  )}
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <button className="neo-btn" style={{ background: COLORS.white }} onClick={() => setShowProjectPicker(false)}>Close</button>
                  <button
                    className="neo-btn"
                    style={{ background: COLORS.green }}
                    onClick={() => {
                      saveProjectToCloud({ explicit: true }).catch((error) => {
                        setProjectSaveState('failed');
                        setProjectSaveError(String(error?.message || error || 'Save failed.'));
                      });
                    }}
                  >
                    Save Current First
                  </button>
                </div>
              </div>
            </div>
          )}
          {featureFlags.restorePicker && showRestorePicker && autosaveSnapshots.length > 0 && (
            <div className="media-popup-overlay" style={{ zIndex: 195 }} onClick={() => setShowRestorePicker(false)}>
              <div className="media-popup-card" style={{ width: 'min(600px, 92vw)', zIndex: 196 }} onClick={(e) => e.stopPropagation()}>
                <div className="text-xs font-black uppercase mb-2">Restore Snapshot</div>
                <div className="max-h-[320px] overflow-y-auto neo-scroll space-y-1 mb-2">
                  {autosaveSnapshots.map((snap) => (
                    <button
                      key={snap.id}
                      className="neo-btn w-full justify-between"
                      onClick={() => {
                        const normalized = normalizeProject(snap.project);
                        setProject(normalized);
                        setShowRestorePicker(false);
                        markSaved(normalized);
                      }}
                    >
                      <span>Autosave</span>
                      <span>{new Date(snap.at).toLocaleString()}</span>
                    </button>
                  ))}
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <button className="neo-btn" style={{ background: COLORS.white }} onClick={() => setShowRestorePicker(false)}>Skip</button>
                  <button className="neo-btn" style={{ background: COLORS.magenta }} onClick={() => {
                    setAutosaveSnapshots([]);
                    try { localStorage.removeItem(autosaveKey); } catch {}
                    setShowRestorePicker(false);
                  }}>Clear Autosaves</button>
                </div>
              </div>
            </div>
          )}
          <div style={{ position: 'fixed', right: '16px', top: '16px', zIndex: 170, display: 'flex', gap: '8px' }}>
            <button
              className="neo-btn"
              style={{ background: focusMode ? COLORS.green : COLORS.white }}
              onClick={() => setFocusMode((v) => !v)}
              title="Toggle focus mode"
            >
              {focusMode ? 'Focus On' : 'Focus'}
            </button>
            <button
              className="neo-btn"
              style={{ background: COLORS.cyan }}
              onClick={() => setShowOnboarding(true)}
              title="Open quickstart"
            >
              Quickstart
            </button>
            <button
              className="neo-btn"
              style={{ background: COLORS.yellow }}
              onClick={() => setShowCommandPalette(true)}
              title="Open command palette"
            >
              / Commands
            </button>
          </div>
          {showOnboarding && (
            <div className="media-popup-overlay" style={{ zIndex: 210 }} onClick={() => setShowOnboarding(false)}>
              <div className="media-popup-card" style={{ width: 'min(560px, 92vw)', zIndex: 211 }} onClick={(e) => e.stopPropagation()}>
                <div className="text-xs font-black uppercase mb-2">Quickstart Guide</div>
                <div className="text-[11px] font-black leading-5 border-2 border-black rounded-md p-2 bg-white mb-2">
                  <div>1) Add media, text, shape, or template from the left panel.</div>
                  <div>2) Click media in the viewer or double-click a clip to open transform controls.</div>
                  <div>3) Drag clips on the timeline to time your edit and stack layers.</div>
                  <div>4) Use Project controls for New, Save, Load, Save As, and Duplicate.</div>
                  <div>5) Run Preflight + one-frame sanity before export.</div>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <button className="neo-btn" style={{ background: COLORS.white }} onClick={() => setShowOnboarding(false)}>Close</button>
                  <button className="neo-btn" style={{ background: COLORS.green }} onClick={() => { try { localStorage.setItem('vt_e1_onboarding_seen_v1', '1'); } catch {} setShowOnboarding(false); }}>Never Show</button>
                </div>
              </div>
            </div>
          )}
          {showTemplateCreator && (
            <div className="media-popup-overlay" style={{ zIndex: 200 }} onClick={() => setShowTemplateCreator(false)}>
              <div className="media-popup-card" style={{ width: 'min(480px, 92vw)', zIndex: 201, maxHeight: '80vh', overflow: 'hidden', display: 'flex', flexDirection: 'column' }} onClick={(e) => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-2">
                  <div className="text-xs font-black uppercase">Create Template</div>
                  <button className="kf-inline-btn text-lg" onClick={() => setShowTemplateCreator(false)}>✕</button>
                </div>
                {tplCreatorStep === 1 && (
                  <>
                    <div className="text-[10px] font-black uppercase mb-2 opacity-70">Choose Preset Combo</div>
                    <div className="overflow-y-auto neo-scroll" style={{ maxHeight: '55vh' }}>
                      <div className="grid grid-cols-3 gap-2">
                        {TEMPLATE_COMBO_PRESETS.map((combo) => {
                          const IconCmp = LucideIcons[toPascalIconName(combo.icon)] || Sparkles;
                          return (
                            <button
                              key={combo.id}
                              className="neo-btn flex-col gap-1 py-2"
                              style={{ background: combo.id === 'combo_custom' ? COLORS.purple : COLORS.white, color: combo.id === 'combo_custom' ? '#fff' : '#111', minHeight: '56px' }}
                              onClick={() => selectTemplateCombo(combo)}
                            >
                              <IconCmp size={16} strokeWidth={2.5} />
                              <span style={{ fontSize: '9px', lineHeight: 1.1 }}>{combo.label}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </>
                )}
                {tplCreatorStep === 2 && (
                  <>
                    <div className="flex items-center gap-2 mb-2">
                      <button className="kf-inline-btn text-sm" onClick={() => setTplCreatorStep(1)}>← Back</button>
                      <div className="text-[10px] font-black uppercase opacity-70">Style & Customize</div>
                    </div>
                    <div className="space-y-2 overflow-y-auto neo-scroll" style={{ maxHeight: '55vh' }}>
                      <div className="text-[10px] font-black uppercase">Visual Style</div>
                      <select
                        className="w-full border-2 border-black p-2 text-[10px] font-black uppercase bg-white rounded-md"
                        value={tplCreatorStyle}
                        onChange={(e) => setTplCreatorStyle(e.target.value)}
                      >
                        {STYLE_VARIANT_REGISTRY.map((s) => (
                          <option key={s} value={s}>{s}</option>
                        ))}
                      </select>
                      <div className="text-[10px] font-black uppercase">Primary Text</div>
                      <input
                        className="w-full border-2 border-black p-2 text-xs font-black uppercase rounded-md"
                        value={tplCreatorPrimary}
                        onChange={(e) => setTplCreatorPrimary(e.target.value)}
                        placeholder="SUBSCRIBE, LIKE VIDEO, etc."
                      />
                      <div className="text-[10px] font-black uppercase">Secondary Text</div>
                      <input
                        className="w-full border-2 border-black p-2 text-xs font-black uppercase rounded-md"
                        value={tplCreatorSecondary}
                        onChange={(e) => setTplCreatorSecondary(e.target.value)}
                        placeholder="Optional subtitle"
                      />
                      <div className="text-[10px] font-black uppercase">Icon</div>
                      <div className="flex items-center gap-2">
                        <select
                          className="w-full border-2 border-black p-2 text-[10px] font-black uppercase bg-white rounded-md"
                          value={tplCreatorIcon}
                          onChange={(e) => setTplCreatorIcon(e.target.value)}
                        >
                          {ICON_LIBRARY.map((iconName) => (
                            <option key={iconName} value={iconName}>{iconName}</option>
                          ))}
                        </select>
                        <TemplateIconByName iconName={tplCreatorIcon} size={22} />
                      </div>
                      <div className="text-[10px] font-black uppercase">Color</div>
                      <input
                        type="color"
                        className="w-full h-10 border-2 border-black rounded-md cursor-pointer"
                        value={tplCreatorColor}
                        onChange={(e) => setTplCreatorColor(e.target.value)}
                      />
                      <button
                        className="neo-btn w-full neo-shadow"
                        style={{ background: COLORS.green, fontSize: '12px', padding: '10px', marginTop: '8px' }}
                        onClick={addTemplateToTimeline}
                      >
                        <Sparkles size={16} /> Add to Timeline
                      </button>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
