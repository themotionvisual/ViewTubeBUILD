      const buildEffectFilter = (payload, variant = project.meta.visualDNA) => {
        const fx = Array.isArray(payload.effects) ? payload.effects : [];
        const segments = [
          `blur(${Number(payload.blur || 0)}px)`,
          `saturate(${Number(payload.saturation || 1)})`,
          `brightness(${Number(payload.brightness || 1)})`,
          `hue-rotate(${Number(payload.hue || 0)}deg)`
        ];
        fx.forEach((node) => {
          if (!node || node.enabled === false) return;
          const amt = Number(node.params?.amount ?? 0);
          switch (node.type) {
            case 'grayscale': segments.push(`grayscale(${clamp(amt, 0, 1)})`); break;
            case 'sepia': segments.push(`sepia(${clamp(amt, 0, 1)})`); break;
            case 'invert': segments.push(`invert(${clamp(amt, 0, 1)})`); break;
            case 'hueRotate90': segments.push(`hue-rotate(90deg)`); break;
            case 'hardContrast': segments.push(`contrast(${Math.max(1, amt || 2)})`); break;
            case 'contrast': segments.push(`contrast(${Math.max(0, amt || 1)})`); break;
            case 'saturate': segments.push(`saturate(${Math.max(0, amt || 1)})`); break;
            case 'hueRotate': segments.push(`hue-rotate(${amt}deg)`); break;
            case 'opacityFx': segments.push(`opacity(${clamp(amt, 0, 1)})`); break;
            case 'gamma': segments.push(`brightness(${Math.max(0, amt || 1)})`); break;
            case 'vibrance': segments.push(`saturate(${1 + amt})`); break;
            case 'temperature': segments.push(`sepia(${Math.max(0, amt)})`); break;
            case 'tint': segments.push(`hue-rotate(${amt * 120}deg)`); break;
            case 'exposure': segments.push(`brightness(${1 + amt})`); break;
            case 'highlights': segments.push(`contrast(${1 + amt * 0.5})`); break;
            case 'shadows': segments.push(`brightness(${1 + amt * 0.4})`); break;
            case 'clarity': segments.push(`contrast(${1 + amt * 0.7})`); break;
            case 'sharpen': segments.push(`contrast(${1 + amt * 0.2})`); break;
            case 'noise': segments.push(`grayscale(${Math.max(0, amt * 0.15)})`); break;
            case 'pixelate': segments.push(`contrast(${1 + amt * 0.05})`); break;
            case 'vignette': segments.push(`brightness(${1 - clamp(amt, 0, 1) * 0.2})`); break;
            case 'chromaticAberration': segments.push(`hue-rotate(${amt * 10}deg)`); break;
            case 'posterize': segments.push(`contrast(${1 + amt * 0.8})`); break;
            case 'glowBloom': segments.push(`drop-shadow(0 0 ${Math.max(0, amt * 12)}px rgba(255,255,255,.3))`); break;
            case 'scanlines': segments.push(`contrast(${1 + amt * 0.12})`); break;
            default: break;
          }
        });
        const dna = resolveDnaStyle(variant, 'generic', payload);
        if (dna.extraFilter) segments.push(dna.extraFilter.trim());
        return segments.join(' ');
      };

      const transitionInfluence = (clip) => {
        const transition = (project.transitions || []).find((t) => t.leftClipId === clip.id || t.rightClipId === clip.id);
        if (!transition) return { opacity: 1, transformExtra: '' };
        const left = project.clips.find((c) => c.id === transition.leftClipId);
        const right = project.clips.find((c) => c.id === transition.rightClipId);
        if (!left || !right) return { opacity: 1, transformExtra: '' };
        const d = Math.max(0.05, Number(transition.durationSec || 0.35));
        const intensity = clamp(Number(transition.params?.intensity ?? 1), 0, 3);
        const seam = (left.end + right.start) / 2;
        if (previewSec < seam - d || previewSec > seam + d) return { opacity: 1, transformExtra: '' };
        const t = clamp((previewSec - (seam - d)) / (2 * d), 0, 1);
        const isLeft = clip.id === left.id;
        const fade = isLeft ? (1 - t) : t;
        switch (transition.type) {
          case 'fade':
          case 'crossfade': return { opacity: fade, transformExtra: '' };
          case 'dipToColor': return { opacity: Math.max(0.15, fade), transformExtra: '' };
          case 'wipeLeft': return { opacity: fade, transformExtra: ` translateX(${(isLeft ? -1 : 1) * (1 - fade) * (22 * intensity)}px)` };
          case 'wipeRight': return { opacity: fade, transformExtra: ` translateX(${(isLeft ? 1 : -1) * (1 - fade) * (22 * intensity)}px)` };
          case 'slideLeft': return { opacity: fade, transformExtra: ` translateX(${(isLeft ? -1 : 1) * (1 - fade) * (38 * intensity)}px)` };
          case 'slideRight': return { opacity: fade, transformExtra: ` translateX(${(isLeft ? 1 : -1) * (1 - fade) * (38 * intensity)}px)` };
          case 'zoom': return { opacity: fade, transformExtra: ` scale(${1 - (0.08 * intensity) + (fade * 0.16 * intensity)})` };
          case 'blurDissolve': return { opacity: fade, transformExtra: '' };
          default: return { opacity: isLeft ? 1 : t, transformExtra: '' };
        }
      };

      const easeByName = (t, name) => {
        const x = clamp(t, 0, 1);
        if (name === 'easeOutBack') {
          const c1 = 1.70158;
          const c3 = c1 + 1;
          return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
        }
        if (name === 'easeOutCubic') return 1 - Math.pow(1 - x, 3);
        if (name === 'easeOutExpo') return x === 1 ? 1 : 1 - Math.pow(2, -10 * x);
        return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
      };

      const lookupAnimPreset = (id, isOutro = false) => {
        if (!id) return null;
        const source = isOutro ? OUTRO_PRESETS : INTRO_PRESETS;
        return source.find((p) => p.id === id) || null;
      };

      const clipEntryExitInfluence = (clip) => {
        if (!clip) return { opacity: 1, transformExtra: '' };
        const introDur = Math.max(0, Number(clip.introDurationSec || 0));
        const outroDur = Math.max(0, Number(clip.outroDurationSec || 0));
        const tIn = clamp((previewSec - clip.start) / introDur, 0, 1);
        const tOut = clamp((clip.end - previewSec) / outroDur, 0, 1);
        const introActive = introDur > 0 && previewSec <= (clip.start + introDur);
        const outroActive = outroDur > 0 && previewSec >= (clip.end - outroDur);
        const introPreset = lookupAnimPreset(clip.introAnimationId, false);
        const outroPreset = lookupAnimPreset(clip.outroAnimationId, true);
        let opacity = 1;
        let transforms = [];

        if (introActive && introPreset) {
          const e = easeByName(tIn, introPreset.ease);
          const s = (introPreset.strength || 1) * normalizeAnimLevel(clip.introLevel);
          opacity = Math.min(opacity, e);
          if (introPreset.family === 'slideUp') transforms.push(` translateY(${(1 - e) * (64 * s)}px)`);
          if (introPreset.family === 'slideRight') transforms.push(` translateX(${(1 - e) * (-88 * s)}px)`);
          if (introPreset.family === 'slideLeft') transforms.push(` translateX(${(1 - e) * (88 * s)}px)`);
          if (introPreset.family === 'dropIn') transforms.push(` translateY(${(1 - e) * (-84 * s)}px)`);
          if (introPreset.family === 'zoomIn') transforms.push(` scale(${1 - ((0.32 * s) * (1 - e))})`);
          if (introPreset.family === 'zoomOut') transforms.push(` scale(${1 + ((0.32 * s) * (1 - e))})`);
          if (introPreset.family === 'spinIn') transforms.push(` rotate(${(1 - e) * (-65 * s)}deg) scale(${0.75 + (0.25 * e)})`);
          if (introPreset.family === 'bounceIn') transforms.push(` translateY(${Math.sin((1 - e) * Math.PI) * (20 * s)}px) scale(${0.9 + 0.1 * e})`);
        }

        if (outroActive && outroPreset) {
          const e = easeByName(tOut, outroPreset.ease);
          const s = (outroPreset.strength || 1) * normalizeAnimLevel(clip.outroLevel);
          opacity = Math.min(opacity, e);
          if (outroPreset.family === 'slideUp') transforms.push(` translateY(${(1 - e) * (-64 * s)}px)`);
          if (outroPreset.family === 'slideRight') transforms.push(` translateX(${(1 - e) * (88 * s)}px)`);
          if (outroPreset.family === 'slideLeft') transforms.push(` translateX(${(1 - e) * (-88 * s)}px)`);
          if (outroPreset.family === 'dropIn') transforms.push(` translateY(${(1 - e) * (84 * s)}px)`);
          if (outroPreset.family === 'zoomIn') transforms.push(` scale(${1 - ((0.32 * s) * (1 - e))})`);
          if (outroPreset.family === 'zoomOut') transforms.push(` scale(${1 + ((0.32 * s) * (1 - e))})`);
          if (outroPreset.family === 'spinIn') transforms.push(` rotate(${(1 - e) * (65 * s)}deg) scale(${1 - (0.25 * (1 - e))})`);
          if (outroPreset.family === 'bounceIn') transforms.push(` translateY(${Math.sin((1 - e) * Math.PI) * (-20 * s)}px)`);
        }

        return { opacity: clamp(opacity, 0, 1), transformExtra: transforms.join('') };
      };

      const renderCamera = () => {
        const list = [...(project.camera.keyframes || [])].sort((a, b) => a.offsetSec - b.offsetSec);
        const evaluate = (prop, fallback) => {
          const points = list
            .filter((kf) => Object.prototype.hasOwnProperty.call(kf.values || {}, prop))
            .map((kf) => ({ t: kf.offsetSec, v: kf.values[prop] }));
          if (!points.length) return fallback;
          if (previewSec < points[0].t) return fallback;
          if (previewSec === points[0].t) return points[0].v;
          if (previewSec >= points[points.length - 1].t) return points[points.length - 1].v;
          let L = points[0];
          let R = points[points.length - 1];
          for (let i = 0; i < points.length - 1; i += 1) {
            if (previewSec >= points[i].t && previewSec <= points[i + 1].t) {
              L = points[i];
              R = points[i + 1];
              break;
            }
          }
          const span = R.t - L.t || 1;
          const t = clamp((previewSec - L.t) / span, 0, 1);
          return Number(L.v) + (Number(R.v) - Number(L.v)) * t;
        };

        return {
          x: evaluate('x', project.camera.x),
          y: evaluate('y', project.camera.y),
          z: evaluate('z', project.camera.z),
          scale: evaluate('scale', project.camera.scale),
          rotate: evaluate('rotate', project.camera.rotate)
        };
      };

      const cam = renderCamera();

      const stageLayers = useMemo(() => {
        const trackOrder = Object.fromEntries(sortedTracks.map((t, i) => [t.id, i]));
        return project.layers
          .filter((l) => l.visible && l.type !== 'audio')
          .map((layer) => {
            const clip = project.clips.find((c) => c.layerId === layer.id && previewSec >= c.start && previewSec <= c.end);
            if (!clip) return null;
            const payload = evaluateLayerPayloadAt(layer, clip, previewSec);
            if (!payload || Number(payload.opacity) <= 0) return null;
            return {
              layer,
              clip,
              payload,
              order: trackOrder[layer.trackId] ?? 999
            };
          })
          .filter(Boolean)
          .sort((a, b) => b.order - a.order);
      }, [project.layers, project.clips, previewSec, sortedTracks]);

      const activeAudioClips = useMemo(() => (
        project.layers
          .filter((layer) => layer.type === 'audio' && layer.visible !== false && layer.payload?.mediaUrl)
          .map((layer) => {
            const clip = project.clips.find((c) => c.layerId === layer.id && previewSec >= c.start && previewSec <= c.end);
            if (!clip) return null;
            const payload = evaluateLayerPayloadAt(layer, clip, previewSec);
            if (!payload) return null;
            return { layer, clip, payload };
          })
          .filter(Boolean)
      ), [project.layers, project.clips, previewSec]);

      const audioClips = useMemo(() => (
        project.layers
          .filter((layer) => layer.type === 'audio' && layer.payload?.mediaUrl)
          .map((layer) => {
            const clip = project.clips.find((c) => c.layerId === layer.id);
            if (!clip) return null;
            return { layer, clip };
          })
          .filter(Boolean)
      ), [project.layers, project.clips]);

      useEffect(() => {
        activeAudioClips.forEach(({ clip, payload }) => {
          const node = audioNodeMapRef.current.get(clip.id);
          if (!node) return;
          const localT = clipAbsToLocal(clip, previewSec);
          const vol = clamp(Number(payload.volume ?? 0.6), 0, 1);
          node.muted = Boolean(payload.muted);
          node.volume = vol;
          if (Math.abs((node.currentTime || 0) - localT) > 0.22) node.currentTime = localT;
          if (isPlaying) node.play().catch(() => {});
          else node.pause();
        });

        audioNodeMapRef.current.forEach((node, clipId) => {
          if (activeAudioClips.some((a) => a.clip.id === clipId)) return;
          node.pause();
        });
      }, [activeAudioClips, isPlaying, previewSec]);

      const aspectButtons = (
        <div className="inline-flex items-center gap-1 rounded-xl border-2 border-black bg-white p-1">
          <button
            className="neo-btn !min-h-0 px-2 py-1"
            style={{ background: project.meta.aspectRatio === '16:9' ? '#111' : COLORS.white, color: project.meta.aspectRatio === '16:9' ? '#fff' : '#111', borderRadius: '8px' }}
            onClick={() => updateMeta({ aspectRatio: '16:9' })}
          >16:9</button>
          <button
            className="neo-btn !min-h-0 px-2 py-1"
            style={{ background: project.meta.aspectRatio === '9:16' ? '#111' : COLORS.white, color: project.meta.aspectRatio === '9:16' ? '#fff' : '#111', borderRadius: '8px' }}
            onClick={() => updateMeta({ aspectRatio: '9:16' })}
          >9:16</button>
        </div>
      );

      const colorSwatches = [
        COLORS.pink, COLORS.orange, COLORS.yellow, COLORS.green, COLORS.cyan, COLORS.blue, COLORS.purple, COLORS.magenta
      ];
      const isVerticalAspect = project.meta.aspectRatio === '9:16';

      const timelineTrackHeight = sortedTracks.length <= 2 ? TRACK_HEIGHT_LARGE : TRACK_HEIGHT_SMALL;
      const cameraTrackHeight = Math.max(24, Math.round(timelineTrackHeight * 0.35));
      const timelineTopPad = sortedTracks.length <= 2 ? 11 : 8;
      const timelineClipHeight = timelineTrackHeight - (timelineTopPad * 2);
      const COLLAPSED_TRACK_HEIGHT = 2;
      const transitionMap = new Map((project.transitions || []).map((t) => [`${t.leftClipId}_${t.rightClipId}`, t]));
      const isTrackVisibleInViewport = (trackId) => {
        const clips = project.clips.filter((c) => c.trackId === trackId);
        if (!clips.length) return false;
        return clips.some((c) => !(c.end < timelineViewport.start || c.start > timelineViewport.end));
      };
      const getTrackRowHeight = (trackId) => {
        const ui = project.trackUiState?.[trackId] || {};
        const trackMeta = project.tracks.find((t) => t.id === trackId);
        const sizeMode = Number.isInteger(ui.sizeMode) ? clamp(ui.sizeMode, 0, TRACK_SIZE_MODES.length - 1) : 1;
        const expandedHeight = TRACK_SIZE_MODES[sizeMode];
        const justCreated = Number(ui.justCreatedUntil || 0) > Date.now();
        if (trackMeta?.kind === AUDIO_TRACK_KIND) return Math.max(28, expandedHeight);
        if (justCreated) return expandedHeight;
        if (ui.collapsedManual) return COLLAPSED_TRACK_HEIGHT;
        const autoCollapsed = !isTrackVisibleInViewport(trackId);
        if (ui.isDropTarget || hoverTrackId === trackId) return expandedHeight;
        return autoCollapsed ? COLLAPSED_TRACK_HEIGHT : expandedHeight;
      };
      const trackLayout = useMemo(() => {
        let top = cameraTrackHeight;
        return sortedTracks.map((track, index) => {
          const height = getTrackRowHeight(track.id);
          const row = { track, index, top, height };
          top += height;
          return row;
        });
      }, [sortedTracks, cameraTrackHeight, project.trackUiState, timelineViewport, hoverTrackId, project.clips]);
      const timelineRowsHeight = trackLayout.reduce((sum, row) => sum + row.height, 0);
      const trackIndexFromY = (relativeY) => {
        let acc = 0;
        for (let i = 0; i < trackLayout.length; i += 1) {
          const h = trackLayout[i].height;
          if (relativeY >= acc && relativeY < acc + h) return i;
          acc += h;
        }
        return clamp(trackLayout.length - 1, 0, trackLayout.length - 1);
      };
      const dividerFromY = (relativeY, threshold = 7) => {
        let acc = 0;
        const visualCount = sortedTracks.filter((t) => t.kind !== AUDIO_TRACK_KIND).length;
        for (let i = 0; i < visualCount; i += 1) {
          if (!trackLayout[i]) break;
          acc += trackLayout[i].height;
          if (Math.abs(relativeY - acc) <= threshold) {
            return { near: true, dividerIndex: i + 1 };
          }
        }
        return { near: false, dividerIndex: -1 };
      };
      const cycleTrackSizeMode = (trackId) => {
        const current = Number.isInteger(project.trackUiState?.[trackId]?.sizeMode)
          ? project.trackUiState[trackId].sizeMode
          : 1;
        updateTrackUiState(trackId, { sizeMode: (current + 1) % TRACK_SIZE_MODES.length });
      };
      const clipRectsInTimeline = () => {
        const byTrack = new Map(trackLayout.map((row) => [row.track.id, row]));
        return project.clips
          .map((clip) => {
            const row = byTrack.get(clip.trackId);
            if (!row) return null;
            const left = timeToPx(clip.start);
            const width = durationOf(clip) * pxPerSec;
            return {
              id: clip.id,
              left,
              top: row.top,
              right: left + width,
              bottom: row.top + row.height
            };
          })
          .filter(Boolean);
      };
      const selectClipsInBox = (box, additive = false) => {
        if (!box) return;
        const x1 = Math.min(box.x1, box.x2);
        const x2 = Math.max(box.x1, box.x2);
        const y1 = Math.min(box.y1, box.y2);
        const y2 = Math.max(box.y1, box.y2);
        const ids = clipRectsInTimeline()
          .filter((r) => !(r.right < x1 || r.left > x2 || r.bottom < y1 || r.top > y2))
          .map((r) => r.id);
        const nextIds = additive ? Array.from(new Set([...(selectedClipIds || []), ...ids])) : ids;
        setSelectedClipIds(nextIds);
        if (nextIds.length) {
          setSelectedClipId(nextIds[nextIds.length - 1]);
          const clip = project.clips.find((c) => c.id === nextIds[nextIds.length - 1]);
          if (clip) setSelectedLayerId(clip.layerId);
        }
      };

                    if (!e.shiftKey) {
                      setSelectedClipIds([]);
                      setSelectedClipId(null);
                    }
                    return;
                  }
                  dragRef.current = { type: 'playhead' };
                  setDragState({ type: 'playhead' });
                }}
              >
                <div ref={timelineContentRef} style={{ width: `${timelineContentWidth}px`, minHeight: `${cameraTrackHeight + timelineRowsHeight}px`, position: 'relative', paddingRight: '120px' }}>
                  <div style={{ height: `${cameraTrackHeight}px`, borderBottom: '3px solid #111', background: '#ececec', position: 'relative' }}>
                    <div className="timeline-label h-full flex items-center px-3 font-black text-xs">Camera</div>
                    {Array.from({ length: Math.ceil(project.meta.durationSec) + 1 }).map((_, sec) => (
                      <div key={`tick_${sec}`} style={{ position: 'absolute', left: `${timeToPx(sec)}px`, top: 0, width: '1px', height: '13px', borderLeft: '1px solid rgba(120,120,120,.35)', fontSize: '10px', fontWeight: 800, color: '#444' }}>
                        <span style={{ position: 'absolute', top: 2, left: '50%', transform: 'translateX(-50%)' }}>{sec}</span>
                      </div>
                    ))}
                    {project.camera.keyframes.map((kf) => (
                      <div
                        key={kf.id}
                        className="kf-diamond"
                        style={{ width: '14px', height: '14px', left: `${timeToPx(kf.offsetSec) - 7}px`, top: `${cameraTrackHeight / 2 - 7}px`, background: COLORS.cyan, borderWidth: '1.5px' }}
                        onPointerDown={(e) => { e.stopPropagation(); startCameraKfDrag(kf.id); }}
                        onDoubleClick={(e) => {
                          e.stopPropagation();
                          deleteCameraKeyframe(kf.id);
                        }}
                      />
                    ))}
                  </div>
                  <div
                    style={{
                      position: 'absolute',
                      top: 0,
                      bottom: 0,
                      left: `${GUTTER}px`,
                      right: 0,
                      pointerEvents: 'none',
                      zIndex: 6,
                      backgroundImage: 'repeating-linear-gradient(to right, rgba(120,120,120,.36) 0 1px, transparent 1px 100%)',
                      backgroundSize: `${Math.max(2, pxPerSec * 5)}px 100%`,
                      backgroundPosition: '0 0'
                    }}
                  />

                  <div ref={tracksRegionRef}>
                  {trackLayout.map((rowMeta) => {
                      const track = rowMeta.track;
                      return (
                      <div key={track.id} style={{ height: `${rowMeta.height}px`, borderBottom: `2px dashed ${dividerCue.index === rowMeta.index + 1 && dividerCue.flash ? COLORS.blue : '#b3b3b3'}`, position: 'relative', overflow: 'visible' }}>
                        <div className="timeline-label h-full flex items-center justify-center px-1">
                          {(() => {
                            const btnH = clamp(Math.floor(rowMeta.height * 0.68), 12, 34);
                            const btnW = clamp(Math.floor(rowMeta.height * 0.72), 12, 38);
                            const iconW = clamp(Math.floor(btnW * 0.62), 8, 22);
                            const iconH = clamp(Math.floor(btnH * 0.52), 6, 14);
                            return (
                          <button
                            className="neo-btn"
                            title="Cycle track row size"
                            onClick={(e) => { e.stopPropagation(); cycleTrackSizeMode(track.id); }}
                            style={{ background: COLORS.white, width: `${btnW}px`, height: `${btnH}px`, minHeight: `${btnH}px`, padding: 0 }}
                          >
                            <img src={TIMELINE_SIZE_ICON} alt="" style={{ width: `${iconW}px`, height: `${iconH}px`, objectFit: 'contain' }} />
                          </button>
                            );
                          })()}
                        </div>

                        {project.clips.filter((c) => c.trackId === track.id).map((clip) => {
                          const layer = project.layers.find((l) => l.id === clip.layerId);
                          const selected = selectedClipIds.includes(clip.id) || clip.id === selectedClipId;
                          const flatLeft = connectedAtLeft(clip);
                          const flatRight = connectedAtRight(clip);
                          const rowVisualHeight = rowMeta.height;
                          const rowTop = 0;
                          const visualRow = Math.max(2, rowVisualHeight);
                          const clipTop = rowTop;
                          return (
                            <div
                              key={clip.id}
                              style={{
                                position: 'absolute',
                                left: `${timeToPx(clip.start)}px`,
                                top: `${clipTop}px`,
                                width: `${durationOf(clip) * pxPerSec}px`,
                                height: `${visualRow}px`,
                                border: '2.5px solid #111',
                                borderRadius: `${flatLeft ? 0 : 10}px ${flatRight ? 0 : 10}px ${flatRight ? 0 : 10}px ${flatLeft ? 0 : 10}px`,
                                background: clip.color,
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'center',
                                fontSize: '11px',
                                fontWeight: 900,
                                zIndex: selected ? 20 : 10,
                                boxShadow: selected
                                  ? '0 0 0 1.5px rgba(87,154,255,0.98), 0 0 16px rgba(87,154,255,0.9), 0 0 28px rgba(87,154,255,0.55)'
                                  : ((flatLeft || flatRight) ? 'inset 0 0 0 1px rgba(87,154,255,0.35)' : 'none')
                              }}
                              onPointerDown={(e) => {
                                e.stopPropagation();
                                if (e.shiftKey) {
                                  setSelectedClipIds((prev) => {
                                    if (prev.includes(clip.id)) return prev.filter((id) => id !== clip.id);
                                    return [...prev, clip.id];
                                  });
                                  setSelectedClipId(clip.id);
                                  setSelectedLayerId(layer?.id || null);
                                  return;
                                }
                                const preserveGroup = selectedClipIds.length > 1 && selectedClipIds.includes(clip.id);
                                const dragIds = preserveGroup ? [...selectedClipIds] : [clip.id];
                                if (!preserveGroup) setSelectedClipIds([clip.id]);
                                setSelectedClipId(clip.id);
                                setSelectedLayerId(layer?.id || null);
                                const downX = e.clientX;
                                const downY = e.clientY;
                                const cutTimeAbs = snapTime(clientXToTime(e.clientX));
                                const anchorRect = e.currentTarget.getBoundingClientRect();
                                let dragged = false;
                                let cutTriggered = false;
                                if (cutHoldRef.current) clearTimeout(cutHoldRef.current);
                                cutHoldRef.current = setTimeout(() => {
                                  cutTriggered = true;
                                  splitClipAt(clip, cutTimeAbs, 'split');
                                }, 800);
                                const onMove = (ev) => {
                                  const moved = Math.abs(ev.clientX - downX) > 3 || Math.abs(ev.clientY - downY) > 3;
                                  if (!moved || dragged || cutTriggered) return;
                                  dragged = true;
                                  if (cutHoldRef.current) {
                                    clearTimeout(cutHoldRef.current);
                                    cutHoldRef.current = null;
                                  }
                                  startClipDrag(e, clip, dragIds);
                                };
                                const onUp = (ev) => {
                                  window.removeEventListener('pointermove', onMove);
                                  window.removeEventListener('pointerup', onUp);
                                  if (cutHoldRef.current) {
                                    clearTimeout(cutHoldRef.current);
                                    cutHoldRef.current = null;
                                  }
                                  if (dragged || cutTriggered) return;
                                  const tapSec = snapTime(clientXToTime(ev.clientX));
                                  registerClipTap(clip, layer, tapSec, anchorRect);
                                };
                                window.addEventListener('pointermove', onMove);
                                window.addEventListener('pointerup', onUp);
                              }}
                              onContextMenu={(e) => {
                                e.preventDefault();
                                e.stopPropagation();
                                const anchorRect = e.currentTarget.getBoundingClientRect();
                                openClipMenu(clip.id, layer?.visible !== false, anchorRect);
                              }}
                            >
                              <div
                                style={{ position: 'absolute', left: '-4px', top: '-4px', bottom: '-4px', width: '10px', cursor: 'ew-resize', background: 'transparent' }}
                                onPointerDown={(e) => { e.stopPropagation(); startTrim(clip, 'left'); }}
                              />

                              <span style={{ position: 'absolute', top: 3, left: 6, pointerEvents: 'none' }}>
                                {layer?.payload?.layerName || layer?.type || 'Layer'}
                              </span>

                              {layer?.type === 'audio' && (
                                <div style={{ position: 'absolute', left: '12px', right: '12px', bottom: '6px', display: 'grid', gridTemplateColumns: 'repeat(24, minmax(0,1fr))', gap: '2px', pointerEvents: 'none' }}>
                                  {Array.from({ length: 24 }).map((_, i) => (
                                    <div key={`wv_${clip.id}_${i}`} style={{ height: `${6 + ((i * 7) % 12)}px`, borderRadius: '2px', background: i % 2 ? 'rgba(255,255,255,.22)' : 'rgba(255,255,255,.45)' }} />
                                  ))}
                                </div>
                              )}

                              {clip.keyframes.map((kf) => {
                                const isCircle = kf.mode === 'circle' && Object.keys(kf.values || {}).length <= 1;
                                const markerSize = isCircle ? 12 : 14;
                                return (
                                  <div
                                    key={kf.id}
                                    className={isCircle ? 'kf-circle' : 'kf-diamond'}
                                    style={{
                                      width: `${markerSize}px`,
                                      height: `${markerSize}px`,
                                      left: `${(kf.offsetSec * pxPerSec) - (markerSize / 2)}px`,
                                      top: `${(visualRow / 2) - (markerSize / 2)}px`
                                    }}
                                    onPointerDown={(e) => {
                                      e.stopPropagation();
                                      startKfDrag(clip.id, kf.id);
                                    }}
                                    onDoubleClick={(e) => {
                                      e.stopPropagation();
                                      deleteKeyframe(clip.id, kf.id);
                                    }}
                                  />
                                );
                              })}

                              <div
                                style={{ position: 'absolute', right: '-4px', top: '-4px', bottom: '-4px', width: '10px', cursor: 'ew-resize', background: 'transparent' }}
                                onPointerDown={(e) => { e.stopPropagation(); startTrim(clip, 'right'); }}
                              />
                            </div>
                          );
                        })}

                        {getTrackSeams(track.id).map((seam) => {
                          const transition = transitionMap.get(`${seam.leftClipId}_${seam.rightClipId}`);
                          if (!transition && seam.gap > 0.02) return null;
                          const label = transition?.type || 'cut';
                          const badgeWidth = Math.max(38, Math.min((transition?.durationSec || 0.35) * pxPerSec, 260));
                          return (
                            <button
                              key={seam.id}
                              type="button"
                              className="neo-btn"
                              style={{
                                position: 'absolute',
                                left: `${timeToPx(seam.seamTime) - (badgeWidth / 2)}px`,
                                top: `${Math.max(2, (rowMeta.height / 2) - 12)}px`,
                                width: `${badgeWidth}px`,
                                padding: '2px 6px',
                                height: '24px',
                                minWidth: '38px',
                                background: '#ffd7f7',
                                zIndex: 26,
                                fontSize: '10px',
                                overflow: 'visible',
                                whiteSpace: 'normal'
                              }}
                              onPointerDown={(e) => e.stopPropagation()}
                              onClick={(e) => {
                                e.stopPropagation();
                                setActiveTab('transitions');
                                if (!transition) {
                                  const newId = uid('tr');
                                  setProject((prev) => ({
                                    ...prev,
                                    transitions: [
                                      ...(prev.transitions || []),
                                      {
                                        id: newId,
                                        leftClipId: seam.leftClipId,
                                        rightClipId: seam.rightClipId,
                                        type: 'crossfade',
                                        durationSec: 0.35,
                                        params: { intensity: 1 }
                                      }
                                    ]
                                  }));
                                  setSelectedTransitionId(newId);
                                  return;
                                }
                                setSelectedTransitionId(transition.id);
                              }}
                              title="Click seam to edit transition"
                            >
                              {label}
                            </button>
                          );
                        })}
                      </div>
                    )})}
                  </div>
                  {boxSelect && (
                    <div
                      style={{
                        position: 'absolute',
                        left: `${Math.min(boxSelect.x1, boxSelect.x2)}px`,
                        top: `${Math.min(boxSelect.y1, boxSelect.y2)}px`,
                        width: `${Math.abs(boxSelect.x2 - boxSelect.x1)}px`,
                        height: `${Math.abs(boxSelect.y2 - boxSelect.y1)}px`,
                        border: '1px dashed rgba(64,198,233,.95)',
                        background: 'rgba(64,198,233,.16)',
                        zIndex: 75,
                        pointerEvents: 'none'
                      }}
                    />
                  )}

                  <div style={{ position: 'absolute', top: 0, bottom: 0, left: `${timeToPx(playhead)}px`, width: '3px', background: '#ff2626', zIndex: 82, pointerEvents: 'none' }} />
                  {hoverMarkerSec !== null && (
                    <div style={{ position: 'absolute', top: 0, bottom: 0, left: `${timeToPx(hoverMarkerSec)}px`, width: '2px', background: 'rgba(64,198,233,.35)', zIndex: 80, pointerEvents: 'none' }} />
                  )}
                  {previewMarkerSec !== null && (
                    <div style={{ position: 'absolute', top: 0, bottom: 0, left: `${timeToPx(previewMarkerSec)}px`, width: '4px', background: cursorPreviewMode === 'lite' ? 'rgba(64,198,233,.55)' : 'rgba(64,198,233,.9)', zIndex: 81, pointerEvents: 'none' }} />
                  )}
                </div>
              </div>
            </section>
          </main>

          <div style={{ display: 'none' }}>
            {audioClips.map(({ clip, layer }) => (
              <audio
                key={clip.id}
                ref={(node) => {
                  if (node) audioNodeMapRef.current.set(clip.id, node);
                  else audioNodeMapRef.current.delete(clip.id);
                }}
                src={layer.payload.mediaUrl || ''}
                preload="auto"
                playsInline
              />
            ))}
          </div>

          {contextMenu && (
            <div
              className="media-popup-card"
              style={{
                left: `${clamp(contextMenu.x, 140, window.innerWidth - 140)}px`,
                top: `${clamp(contextMenu.y, 76, window.innerHeight - 24)}px`,
                transform: 'translate(-50%, -100%)',
                width: '248px',
                padding: '8px',
                zIndex: 140
              }}
              onClick={(e) => e.stopPropagation()}
            >
              <div className="grid grid-cols-4 gap-[1px] justify-items-center mb-2">
                {colorSwatches.map((c) => (
                  <button
                    key={c}
                    className="w-5 h-8 border-2 border-black rounded-full"
                    style={{ background: c }}
                    onClick={() => {
                      setClipColor(contextMenu.clipId, c);
                      setContextMenu(null);
                    }}
                  />
                ))}
              </div>
              <div className="flex items-center justify-center gap-2">
                <button className="neo-btn w-11 h-11 p-0 inline-flex items-center justify-center" style={{ background: COLORS.cyan }} onClick={() => {
                  setClipVisible(contextMenu.clipId, !contextMenu.visible);
                  setContextMenu(null);
                }} title="Toggle visibility">{contextMenu.visible ? <Eye size={18} /> : <EyeOff size={18} />}</button>
                <button className="neo-btn w-11 h-11 p-0 inline-flex items-center justify-center" style={{ background: COLORS.yellow }} onClick={() => {
                  duplicateClipAndLayer(contextMenu.clipId);
                  setContextMenu(null);
                }} title="Duplicate clip"><Copy size={18} /></button>
                <button className="neo-btn w-11 h-11 p-0 inline-flex items-center justify-center" style={{ background: COLORS.magenta }} onClick={() => {
                  removeClipAndLayer(contextMenu.clipId);
                  setContextMenu(null);
                }} title="Delete clip"><Trash2 size={18} /></button>
              </div>
              <div style={{ position: 'absolute', left: '50%', bottom: '-10px', transform: 'translateX(-50%)', width: 0, height: 0, borderLeft: '8px solid transparent', borderRight: '8px solid transparent', borderTop: '10px solid #111' }} />
              <div style={{ position: 'absolute', left: '50%', bottom: '-8px', transform: 'translateX(-50%)', width: 0, height: 0, borderLeft: '7px solid transparent', borderRight: '7px solid transparent', borderTop: '9px solid #fff' }} />
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
