      --bg: #f0f0f4;
      --fg: #111;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .neo-card {
      border: var(--neo-border);
      border-radius: 10px;
      background: #fff;
    }

    .neo-btn {
      border: var(--neo-border);
      border-radius: 8px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .01em;
      padding: .38rem .52rem;
      background: #fff;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .neo-scroll::-webkit-scrollbar {
      width: 9px;
      height: 9px;
    }

      background: #111;
      border: 2px solid #fff;
    }

      background-color: rgba(17, 17, 17, 0.5);

      background-position: 0 0, 0 24px, 24px -24px, -24px 0;
    }

    .timeline-label {
      position: sticky;
      left: 0;
      width: 92px;
      min-width: 92px;
      max-width: 92px;
      z-index: 30;
      border-right: 3px solid #111;
      background: #efefef;
    }

    .kf-diamond {
      width: 24px;
      height: 24px;
      border: 2px solid #111;
      background: #fff;
      transform: rotate(45deg);
      position: absolute;
      cursor: grab;
    }

    .kf-circle {
      width: 22px;
      height: 22px;
      border: 2px solid #111;
      border-radius: 9999px;
      background: #fff;
      position: absolute;
      cursor: grab;
    }

    textarea.code {
      width: 100%;
      min-height: 170px;
      border: 4px solid #111;
      border-radius: 8px;
      padding: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;
      font-size: 11px;
      resize: vertical;
      background: #f9fafb;
      color: #111;
    }

    .value-display {
      border: 2px solid #111;
      border-radius: 6px;
      text-align: center;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      background: #fff;
      min-width: 44px;
      height: 28px;
    }

    .track-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .track-bar {
      flex: 1 1 auto;
      height: 9px;
      border: none;
      border-radius: 999px;
      position: relative;
      background: #cc00ff;
    }

    .thumb {
      width: 12px;
      height: 24px;
      border: 2px solid #fff;
      border-radius: 4px;
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 0 2px #111;
    }

    .thumb-accent {
      width: 2px;
      height: 10px;
      border-radius: 2px;
      background: #40C6E9;
    }

    .kf-inline-btn {
      border: none;
      background: transparent;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      padding: 0 2px;
      color: #111;
      cursor: pointer;
    }

    .setting-row {
      display: grid;
      grid-template-columns: 108px 1fr 58px;
      align-items: center;
      gap: 6px;
    }

    .setting-label {
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: normal;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .no-scrollbar::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .viewtube-logo {
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.035em;
      margin: 8px 0 10px;
      user-select: none;
      display: inline-flex;
      align-items: baseline;
      gap: 1px;
    }

    .viewtube-logo .tube {
      color: #40C6E9;
    }
    .viewtube-logo .studio {
      color: #FF83EA;
      text-transform: lowercase;
    }

    .media-popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 120;
      background: rgba(0, 0, 0, 0.14);
    }

    .media-popup-card {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 121;
      width: min(340px, 86vw);
      border: 3px solid #111;
      border-radius: 16px;
      background: #fff;
      padding: 12px;
      box-shadow: 0 0 0 2px rgba(64, 198, 233, 0.72);
      animation: menuRise 160ms ease-out;
    }

    .divider-cue {
      position: absolute;
      left: 128px;
      right: 0;
      border-top: 2px dashed #579AFF;
      pointer-events: none;
      z-index: 66;
      animation: dividerPulse 170ms linear infinite;
    }
  </style>
</head>

    const SpringToggle = ({ label, value, min, max, step = 1, onChange, onAddCircle = () => {}, onReset = () => {}, showCircle = true, speed = 1, absolute = false }) => {

        const width = Math.max(1, dragStartRef.current.width || 1);
        const deltaRatio = (clientX - dragStartRef.current.x) / width;
        const raw = dragStartRef.current.value + (deltaRatio * (max - min));
        const snapped = Math.round(raw / step) * step;
        const next = clamp(snapped, min, max);
        const ratio = (next - min) / Math.max(0.0001, (max - min));

        setThumbPos(posRef.current);

        const { left, width } = dragMetaRef.current;
        const raw = clamp(((clientX - left) / Math.max(1, width)) * 100, 0, 100);
        posRef.current = raw;
        setThumbPos(raw);
        if (absolute) {
          const n = min + ((raw / 100) * Math.max(0.0001, (max - min)));
          const clampedBase = clamp(Math.round(n / step) * step, min, max);
          dragStartRef.current = {
            x: clientX,
            value: clampedBase,
            width: Math.max(1, width)
          };
          if (pointerDown || Math.abs(clampedBase - valueRef.current) > Math.max(step * 0.25, 0.0001)) {
            valueRef.current = clampedBase;
            onChange(clampedBase);
          }
        }
      };

      useEffect(() => {
        const tick = () => {
          if (absolute) {
            if (!dragging) {
              const ratio = clamp((valueRef.current - min) / Math.max(0.0001, (max - min)), 0, 1);
              posRef.current = ratio * 100;
              setThumbPos(posRef.current);
            }
          } else if (dragging) {
              const displacement = (posRef.current - 50) / 50;
              if (Math.abs(displacement) > 0.001) {
              const accel = 1 + (Math.abs(displacement) * 2.5);
              const delta = Math.sign(displacement) * (max - min) * 0.00065 * accel * speed;
                const next = clamp(valueRef.current + delta, min, max);
              const snapped = Math.round(next / step) * step;
              const clamped = clamp(snapped, min, max);
              if (Math.abs(clamped - valueRef.current) > Math.max(step * 0.25, 0.0001)) {
                valueRef.current = clamped;
                onChange(clamped);
              }
            }
          } else {
            const force = (50 - posRef.current) * 0.22;
            velRef.current = (velRef.current + force) * 0.68;
            posRef.current += velRef.current;
            if (Math.abs(50 - posRef.current) < 0.15 && Math.abs(velRef.current) < 0.08) {
              posRef.current = 50;
              velRef.current = 0;
            }
            setThumbPos(posRef.current);

      let start = Math.max(0, desiredStart);
      for (let i = 0; i < 200; i += 1) {
        const end = start + len;
        if (!hasOverlap(clips, trackId, start, end, ignoreId)) return start;
        const blockers = clips
          .filter((c) => c.trackId === trackId && c.id !== ignoreId && !(end <= c.start || start >= c.end))
          .sort((a, b) => a.end - b.end);
        if (!blockers.length) return start;
        start = blockers[0].end;
      }
      return start;
    };

    const valueFromKeyframes = (base, keyframes, prop, localT) => {
      const list = (keyframes || [])
        .filter((kf) => kf.values && Object.prototype.hasOwnProperty.call(kf.values, prop))
        .sort((a, b) => a.offsetSec - b.offsetSec);

      if (!list.length) return base;
      if (localT <= list[0].offsetSec) return list[0].values[prop];
      if (localT >= list[list.length - 1].offsetSec) return list[list.length - 1].values[prop];

      let left = list[0];
      let right = list[list.length - 1];
      for (let i = 0; i < list.length - 1; i += 1) {
        if (localT >= list[i].offsetSec && localT <= list[i + 1].offsetSec) {
          left = list[i];
          right = list[i + 1];
          break;
        }
      }

      const lv = left.values[prop];
      const rv = right.values[prop];
      if (NUMERIC_PROPS.includes(prop)) {
        const span = right.offsetSec - left.offsetSec || 1;
        const t = clamp((localT - left.offsetSec) / span, 0, 1);
        return Number(lv) + (Number(rv) - Number(lv)) * t;
      }

      return localT < right.offsetSec ? lv : rv;
    };

    const evaluateLayerPayloadAt = (layer, clip, playhead) => {

      const localT = clipAbsToLocal(clip, playhead);
      const out = clone(layer.payload);
      ANIM_PROPS.forEach((prop) => {
        const base = out[prop];
        out[prop] = valueFromKeyframes(base, clip.keyframes, prop, localT);
      });

    const App = () => {

      const pxPerSec = BASE_PX_PER_SEC * Math.max(0.2, Number(project.meta.zoom) || 1);
      const timelineContentWidth = Math.max((project.meta.durationSec * pxPerSec) + GUTTER + 120, timelineViewportWidth + GUTTER + 8);
      const formatHMS = (seconds) => {

        const sec = Math.floor(s % 60);

      };
      const parseDurationInput = (txt) => {

          if (!parts.length || parts.length > 3) return null;
          const nums = parts.map((p) => Number(p));
          if (nums.some((n) => !Number.isFinite(n) || n < 0)) return null;
          const padded = [0, 0, 0];
          for (let i = 0; i < nums.length; i += 1) padded[3 - nums.length + i] = nums[i];
          const sec = Math.floor(padded[0] * 3600 + padded[1] * 60 + padded[2]);
          return clamp(sec, 5, 7200);
        }
        const n = Number(raw);
        if (!Number.isFinite(n)) return null;

      };
      const getExportDims = () => {

      };
      const snapTime = (t) => snapEnabled ? Math.round(t * 4) / 4 : t;
      const defaultValueForProp = (layer, prop) => {

      const buildTextStroke = (strokeWidth, strokeColor) => {

      };
      const mediaPercentFromIntrinsic = (w, h, aspectRatio) => {
        const stageW = aspectRatio === '9:16' ? 1080 : 1920;

        const fitScale = Math.min((stageW * 0.68) / Math.max(1, w), (stageH * 0.68) / Math.max(1, h));
        return {
          width: clamp((w * fitScale / stageW) * 100, 4, 100),
          height: clamp((h * fitScale / stageH) * 100, 4, 100)
        };
      };

      const timeToPx = (sec) => GUTTER + clamp(sec, 0, project.meta.durationSec) * pxPerSec;
      const clientXToTime = (clientX) => {
        const el = timelineRef.current;
        if (!el) return 0;
        const rect = el.getBoundingClientRect();
        const localX = clientX - rect.left + el.scrollLeft;
        return clamp((localX - GUTTER) / pxPerSec, 0, project.meta.durationSec);
      };

      const updateMeta = (patch) => setProject((prev) => ({ ...prev, meta: { ...prev.meta, ...patch } }));
      const updateCamera = (patch) => setProject((prev) => {
        const tolerance = 0.03;
        const existingAtPlayhead = (prev.camera.keyframes || []).find((kf) => Math.abs(kf.offsetSec - playhead) <= tolerance);
        if (existingAtPlayhead) {
          return {
            ...prev,
            camera: {
              ...prev.camera,
              keyframes: prev.camera.keyframes.map((kf) => (
                kf.id !== existingAtPlayhead.id
                  ? kf
                  : { ...kf, values: { ...(kf.values || {}), ...patch } }
              ))
            }
          };
        }
        return { ...prev, camera: { ...prev.camera, ...patch } };
      });
      const resetCameraNeutral = () => {
        const neutral = { x: 0, y: 0, z: 0, scale: 1, rotate: 0 };
        setProject((prev) => {
          const tolerance = 0.03;
          const existingAtPlayhead = (prev.camera.keyframes || []).find((kf) => Math.abs(kf.offsetSec - playhead) <= tolerance);
          return {
            ...prev,
            camera: {
              ...prev.camera,
              ...neutral,
              keyframes: (prev.camera.keyframes || []).map((kf) => (
                existingAtPlayhead && kf.id === existingAtPlayhead.id
                  ? { ...kf, values: { ...(kf.values || {}), ...neutral } }
                  : kf
              ))
            }
          };
        });
      };
      const updateTrackUiState = (trackId, patch) => setProject((prev) => ({
        ...prev,
        trackUiState: {
          ...(prev.trackUiState || {}),
          [trackId]: { ...(prev.trackUiState?.[trackId] || {}), ...patch }
        }
      }));

      useEffect(() => {
        const el = timelineRef.current;
        if (!el) return undefined;
        const computeViewport = () => {
          setTimelineViewportWidth(el.clientWidth);
          const start = clamp((el.scrollLeft) / pxPerSec, 0, project.meta.durationSec);
          const end = clamp((el.scrollLeft + el.clientWidth - GUTTER) / pxPerSec, 0, project.meta.durationSec);
          setTimelineViewport({ start: Math.max(0, start), end: Math.max(start, end) });
        };
        computeViewport();
        const onScroll = () => {
          if (viewportRafRef.current) cancelAnimationFrame(viewportRafRef.current);

          if (viewportRafRef.current) cancelAnimationFrame(viewportRafRef.current);
          el.removeEventListener('scroll', onScroll);
          window.removeEventListener('resize', computeViewport);
        };
      }, [pxPerSec, project.meta.durationSec]);

      useEffect(() => {
        const t = setTimeout(() => {
          setProject((prev) => {
            const nextState = { ...(prev.trackUiState || {}) };
            let changed = false;
            prev.tracks.forEach((track) => {
              const current = nextState[track.id] || { collapsedManual: false, isDropTarget: false };
              const now = Date.now();

              const visible = prev.clips
                .filter((c) => c.trackId === track.id)
                .some((c) => !(c.end < timelineViewport.start || c.start > timelineViewport.end));

              const nextCurrent = Number(current.justCreatedUntil || 0) <= now && current.justCreatedUntil
                ? { ...current, justCreatedUntil: 0 }
                : current;
              if (nextCurrent.collapsedAuto !== collapsedAuto) {
                nextState[track.id] = { ...nextCurrent, collapsedAuto };
                changed = true;
              } else if (nextCurrent !== current || !nextState[track.id]) {
                nextState[track.id] = { ...nextCurrent, collapsedAuto };
                changed = true;
              }
            });

          });
        }, 70);
        return () => clearTimeout(t);
      }, [timelineViewport.start, timelineViewport.end, project.tracks.length, project.clips.length]);

      const getKeyframeAtPlayhead = (clip) => {
        const local = clipAbsToLocal(clip, playhead);
        return clip.keyframes.find((kf) => Math.abs(kf.offsetSec - local) <= 0.03) || null;
      };

      const diamondValuesFromPayload = (payload) => {
        const values = {};
        ANIM_PROPS.forEach((prop) => {
          values[prop] = payload[prop];
        });
        return values;
      };

      const updateLayerPayload = (layerId, patch) => {
        setProject((prev) => ({
          ...prev,
          layers: prev.layers.map((l) => {
            if (l.id !== layerId) return l;
            const payload = { ...l.payload, ...patch };
            if (Object.prototype.hasOwnProperty.call(patch, 'layerName')) payload.layerName = patch.layerName;
            return { ...l, payload };
          }),
          clips: prev.clips.map((clip) => {
            if (clip.layerId !== layerId) return clip;
            if (playhead < clip.start || playhead > clip.end) return clip;
            const nextAnimProps = Object.keys(patch).filter((prop) => ANIM_PROPS.includes(prop));
            if (!nextAnimProps.length) return clip;
            const offsetSec = clipAbsToLocal(clip, playhead);
            const existing = clip.keyframes.find((kf) => Math.abs(kf.offsetSec - offsetSec) <= 0.03) || null;
            if (!existing) {
              if (clip.keyframes.length === 0) return clip;
              const initialValues = {};
              nextAnimProps.forEach((prop) => { initialValues[prop] = patch[prop]; });
              const mode = nextAnimProps.length > 1 ? 'diamond' : 'circle';
              const newKf = makeKeyframe(offsetSec, initialValues, mode);
              return { ...clip, keyframes: [...clip.keyframes, newKf].sort((a, b) => a.offsetSec - b.offsetSec) };
            }
            const nextKeyframes = clip.keyframes.map((kf) => {
              if (kf.id !== existing.id) return kf;
              const next = { ...kf, values: { ...(kf.values || {}) } };
              let nextMode = next.mode || 'diamond';
              Object.keys(patch).forEach((prop) => {

                if (nextMode === 'circle' && !Object.prototype.hasOwnProperty.call(next.values, prop)) {

                  const layerNow = prev.layers.find((ln) => ln.id === layerId);
                  next.values = {
                    ...(layerNow ? diamondValuesFromPayload(layerNow.payload) : {}),

                  };
                }
                next.values[prop] = patch[prop];
              });
              next.mode = nextMode;
              return next;
            });
            return { ...clip, keyframes: nextKeyframes };

        }));
      };

      const addEffectToSelected = (effectType) => {

      const updateEffectParam = (layerId, fxId, paramKey, paramValue) => {

      const addDiamondKeyframeAtPlayhead = () => {

          if (type === 'video') layer.payload.layerName = `VIDEO_${prev.layers.length + 1}`;

            layer.payload.audioSrcType = 'file';
          }
          const len = 4;
          const start = nearestFreeStart(prev.clips, targetTrack.id, playhead, len, null);
          const end = start + len;
          const color = type === 'text' ? COLORS.magenta : type === 'shape' ? COLORS.yellow : type === 'image' ? COLORS.blue : type === 'audio' ? COLORS.blue : COLORS.cyan;
          const clip = createClip(targetTrack.id, layer.id, start, end, color);
          const maxEnd = Math.max(prev.meta.durationSec, end + 1);
          return {
            ...prev,
            meta: { ...prev.meta, durationSec: maxEnd },
            layers: [...prev.layers, layer],
            clips: [...prev.clips, clip]
          };
        });
      };

      const chooseShapeType = (layerId, shapeType) => {
        const nextShape = shapeType === 'polygon' ? 'polygon' : (shapeType === 'circle' ? 'circle' : 'rect');
        updateLayerPayload(layerId, { shape: nextShape, shapeNeedsChoice: false, shapeLocked: true });
      };

      const removeClipAndLayer = (clipId) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          return {
            ...prev,
            clips: prev.clips.filter((c) => c.id !== clipId),
            layers: prev.layers.filter((l) => l.id !== clip.layerId)
          };
        });
      };

      const duplicateClipAndLayer = (clipId) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          const layer = prev.layers.find((l) => l.id === clip.layerId);
          if (!layer) return prev;
          const len = durationOf(clip);
          const start = nearestFreeStart(prev.clips, clip.trackId, clip.start + 0.25, len, null);
          const end = start + len;
          const newLayerId = uid('layer');
          const newClipId = uid('clip');
          return {
            ...prev,
            layers: [
              ...prev.layers,
              {
                ...clone(layer),
                id: newLayerId,
                payload: {
                  ...clone(layer.payload),
                  layerName: `${layer.payload.layerName || layer.type}_${prev.layers.length + 1}`
                }
              }
            ],
            clips: [
              ...prev.clips,
              {
                ...clone(clip),
                id: newClipId,
                layerId: newLayerId,
                start,
                end,
                keyframes: (clip.keyframes || []).map((kf) => ({ ...clone(kf), id: uid('kf') }))
              }
            ],
            transitions: (prev.transitions || []).filter((t) => t.leftClipId !== clip.id && t.rightClipId !== clip.id),
            meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, end + 1) }
          };
        });
      };

      const removeClipsAndLayers = (clipIds) => {
        const ids = new Set((clipIds || []).filter(Boolean));
        if (!ids.size) return;
        setProject((prev) => {
          const clipsToRemove = prev.clips.filter((c) => ids.has(c.id));
          if (!clipsToRemove.length) return prev;
          const layerIdsToRemove = new Set(clipsToRemove.map((c) => c.layerId));
          const next = {
            ...prev,
            clips: prev.clips.filter((c) => !ids.has(c.id)),
            layers: prev.layers.filter((l) => !layerIdsToRemove.has(l.id)),
            transitions: (prev.transitions || []).filter((t) => !ids.has(t.leftClipId) && !ids.has(t.rightClipId))
          };
          return next;
        });
        setSelectedClipIds((prev) => prev.filter((id) => !ids.has(id)));
        if (selectedClipId && ids.has(selectedClipId)) {
          setSelectedClipId(null);
          setSelectedLayerId(null);
        }
      };

      useEffect(() => {
        setProject((prev) => {
          const usedTrackIds = new Set(prev.clips.map((c) => c.trackId));
          const keptTracks = prev.tracks.filter((t) => usedTrackIds.has(t.id) || t.kind === AUDIO_TRACK_KIND);
          if (keptTracks.length === prev.tracks.length) return prev;
          const fallbackTracks = keptTracks.length
            ? keptTracks
            : [{ id: uid('track'), name: AUDIO_TRACK_NAME, order: 0, visible: true, kind: AUDIO_TRACK_KIND }];
          const normalizedTracks = normalizeTracksWithAudio(fallbackTracks);
          const validTrackIds = new Set(normalizedTracks.map((t) => t.id));
          const fallbackTrackId = normalizedTracks[0].id;
          return {
            ...prev,
            tracks: normalizedTracks,
            layers: prev.layers.map((l) => (
              validTrackIds.has(l.trackId) ? l : { ...l, trackId: fallbackTrackId }
            ))
          };
        });
      }, [project.clips]);

      const splitClipAt = (clip, cutTimeAbs, mode) => {
        if (cutTimeAbs <= clip.start || cutTimeAbs >= clip.end) return;
        const cutOffset = clipAbsToLocal(clip, cutTimeAbs);

        setProject((prev) => {
          const others = prev.clips.filter((c) => c.id !== clip.id);

          const left = {
            ...clip,
            id: uid('clipL'),
            end: cutTimeAbs,
            keyframes: clip.keyframes
              .filter((kf) => kf.offsetSec <= cutOffset)
              .map((kf) => ({ ...kf, id: uid('kf') }))
          };

          const right = {
            ...clip,
            id: uid('clipR'),
            start: cutTimeAbs,
            keyframes: clip.keyframes
              .filter((kf) => kf.offsetSec >= cutOffset)
              .map((kf) => ({ ...kf, id: uid('kf'), offsetSec: kf.offsetSec - cutOffset }))
          };

          const next = mode === 'keep-left' ? [left] : mode === 'keep-right' ? [right] : [left, right];
          return { ...prev, clips: [...others, ...next] };
        });
      };

      const addTrack = (insertAtIndex = null) => {
        setProject((prev) => {
          const ordered = [...prev.tracks].sort((a, b) => a.order - b.order);
          const audioTrack = ordered.find((t) => t.kind === AUDIO_TRACK_KIND);
          const visuals = ordered.filter((t) => t.kind !== AUDIO_TRACK_KIND);
          const safeIndex = Number.isInteger(insertAtIndex) ? clamp(insertAtIndex, 0, visuals.length) : visuals.length;
          const newTrackId = uid('track');
          const nextVisuals = [...visuals];
          nextVisuals.splice(safeIndex, 0, { id: newTrackId, name: `V${safeIndex + 1}`, order: safeIndex, visible: true, kind: 'visual' });
          const normalizedVisuals = nextVisuals.map((t, i) => ({ ...t, order: i, name: `V${i + 1}`, kind: 'visual' }));
          const nextTracks = audioTrack
            ? [...normalizedVisuals, { ...audioTrack, order: normalizedVisuals.length, name: AUDIO_TRACK_NAME, kind: AUDIO_TRACK_KIND }]
            : [...normalizedVisuals, { id: uid('track'), name: AUDIO_TRACK_NAME, order: normalizedVisuals.length, visible: true, kind: AUDIO_TRACK_KIND }];
          return {
            ...prev,
            tracks: nextTracks,
            trackUiState: {
              ...(prev.trackUiState || {}),
              [newTrackId]: { ...(prev.trackUiState?.[newTrackId] || {}), sizeMode: 1, collapsedAuto: false, justCreatedUntil: Date.now() + 1200 }
            }
          };
        });
      };

      const getTrackSeams = (trackId) => {
        const clips = project.clips
          .filter((c) => c.trackId === trackId)
          .sort((a, b) => a.start - b.start);
        const seams = [];
        for (let i = 0; i < clips.length - 1; i += 1) {
          const left = clips[i];
          const right = clips[i + 1];
          seams.push({
            id: `${left.id}_${right.id}`,
            trackId,
            leftClipId: left.id,
            rightClipId: right.id,
            seamTime: (left.end + right.start) / 2,
            gap: right.start - left.end
          });
        }
        return seams;
      };

      const upsertTransition = (leftClipId, rightClipId, patch = {}) => {
        setProject((prev) => {
          const left = prev.clips.find((c) => c.id === leftClipId);
          const right = prev.clips.find((c) => c.id === rightClipId);
          if (!left || !right) return prev;
          const maxDur = Math.max(0.05, Math.min(durationOf(left), durationOf(right), 8));
          const existing = prev.transitions.find((t) => t.leftClipId === leftClipId && t.rightClipId === rightClipId);
          if (existing) {
            const next = prev.transitions.map((t) => {
              if (t.id !== existing.id) return t;
              const durationSec = clamp(Number(patch.durationSec ?? t.durationSec ?? 0.35), 0.05, maxDur);
              const type = patch.type || t.type || 'cut';
              const params = { ...(t.params || {}), ...(patch.params || {}) };
              if (params.intensity == null) params.intensity = 1;
              return { ...t, ...patch, params, type, durationSec };
            });
            return { ...prev, transitions: next };
          }
          const nextTr = makeTransition(
            leftClipId,
            rightClipId,
            patch.type || 'crossfade',
            clamp(Number(patch.durationSec ?? 0.35), 0.05, maxDur),
            { intensity: 1, ...(patch.params || {}) }
          );
          return { ...prev, transitions: [...(prev.transitions || []), nextTr] };
        });
      };

      const removeTransition = (transitionId) => {
        setProject((prev) => ({
          ...prev,
          transitions: (prev.transitions || []).filter((t) => t.id !== transitionId)
        }));
        if (selectedTransitionId === transitionId) setSelectedTransitionId(null);
      };

      const moveClipToTrackNoOverlap = (clipId, nextTrackId, desiredStart) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          const len = durationOf(clip);
          const start = nearestFreeStart(prev.clips, nextTrackId, desiredStart, len, clip.id);
          const end = start + len;
          return {
            ...prev,
            clips: prev.clips.map((c) => c.id === clipId ? { ...c, trackId: nextTrackId, start, end } : c),
            layers: prev.layers.map((l) => l.id === clip.layerId ? { ...l, trackId: nextTrackId } : l),
            meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, end + 1) }
          };
        });
      };

      const moveClipGroupNoOverlap = (clipIds, anchorClipId, desiredAnchorStart) => {
        const idSet = new Set((clipIds || []).filter(Boolean));
        if (!idSet.size || !anchorClipId || !idSet.has(anchorClipId)) return;
        setProject((prev) => {
          const group = prev.clips
            .filter((c) => idSet.has(c.id))
            .sort((a, b) => a.start - b.start);
          const anchor = group.find((c) => c.id === anchorClipId);
          if (!anchor) return prev;
          const delta = desiredAnchorStart - anchor.start;
          const stationary = prev.clips.filter((c) => !idSet.has(c.id));
          const moved = [];
          let occupancy = [...stationary];
          group.forEach((clip) => {
            const len = durationOf(clip);
            const desired = Math.max(0, clip.start + delta);
            const start = nearestFreeStart(occupancy, clip.trackId, desired, len, null);
            const nextClip = { ...clip, start, end: start + len };
            moved.push(nextClip);
            occupancy.push(nextClip);
          });
          const movedById = new Map(moved.map((c) => [c.id, c]));
          const nextClips = prev.clips.map((c) => movedById.get(c.id) || c);
          const maxEnd = nextClips.reduce((m, c) => Math.max(m, c.end), prev.meta.durationSec);
          return {
            ...prev,
            clips: nextClips,
            meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, maxEnd + 1) }
          };
        });
      };

      const updateClipBoundsNoOverlap = (clipId, nextStart, nextEnd) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          const len = Math.max(0.05, nextEnd - nextStart);
          const start = nearestFreeStart(prev.clips, clip.trackId, nextStart, len, clip.id);
          const end = start + len;
          return {
            ...prev,
            clips: prev.clips.map((c) => c.id === clipId ? { ...c, start, end } : c),
            meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, end + 1) }
          };
        });
      };

      const applyLeftTrim = (clipId, newStart) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          const oldStart = clip.start;
          const start = clamp(newStart, 0, clip.end - 0.05);
          const shift = oldStart - start;
          const len = clip.end - start;
          const fixedStart = nearestFreeStart(prev.clips, clip.trackId, start, len, clip.id);
          const deltaApplied = oldStart - fixedStart;
          return {
            ...prev,
            clips: prev.clips.map((c) => {
              if (c.id !== clipId) return c;
              const end = c.end;
              const dur = end - fixedStart;
              const keyframes = c.keyframes.map((kf) => ({
                ...kf,
                offsetSec: clamp(kf.offsetSec + deltaApplied, 0, dur)
              }));
              return { ...c, start: fixedStart, keyframes };
            })
          };
        });
      };

      const applyRightTrim = (clipId, newEnd) => {
        setProject((prev) => ({
          ...prev,
          clips: prev.clips.map((c) => {
            if (c.id !== clipId) return c;
            const maxBlockedEnd = prev.clips
              .filter((o) => o.trackId === c.trackId && o.id !== c.id && o.start >= c.start)
              .reduce((min, o) => Math.min(min, o.start), Number.POSITIVE_INFINITY);
            const hardMax = Number.isFinite(maxBlockedEnd) ? maxBlockedEnd : (prev.meta.durationSec + 120);
            const end = clamp(newEnd, c.start + 0.05, hardMax);
            const dur = end - c.start;
            return {
              ...c,
              end,
              keyframes: c.keyframes
                .filter((kf) => kf.offsetSec <= dur)
                .map((kf) => ({ ...kf, offsetSec: clamp(kf.offsetSec, 0, dur) }))
            };
          }),
          meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, newEnd + 1) }
        }));
      };

      const openClipMenu = (clipId, visible, anchorRect) => {
        contextMenuOpenedAtRef.current = Date.now();
        setContextMenu({
          x: anchorRect.left + (anchorRect.width / 2),
          y: anchorRect.top - 8,
          clipId,
          visible
        });
      };

      const registerClipTap = (clip, layer, spotSec, anchorRect) => {
        const now = Date.now();
        const prev = clipTapRef.current;
        const sameSpot = prev.clipId === clip.id && Math.abs(prev.sec - spotSec) <= 0.2 && (now - prev.at) <= 520;
        const count = sameSpot ? (prev.count + 1) : 1;
        if (prev.timer) clearTimeout(prev.timer);
        clipTapRef.current = { clipId: clip.id, sec: spotSec, count, at: now, timer: null };
        if (count === 2) {
          setPlayhead(spotSec);
        }
        if (count >= 3) {
          openClipMenu(clip.id, layer?.visible !== false, anchorRect);
          clipTapRef.current = { clipId: null, sec: 0, count: 0, at: 0, timer: null };
          return;
        }
        clipTapRef.current.timer = setTimeout(() => {
          clipTapRef.current = { clipId: null, sec: 0, count: 0, at: 0, timer: null };
        }, 620);
      };

      const startClipDrag = (e, clip, activeClipIds = []) => {
        const clickT = snapTime(clientXToTime(e.clientX));
        const mode = mods.has('ArrowLeft')
          ? 'keep-right'
          : mods.has('ArrowRight')
            ? 'keep-left'
            : mods.has('ArrowDown')
              ? 'split'
              : null;

        if (mode) {
          splitClipAt(clip, clickT, mode);
          return;
        }
        if (!dragEnabled) return;

        const ids = (activeClipIds && activeClipIds.length)
          ? activeClipIds.filter((id) => project.clips.some((c) => c.id === id))
          : [clip.id];
        const uniqueIds = Array.from(new Set(ids));
        dragRef.current = {
          type: 'clip-move',
          clipIds: uniqueIds,
          anchorClipId: clip.id,
          clipId: clip.id,
          offsetT: clickT - clip.start,
          len: durationOf(clip)
        };
        setDragState({ type: 'clip-move' });
      };

      const startTrim = (clip, edge) => {
        dragRef.current = { type: 'trim', clipId: clip.id, edge };
        setDragState({ type: 'trim' });
      };

      const startKfDrag = (clipId, kfId) => {
        dragRef.current = { type: 'kf-drag', clipId, kfId };
        setDragState({ type: 'kf-drag' });
      };

      const startCameraKfDrag = (kfId) => {
        dragRef.current = { type: 'camera-kf-drag', kfId };
        setDragState({ type: 'camera-kf-drag' });
      };

      useEffect(() => {
        const onMove = (e) => {
          const ds = dragRef.current;
          if (!ds?.type) return;
          const t = snapTime(clientXToTime(e.clientX));

          if (ds.type === 'box-select') {
            const rect = timelineContentRef.current?.getBoundingClientRect();
            if (!rect) return;
            const nx = clamp(e.clientX - rect.left, 0, timelineContentWidth);
            const ny = clamp(e.clientY - rect.top, 0, cameraTrackHeight + timelineRowsHeight);
            setBoxSelect((prev) => (prev ? { ...prev, x2: nx, y2: ny } : prev));
            return;
          }

          if (ds.type === 'clip-move') {
            const desiredStart = Math.max(0, t - ds.offsetT);
            const draggingGroup = Array.isArray(ds.clipIds) && ds.clipIds.length > 1;
            let trackId = project.clips.find((c) => c.id === ds.clipId)?.trackId;
            if (ds.createdTrackId) trackId = ds.createdTrackId;
            const visualTracks = sortedTracks.filter((st) => st.kind !== AUDIO_TRACK_KIND);
            const visualCount = visualTracks.length;
            if (!draggingGroup && tracksRegionRef.current) {
              const rect = tracksRegionRef.current.getBoundingClientRect();
              const relativeY = e.clientY - rect.top;
              const row = trackIndexFromY(relativeY);
              const { near: nearDivider, dividerIndex } = dividerFromY(relativeY, 7);
              if (row >= 0 && row < sortedTracks.length) {
                const track = sortedTracks[row];
                if (track) {
                  trackId = track.kind === AUDIO_TRACK_KIND
                    ? (visualTracks[visualTracks.length - 1]?.id || track.id)
                    : track.id;
                  setHoverTrackId((prevHover) => {
                    if (prevHover === trackId) return prevHover;
                    setProject((prev) => {
                      const nextUi = { ...(prev.trackUiState || {}) };
                      prev.tracks.forEach((tr) => {
                        const ui = nextUi[tr.id] || { collapsedManual: false, collapsedAuto: false, isDropTarget: false };
                        nextUi[tr.id] = { ...ui, isDropTarget: tr.id === trackId };
                      });
                      return { ...prev, trackUiState: nextUi };
                    });
                    return trackId;
                  });
                }
                if (!ds.createdTrackId && nearDivider && dividerIndex >= 1 && dividerIndex <= visualCount) {
                  const now = performance.now();
                  if (dividerHoldRef.current.index !== dividerIndex) {
                    dividerHoldRef.current = { index: dividerIndex, startAt: now };
                    setDividerCue({ index: dividerIndex, flash: true });
                  }
                  const elapsed = now - dividerHoldRef.current.startAt;
                  const flashPhase = Math.floor(elapsed / 84) % 2 === 0;
                  setDividerCue({ index: dividerIndex, flash: flashPhase });
                  if (elapsed < 500) {
                    moveClipToTrackNoOverlap(ds.clipId, trackId, desiredStart);
                    return;
                  }
                  const newTrackId = uid('track');
                  dragRef.current = { ...dragRef.current, createdTrackId: newTrackId };
                  setProject((prev) => {
                    const ordered = [...prev.tracks].sort((a, b) => a.order - b.order);
                    const visuals = ordered.filter((t) => t.kind !== AUDIO_TRACK_KIND);
                    const safeIndex = clamp(dividerIndex, 0, visuals.length);
                    const already = prev.tracks.some((tr) => tr.id === newTrackId);
                    if (already) return prev;
                    const audioTrack = ordered.find((t) => t.kind === AUDIO_TRACK_KIND);
                    const nextTracks = [...visuals];
                    nextTracks.splice(clamp(safeIndex, 0, visuals.length), 0, { id: newTrackId, name: `V${safeIndex + 1}`, order: safeIndex, visible: true, kind: 'visual' });
                    return {
                      ...prev,
                      tracks: [
                        ...nextTracks.map((t, i) => ({ ...t, order: i, name: `V${i + 1}`, kind: 'visual' })),
                        ...(audioTrack ? [{ ...audioTrack, order: nextTracks.length, name: AUDIO_TRACK_NAME, kind: AUDIO_TRACK_KIND }] : [])
                      ],
                      trackUiState: {
                        ...(prev.trackUiState || {}),
                        [newTrackId]: { ...(prev.trackUiState?.[newTrackId] || {}), sizeMode: 1, collapsedAuto: false, justCreatedUntil: Date.now() + 1200 }
                      }
                    };
                  });
                  trackId = newTrackId;
                  setDividerCue({ index: null, flash: false });
                } else if (!nearDivider) {
                  dividerHoldRef.current = { index: null, startAt: 0 };
                  setDividerCue({ index: null, flash: false });
                }
              }
            }
            if (draggingGroup) {
              moveClipGroupNoOverlap(ds.clipIds, ds.anchorClipId, desiredStart);
            } else {
              moveClipToTrackNoOverlap(ds.clipId, trackId, desiredStart);
            }
            return;
          }

          if (ds.type === 'trim') {
            const clip = project.clips.find((c) => c.id === ds.clipId);
            if (!clip) return;
            if (ds.edge === 'left') applyLeftTrim(ds.clipId, t);
            else applyRightTrim(ds.clipId, t);
            return;
          }

          if (ds.type === 'kf-drag') {
            setProject((prev) => ({
              ...prev,
              clips: prev.clips.map((clip) => {
                if (clip.id !== ds.clipId) return clip;
                const off = clipAbsToLocal(clip, t);
                return {
                  ...clip,
                  keyframes: clip.keyframes.map((kf) => kf.id === ds.kfId ? { ...kf, offsetSec: off } : kf)
                    .sort((a, b) => a.offsetSec - b.offsetSec)
                };
              })
            }));
            return;
          }

          if (ds.type === 'camera-kf-drag') {
            setProject((prev) => ({
              ...prev,
              camera: {
                ...prev.camera,
                keyframes: prev.camera.keyframes.map((kf) =>
                  kf.id === ds.kfId ? { ...kf, offsetSec: clamp(t, 0, prev.meta.durationSec) } : kf
                ).sort((a, b) => a.offsetSec - b.offsetSec)
              }
            }));
            return;
          }

          if (ds.type === 'playhead') {
            setPlayhead(t);
          }
        };

        const onUp = () => {
          if (cutHoldRef.current) {
            clearTimeout(cutHoldRef.current);
            cutHoldRef.current = null;
          }
          if (dragRef.current?.type === 'box-select') {
            setBoxSelect((prev) => {
              if (prev) selectClipsInBox(prev, !!prev.additive);
              return null;
            });
          }
          dragRef.current = { type: null };
          setDragState({ type: null });
          setHoverTrackId(null);
          dividerHoldRef.current = { index: null, startAt: 0 };
          setDividerCue({ index: null, flash: false });
          setProject((prev) => {
            const nextUi = { ...(prev.trackUiState || {}) };
            let changed = false;
            Object.keys(nextUi).forEach((k) => {
              if (nextUi[k]?.isDropTarget) {
                nextUi[k] = { ...nextUi[k], isDropTarget: false };
                changed = true;
              }
            });
            return changed ? { ...prev, trackUiState: nextUi } : prev;
          });
        };

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        return () => {
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
        };
      }, [project.clips, project.meta.durationSec, sortedTracks, mods, snapEnabled, trackLayout, selectedClipIds, timelineContentWidth, cameraTrackHeight, timelineRowsHeight]);

      useEffect(() => {
        setProject((prev) => {
          const byId = Object.fromEntries(prev.clips.map((c) => [c.id, c]));
          const clean = (prev.transitions || []).filter((t) => {
            const left = byId[t.leftClipId];
            const right = byId[t.rightClipId];
            if (!left || !right) return false;
            if (left.trackId !== right.trackId) return false;
            return Math.abs(right.start - left.end) <= 0.08;
          });
          if (clean.length === (prev.transitions || []).length) return prev;
          return { ...prev, transitions: clean };
        });
      }, [project.clips]);

      const deleteKeyframe = (clipId, kfId) => {
        setProject((prev) => ({
          ...prev,
          clips: prev.clips.map((c) => {
            if (c.id !== clipId) return c;
            return { ...c, keyframes: c.keyframes.filter((kf) => kf.id !== kfId) };
          })
        }));
      };

      const deleteCameraKeyframe = (kfId) => {
        setProject((prev) => ({
          ...prev,
          camera: {
            ...prev.camera,
            keyframes: prev.camera.keyframes.filter((kf) => kf.id !== kfId)
          }
        }));
      };

      const setClipVisible = (clipId, visible) => {
        setProject((prev) => {
          const clip = prev.clips.find((c) => c.id === clipId);
          if (!clip) return prev;
          return {
            ...prev,
            layers: prev.layers.map((l) => l.id === clip.layerId ? { ...l, visible } : l)
          };
        });
      };

      const setClipColor = (clipId, color) => {
        setProject((prev) => ({
          ...prev,
          clips: prev.clips.map((c) => c.id === clipId ? { ...c, color } : c)
        }));
      };

      const exportJson = () => {
        const blob = new Blob([JSON.stringify(project, null, 2)], { type: 'application/json' });
        const u = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = u;
        a.download = 'CODEX_EDITOR_X_V1.project.v2.json';
        a.click();
        URL.revokeObjectURL(u);
      };

      const importJson = async (file) => {
        if (!file) return;
        const txt = await file.text();
        const parsed = JSON.parse(txt);
        if (parsed?.schemaVersion !== SCHEMA_VERSION) {
          alert('Only EditorProjectV2 imports are supported.');
          return;
        }
        const normalized = normalizeProject(parsed);
        setProject(normalized);
        setSelectedClipId(normalized.clips[0]?.id || null);
        setSelectedClipIds(normalized.clips[0]?.id ? [normalized.clips[0].id] : []);
        setSelectedLayerId(normalized.layers[0]?.id || null);
        setPlayhead(0);
      };

      const toSvgCode = () => {
        const width = project.meta.aspectRatio === '16:9' ? 1920 : 1080;
        const height = project.meta.aspectRatio === '16:9' ? 1080 : 1920;

        const trackOrderMap = Object.fromEntries(sortedTracks.map((t, i) => [t.id, i]));
        const drawables = [];

        project.layers.forEach((layer) => {
          if (layer.type === 'audio') return;
          if (!layer.visible) return;
          const clip = project.clips.find((c) => c.layerId === layer.id && playhead >= c.start && playhead <= c.end);
          if (!clip) return;
          const p = evaluateLayerPayloadAt(layer, clip, playhead);
          if (!p || Number(p.opacity) <= 0) return;
          drawables.push({ layer, clip, p, order: trackOrderMap[layer.trackId] ?? 999 });
        });

        drawables.sort((a, b) => b.order - a.order);

        const nodes = drawables.map(({ layer, clip, p }) => {
          const ox = width / 2 + Number(p.x || 0);
          const oy = height / 2 + Number(p.y || 0);
          const w = (Number(p.width || 0) / 100) * width;
          const h = (Number(p.height || 0) / 100) * height;
          const transFx = transitionInfluence(clip || { id: '' });
          const animFx = clipEntryExitInfluence(clip || null);
          const tx = `${transFx.transformExtra || ''} ${animFx.transformExtra || ''}`;
          const extraX = Number((tx.match(/translateX\(([-\d.]+)px\)/) || [])[1] || 0);
          const extraY = Number((tx.match(/translateY\(([-\d.]+)px\)/) || [])[1] || 0);
          const extraScale = Number((tx.match(/scale\(([-\d.]+)\)/) || [])[1] || 1);
          const extraRotate = Number((tx.match(/rotate\(([-\d.]+)deg\)/) || [])[1] || 0);
          const transform = `translate(${ox + extraX} ${oy + extraY}) rotate(${Number(p.rotation || 0) + extraRotate}) scale(${Number(p.scale || 1) * extraScale})`;
          const mergedOpacity = clamp(Number(p.opacity || 1) * (transFx.opacity ?? 1) * (animFx.opacity ?? 1), 0, 1);
          const common = `opacity="${mergedOpacity}" filter="${buildEffectFilter(p, project.meta.visualDNA)}"`;

          if (layer.type === 'text') {
            const sw = Math.max(0, Number(p.strokeWidth ?? 0));
            const stroke = sw > 0 ? `stroke="${p.strokeColor || '#111'}" stroke-width="${sw * 2}" paint-order="stroke fill"` : '';
            return `<g transform="${transform}"><text x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-size="${Number(p.fontSize || 40)}" font-family="${p.fontFamily || 'Outfit'}" font-weight="900" fill="${p.fillColor || '#fff'}" ${stroke} ${common}>${String(p.text || '').replace(/</g, '&lt;')}</text></g>`;
          }

          if (layer.type === 'shape') {
            const fillValue = project.meta.visualDNA === 'wireframe' || project.meta.visualDNA === 'hologram'
              ? 'none'
              : (p.fillColor || '#ffffff');
            if (p.shape === 'circle') {
              const r = Math.max(5, Math.min(w, h) / 2);
              const sw = Number(p.strokeWidth ?? 0);
              const strokeColor = project.meta.visualDNA === 'blueprint' ? '#3b82f6' : (sw > 0 ? p.strokeColor : 'none');
              return `<g transform="${transform}"><circle cx="0" cy="0" r="${r}" fill="${fillValue}" stroke="${strokeColor}" stroke-width="${sw}" ${common} /></g>`;
            }
            if (p.shape === 'polygon') {
              const sw = Number(p.strokeWidth ?? 0);
              const strokeColor = project.meta.visualDNA === 'blueprint' ? '#3b82f6' : (sw > 0 ? p.strokeColor : 'none');
              const d = polygonPathD(Math.round(Number(p.polygonSides || 5)), Number(p.polygonInnerRadius || 0), 0, 0, Math.min(w, h) / 2);
              return `<g transform="${transform}"><path d="${d}" fill="${fillValue}" stroke="${strokeColor}" stroke-width="${sw}" ${common} /></g>`;
            }
            const sw = Number(p.strokeWidth ?? 0);
            const strokeColor = project.meta.visualDNA === 'blueprint' ? '#3b82f6' : (sw > 0 ? p.strokeColor : 'none');
            const dash = project.meta.visualDNA === 'blueprint' || project.meta.visualDNA === 'hologram' ? ' stroke-dasharray="4 3"' : '';
            return `<g transform="${transform}"><rect x="${-w / 2}" y="${-h / 2}" width="${w}" height="${h}" rx="${Number(p.cornerRadius || 0)}" fill="${fillValue}" stroke="${strokeColor}" stroke-width="${sw}"${dash} ${common} /></g>`;
          }

          if (p.mediaUrl) {
            return `<g transform="${transform}"><image x="${-w / 2}" y="${-h / 2}" width="${w}" height="${h}" href="${String(p.mediaUrl).replace(/"/g, '&quot;')}" preserveAspectRatio="xMidYMid slice" ${common}/></g>`;
          }
          const fillMedia = project.meta.visualDNA === 'wireframe' ? 'none' : (p.fillColor || '#444');
          return `<g transform="${transform}"><rect x="${-w / 2}" y="${-h / 2}" width="${w}" height="${h}" fill="${fillMedia}" stroke="none" ${common} /></g>`;
        });

        return `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">\n  <rect width="100%" height="100%" fill="${project.meta.chromaEnabled ? project.meta.chromaColor : '#111'}" />\n  ${nodes.join('\n  ')}\n</svg>`;
      };

      const toHtmlCode = () => {
        const ratio = project.meta.aspectRatio === '16:9' ? '16 / 9' : '9 / 16';
        return `<div style="position:relative;aspect-ratio:${ratio};width:100%;background:${project.meta.chromaEnabled ? project.meta.chromaColor : '#111'};overflow:hidden">\n  <!-- Generated from EditorProjectV2 -->\n  ${toSvgCode().replace(/</g, '&lt;').replace(/>/g, '&gt;')}\n</div>`;
      };

      const exportSvg = () => {
        const svg = toSvgCode();
        const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'CODEX_EDITOR_X_V1_frame.svg';
        a.click();
        URL.revokeObjectURL(url);
      };

      const exportHtml = () => {
        const html = toHtmlCode();
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'CODEX_EDITOR_X_V1_frame.html';
        a.click();
        URL.revokeObjectURL(url);
      };

      const exportRemotionJob = (format = 'mp4') => {
        const dims = getExportDims();
        const payload = {
          kind: 'remotionRender',
          targetFormat: format,
          composition: {
            fps: Number(project.meta.fps || 30),
            durationInSeconds: project.meta.durationSec,
            width: dims.width,
            height: dims.height
          },
          exportProfile: dims.key,
          schemaVersion: project.schemaVersion,
          project
        };

        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const u = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = u;
        a.download = `CODEX_EDITOR_X_V1.remotion.${format}.job.json`;
        a.click();
        URL.revokeObjectURL(u);
      };

      const capturePreviewVideo = async (format = 'webm') => {
        if (isCapturing) return;
        setIsCapturing(true);
        try {
          const dims = getExportDims();
          const width = dims.width;
          const height = dims.height;
          const fps = Number(project.meta.fps || 30);
          const mimeCandidates = format === 'webm'
            ? ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm']
            : format === 'mp4'
              ? ['video/mp4;codecs=h264', 'video/mp4']
              : ['video/quicktime;codecs=h264', 'video/quicktime', 'video/mp4;codecs=h264', 'video/mp4'];
          const mimeType = mimeCandidates.find((m) => window.MediaRecorder?.isTypeSupported?.(m)) || '';
          if (!mimeType) {
            exportRemotionJob(format === 'mov' ? 'mov' : 'mp4');
            alert(`Direct ${format.toUpperCase()} capture is not supported in this browser; exported Remotion render job instead.`);
            return;
          }

          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          const stream = canvas.captureStream(fps);
          const recorder = new MediaRecorder(stream, { mimeType });
          const chunks = [];
          recorder.ondataavailable = (e) => { if (e.data?.size) chunks.push(e.data); };

          const mediaAssets = new Map();
          const ensureMediaAsset = async (url) => {
            if (!url) return null;
            if (mediaAssets.has(url)) return mediaAssets.get(url);
            const lower = url.toLowerCase();
            const isVideo = /\.(mp4|webm|mov|m4v|ogg)(\?|#|$)/.test(lower);
            if (isVideo) {
              const video = document.createElement('video');
              video.src = url;
              video.crossOrigin = 'anonymous';
              video.muted = true;
              video.playsInline = true;
              video.preload = 'auto';
              const ready = new Promise((resolve) => {
                const done = () => resolve(video);
                video.addEventListener('loadeddata', done, { once: true });
                video.addEventListener('error', () => resolve(null), { once: true });
              });
              const loaded = await ready;
              mediaAssets.set(url, loaded);
              return loaded;
            }
            const img = new Image();
            img.crossOrigin = 'anonymous';
            const loaded = await new Promise((resolve) => {
              img.onload = () => resolve(img);
              img.onerror = () => resolve(null);
              img.src = url;
            });
            mediaAssets.set(url, loaded);
            return loaded;
          };

          await Promise.all(
            project.layers
              .filter((l) => l.type === 'media' && l.payload?.mediaUrl)
              .map((l) => ensureMediaAsset(l.payload.mediaUrl))
          );

          const trackOrderMap = Object.fromEntries(sortedTracks.map((t, i) => [t.id, i]));
          const drawAt = async (tAbs) => {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = project.meta.chromaEnabled ? project.meta.chromaColor : '#111';
            ctx.fillRect(0, 0, width, height);

            const drawables = [];
            project.layers.forEach((layer) => {
              if (layer.type === 'audio') return;
              if (!layer.visible) return;
              const clip = project.clips.find((c) => c.layerId === layer.id && tAbs >= c.start && tAbs <= c.end);
              if (!clip) return;
              const p = evaluateLayerPayloadAt(layer, clip, tAbs);
              if (!p || Number(p.opacity) <= 0) return;
              drawables.push({ layer, clip, p, order: trackOrderMap[layer.trackId] ?? 999 });
            });
            drawables.sort((a, b) => b.order - a.order);

            for (const { layer, clip, p } of drawables) {
              const cx = width / 2 + Number(p.x || 0);
              const cy = height / 2 + Number(p.y || 0);
              const w = (Number(p.width || 0) / 100) * width;
              const h = (Number(p.height || 0) / 100) * height;
              const transFx = transitionInfluence(clip || { id: '' });
              const animFx = clipEntryExitInfluence(clip || null);
              const op = clamp(Number(p.opacity || 1) * (transFx.opacity ?? 1) * (animFx.opacity ?? 1), 0, 1);

              ctx.save();
              ctx.globalAlpha = op;
              ctx.filter = buildEffectFilter(p, project.meta.visualDNA);
              ctx.translate(cx, cy);
              if (transFx.transformExtra || animFx.transformExtra) {
                const tx = `${transFx.transformExtra || ''} ${animFx.transformExtra || ''}`;
                const mx = (tx.match(/translateX\(([-\d.]+)px\)/) || [])[1];
                const my = (tx.match(/translateY\(([-\d.]+)px\)/) || [])[1];
                const sc = (tx.match(/scale\(([-\d.]+)\)/) || [])[1];
                const rt = (tx.match(/rotate\(([-\d.]+)deg\)/) || [])[1];
                if (mx) ctx.translate(Number(mx), 0);
                if (my) ctx.translate(0, Number(my));
                if (rt) ctx.rotate((Number(rt) * Math.PI) / 180);
                if (sc) ctx.scale(Number(sc), Number(sc));
              }
              ctx.rotate((Number(p.rotation || 0) * Math.PI) / 180);
              ctx.scale(Number(p.scale || 1), Number(p.scale || 1));

              if (layer.type === 'text') {
                const fontFamily = p.fontFamily || 'Outfit';
                ctx.fillStyle = p.fillColor || '#fff';
                ctx.font = `900 ${Math.max(10, Number(p.fontSize || 40))}px "${fontFamily}", sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const text = String(p.text || '');
                const sw = Math.max(0, Number(p.strokeWidth ?? 0));
                if (sw > 0) {
                  ctx.lineWidth = sw * 2;
                  ctx.strokeStyle = p.strokeColor || '#111';
                  ctx.strokeText(text, 0, 0);
                }
                ctx.fillText(text, 0, 0);
              } else if (layer.type === 'shape') {
                ctx.fillStyle = p.fillColor || '#444';
                ctx.strokeStyle = p.strokeColor || '#111';
                ctx.lineWidth = Math.max(0, Number(p.strokeWidth ?? 0));
                if (p.shape === 'circle') {
                  const r = Math.max(4, Math.min(w, h) / 2);
                  ctx.beginPath();
                  ctx.arc(0, 0, r, 0, Math.PI * 2);
                  ctx.fill();
                  if (ctx.lineWidth > 0) ctx.stroke();
                } else if (p.shape === 'polygon') {
                  const d = polygonPathD(Math.round(Number(p.polygonSides || 5)), Number(p.polygonInnerRadius || 0), 0, 0, Math.min(w, h) / 2);
                  if (d) {
                    const path = new Path2D(d);
                    ctx.fill(path);
                    if (ctx.lineWidth > 0) ctx.stroke(path);
                  }
                } else {
                  const x = -w / 2;
                  const y = -h / 2;
                  const r = Math.max(0, Number(p.cornerRadius || 0));
                  if (r > 0) {
                    const rr = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
                    ctx.beginPath();
                    ctx.moveTo(x + rr, y);
                    ctx.lineTo(x + w - rr, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
                    ctx.lineTo(x + w, y + h - rr);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
                    ctx.lineTo(x + rr, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
                    ctx.lineTo(x, y + rr);
                    ctx.quadraticCurveTo(x, y, x + rr, y);
                    ctx.closePath();
                    ctx.fill();
                    if (ctx.lineWidth > 0) ctx.stroke();
                  } else {
                    ctx.fillRect(x, y, w, h);
                    if (ctx.lineWidth > 0) ctx.strokeRect(x, y, w, h);
                  }
                }
              } else {
                const x = -w / 2;
                const y = -h / 2;
                if (p.mediaUrl) {
                  const asset = await ensureMediaAsset(p.mediaUrl);
                  if (asset) {
                    if (asset instanceof HTMLVideoElement) {
                      if (asset.readyState >= 2) {
                        const localT = clamp(tAbs - (project.clips.find((c) => c.layerId === layer.id)?.start || 0), 0, asset.duration || Number.POSITIVE_INFINITY);
                        if (Number.isFinite(asset.duration) && asset.duration > 0) {
                          asset.currentTime = localT % asset.duration;
                        }
                        ctx.drawImage(asset, x, y, w, h);
                      } else {
                        ctx.fillStyle = '#111';
                        ctx.fillRect(x, y, w, h);
                      }
                    } else {
                      ctx.drawImage(asset, x, y, w, h);
                    }
                  } else {
                    ctx.fillStyle = p.fillColor || '#333';
                    ctx.fillRect(x, y, w, h);
                  }
                } else {
                  ctx.fillStyle = p.fillColor || '#333';
                  ctx.fillRect(x, y, w, h);
                  ctx.fillStyle = '#fff';
                  ctx.font = '700 16px sans-serif';
                  ctx.textAlign = 'center';
                  ctx.textBaseline = 'middle';
                  ctx.fillText(String(p.layerName || 'MEDIA'), 0, 0);
                }
              }
              ctx.restore();
            }
          };

          const duration = project.meta.durationSec;
          let frame = 0;
          const totalFrames = Math.ceil(duration * fps);
          recorder.start();
          await new Promise((resolve) => {
            const tick = async () => {
              const t = frame / fps;
              await drawAt(t);
              frame += 1;
              if (frame <= totalFrames) requestAnimationFrame(tick);
              else {
                recorder.stop();
                resolve();
              }
            };
            tick();
          });
          await new Promise((resolve) => { recorder.onstop = resolve; });
          const blob = new Blob(chunks, { type: mimeType || `video/${format}` });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = format === 'webm' ? 'CODEX_EDITOR_X_V1_preview.webm' : `CODEX_EDITOR_X_V1_preview.${format}`;
          a.click();
          URL.revokeObjectURL(url);
        } finally {
          setIsCapturing(false);
        }
      };

      const capturePreviewWebm = async () => {
        await capturePreviewVideo('webm');
      };

      const addMediaToSelected = (url) => {
        if (!selectedLayer) return;
        if (selectedLayer.type !== 'media') {
          alert('Select a media layer first.');
          return;
        }
        updateLayerPayload(selectedLayer.id, {
          mediaUrl: url,
          mediaName: url ? (url.split('/').pop() || 'URL_MEDIA') : '',
          fillColor: '#222',
          strokeWidth: 0
        });
      };

      const addAudioToSelected = (url, srcType = 'file') => {
        if (!selectedLayer) return;
        if (selectedLayer.type !== 'audio') {
          alert('Select an audio layer first.');
          return;
        }
        updateLayerPayload(selectedLayer.id, {
          mediaUrl: url,
          mediaName: url ? (url.split('/').pop() || 'URL_AUDIO') : '',
          audioSrcType: srcType,
          fillColor: COLORS.blue,
          strokeWidth: 0
        });
      };

      const onUploadMedia = (file) => {
        if (!file) return;
        if (!selectedLayer || selectedLayer.type !== 'media') {
          alert('Select a media layer first.');
          return;
        }
        const url = URL.createObjectURL(file);
        setSelectedLayerUrlMode((prev) => selectedLayer ? ({ ...prev, [selectedLayer.id]: false }) : prev);
        const apply = (w, h) => {
          const size = mediaPercentFromIntrinsic(w, h, project.meta.aspectRatio);
          updateLayerPayload(selectedLayer.id, {
            mediaUrl: url,
            mediaName: file.name || '',
            width: size.width,
            height: size.height,
            strokeWidth: 0,
            fillColor: '#111'
          });
        };
        if (file.type.startsWith('image/')) {
          const img = new Image();
          img.onload = () => apply(img.naturalWidth || 1920, img.naturalHeight || 1080);
          img.onerror = () => apply(1920, 1080);
          img.src = url;
          return;
        }
        if (file.type.startsWith('video/')) {
          const video = document.createElement('video');
          video.preload = 'metadata';
          video.onloadedmetadata = () => apply(video.videoWidth || 1920, video.videoHeight || 1080);
          video.onerror = () => apply(1920, 1080);
          video.src = url;
          return;
        }
        updateLayerPayload(selectedLayer.id, { mediaUrl: url, mediaName: file.name || '' });
      };

      const onUploadAudio = (file) => {
        if (!file) return;
        const url = URL.createObjectURL(file);
        if (selectedLayer && selectedLayer.type === 'audio') {
          setSelectedLayerUrlMode((prev) => ({ ...prev, [selectedLayer.id]: false }));
          addAudioToSelected(url, 'file');
          return;
        }
        setProject((prev) => {
          const tracks = normalizeTracksWithAudio(prev.tracks || []);
          const audioTrack = tracks.find((t) => t.kind === AUDIO_TRACK_KIND);
          if (!audioTrack) return prev;
          const layer = createLayer('audio', audioTrack.id, prev.layers.length);
          layer.payload.layerName = file.name || `AUDIO_${prev.layers.length + 1}`;
          layer.payload.mediaUrl = url;
          layer.payload.mediaName = file.name || '';
          layer.payload.audioSrcType = 'file';
          layer.payload.fillColor = COLORS.blue;
          layer.payload.strokeWidth = 0;
          const len = 4;
          const start = nearestFreeStart(prev.clips, audioTrack.id, playhead, len, null);
          const end = start + len;
          const clip = createClip(audioTrack.id, layer.id, start, end, COLORS.blue);
          setSelectedLayerId(layer.id);
          setSelectedClipId(clip.id);
          setSelectedClipIds([clip.id]);
          return {
            ...prev,
            tracks,
            layers: [...prev.layers, layer],
            clips: [...prev.clips, clip],
            meta: { ...prev.meta, durationSec: Math.max(prev.meta.durationSec, end + 1) }
          };
        });
      };

      const applyJsonDraft = () => {
        try {
          const parsed = JSON.parse(codeJsonDraft);
          if (parsed?.schemaVersion !== SCHEMA_VERSION) {
            setCodeError(`Expected ${SCHEMA_VERSION}.`);
            return;
          }
          setProject(normalizeProject(parsed));
          setCodeError('');
        } catch (err) {
          setCodeError(err.message || 'Invalid JSON');
        }
      };

      const resetJsonDraft = () => {
        setCodeJsonDraft(JSON.stringify(project, null, 2));
        setCodeError('');
      };

      const saveCustomTemplate = () => {
        const tpl = {
          id: uid('tpl'),
          name: templateName || `Template ${project.templatesCustom.length + 1}`,
          schema: 'TemplateV2',
          meta: { createdAt: new Date().toISOString() },
          project: clone(project)
        };
        setProject((prev) => ({ ...prev, templatesCustom: [tpl, ...prev.templatesCustom] }));
      };

      const applyTemplate = (tpl) => {
        if (!tpl?.project) return;
        setProject((prev) => {
          const p = clone(prev);
          const insertAt = playhead;
          const idMapLayer = new Map();
          const idMapTrack = new Map();
          const idMapClip = new Map();

          const templateTracks = Array.isArray(tpl.project.tracks) ? [...tpl.project.tracks] : [];
          const sortedTemplateTracks = templateTracks.sort((a, b) => safeNumber(a.order, 0, -999, 999) - safeNumber(b.order, 0, -999, 999));
          const visualTemplateTracks = sortedTemplateTracks.filter((track) => track.kind !== AUDIO_TRACK_KIND).reverse();
          const audioTemplateTracks = sortedTemplateTracks.filter((track) => track.kind === AUDIO_TRACK_KIND);
          const orderedTemplateTracks = [...visualTemplateTracks, ...audioTemplateTracks];

          orderedTemplateTracks.forEach((track) => {
            const newTrack = { ...track, id: uid('track'), order: p.tracks.length };
            idMapTrack.set(track.id, newTrack.id);
            p.tracks.push(newTrack);
          });

          tpl.project.layers.forEach((layer) => {
            const nl = {
              ...layer,
              id: uid('layer'),
              trackId: idMapTrack.get(layer.trackId) || p.tracks[0].id,
              payload: normalizeLayerPayload(layer, p.layers.length)
            };
            idMapLayer.set(layer.id, nl.id);
            p.layers.push(nl);
          });

          tpl.project.clips.forEach((clip) => {
            const len = durationOf(clip);
            const trackId = idMapTrack.get(clip.trackId) || p.tracks[0].id;
            const start = nearestFreeStart(p.clips, trackId, insertAt + clip.start, len);
            const newClipId = uid('clip');
            const nc = {
              ...clip,
              id: newClipId,
              trackId,
              layerId: idMapLayer.get(clip.layerId),
              start,
              end: start + len,
              introAnimationId: normalizeAnimId(clip.introAnimationId),
              introDurationSec: normalizeAnimDuration(clip.introDurationSec),
              introLevel: normalizeAnimLevel(clip.introLevel),
              outroAnimationId: normalizeAnimId(clip.outroAnimationId),
              outroDurationSec: normalizeAnimDuration(clip.outroDurationSec),
              outroLevel: normalizeAnimLevel(clip.outroLevel),
              keyframes: (clip.keyframes || []).map((kf) => ({ ...kf, id: uid('kf') }))
            };
            idMapClip.set(clip.id, newClipId);
            p.clips.push(nc);
            p.meta.durationSec = Math.max(p.meta.durationSec, nc.end + 1);
          });

          (tpl.project.transitions || []).forEach((tr) => {
            const leftClipId = idMapClip.get(tr.leftClipId);
            const rightClipId = idMapClip.get(tr.rightClipId);
            if (!leftClipId || !rightClipId) return;
            p.transitions.push({
              ...tr,
              id: uid('tr'),
              leftClipId,
              rightClipId
            });
          });

          return p;
        });
      };

      const saveManualSession = () => {

      const exportTemplatesJson = () => {

      const runAiJob = async (type) => {
