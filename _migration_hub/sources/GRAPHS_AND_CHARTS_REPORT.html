        function renderChartPreview(type, data, colors, w, h, p) {
            w = w || 280; h = h || 160; p = p || 20;
            switch(type) {
                case 'bar-vertical': {
                    const maxVal = Math.max(...data);
                    const barWidth = (w - p * 2) / data.length - 4;
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    data.forEach((val, i) => {
                        const barHeight = ((val / maxVal) * (h - p * 2 - 20));
                        const x = p + i * (barWidth + 4);
                        const y = h - p - barHeight;
                        svg += '<rect class="chart-bar" x="' + x + '" y="' + y + '" width="' + barWidth + '" height="' + barHeight + '" fill="' + colors[i % colors.length] + '" rx="3"/>';
                    });
                    return svg + '</svg>';
                }
                case 'bar-horizontal': {
                    const maxVal = Math.max(...data.map(d => d.value));
                    const barHeight = 20;
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    data.forEach((item, i) => {
                        const barWidth = ((item.value / maxVal) * (w - p * 2 - 60));
                        const y = p + i * (barHeight + 8);
                        svg += '<rect class="chart-bar" x="' + (p + 55) + '" y="' + y + '" width="' + barWidth + '" height="' + barHeight + '" fill="' + colors[i % colors.length] + '" rx="3"/>';
                        svg += '<text x="' + (p + 50) + '" y="' + (y + 14) + '" text-anchor="end" font-size="8" font-weight="900" fill="#000">' + item.label.substring(0, 8) + '</text>';
                    });
                    return svg + '</svg>';
                }
                case 'line': {
                    const maxVal = Math.max(...data);
                    const minVal = Math.min(...data);
                    const range = maxVal - minVal || 1;
                    const points = data.map((val, i) => {
                        const x = p + (i / (data.length - 1)) * (w - p * 2);
                        const y = h - p - ((val - minVal) / range) * (h - p * 2);
                        return x + ',' + y;
                    }).join(' ');
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    svg += '<polyline class="chart-line" points="' + points + '" stroke="' + colors[0] + '"/>';
                    data.forEach((val, i) => {
                        const x = p + (i / (data.length - 1)) * (w - p * 2);
                        const y = h - p - ((val - minVal) / range) * (h - p * 2);
                        svg += '<circle class="chart-point" cx="' + x + '" cy="' + y + '" r="4" fill="' + colors[0] + '"/>';
                    });
                    return svg + '</svg>';
                }
                case 'area': {
                    const maxVal = Math.max(...data);
                    const minVal = Math.min(...data);
                    const range = maxVal - minVal || 1;
                    const linePoints = data.map((val, i) => {
                        const x = p + (i / (data.length - 1)) * (w - p * 2);
                        const y = h - p - ((val - minVal) / range) * (h - p * 2);
                        return x + ',' + y;
                    }).join(' ');
                    const areaPoints = p + ',' + (h - p) + ' ' + linePoints + ' ' + (w - p) + ',' + (h - p);
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    svg += '<defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + colors[0] + '" stop-opacity="0.4"/><stop offset="100%" stop-color="' + colors[0] + '" stop-opacity="0.05"/></linearGradient></defs>';
                    svg += '<polygon points="' + areaPoints + '" fill="url(#areaGrad)"/>';
                    svg += '<polyline class="chart-line" points="' + linePoints + '" stroke="' + colors[0] + '"/>';
                    return svg + '</svg>';
                }
                case 'scatter': {
                    const maxX = Math.max(...data.map(d => d.x));
                    const maxY = Math.max(...data.map(d => d.y));
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    svg += '<line x1="' + p + '" y1="' + (h - p) + '" x2="' + (w - p) + '" y2="' + (h - p) + '" stroke="#000" stroke-width="1"/>';
                    svg += '<line x1="' + p + '" y1="' + p + '" x2="' + p + '" y2="' + (h - p) + '" stroke="#000" stroke-width="1"/>';
                    data.forEach(point => {
                        const x = p + (point.x / maxX) * (w - p * 2);
                        const y = h - p - (point.y / maxY) * (h - p * 2);
                        svg += '<circle class="chart-point" cx="' + x + '" cy="' + y + '" r="5" fill="' + colors[0] + '"/>';
                    });
                    return svg + '</svg>';
                }
                case 'bubble': {
                    const maxX = Math.max(...data.map(d => d.x));
                    const maxY = Math.max(...data.map(d => d.y));
                    const maxR = Math.max(...data.map(d => d.r));
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    svg += '<line x1="' + p + '" y1="' + (h - p) + '" x2="' + (w - p) + '" y2="' + (h - p) + '" stroke="#000" stroke-width="1"/>';
                    svg += '<line x1="' + p + '" y1="' + p + '" x2="' + p + '" y2="' + (h - p) + '" stroke="#000" stroke-width="1"/>';
                    data.forEach((point, i) => {
                        const x = p + (point.x / maxX) * (w - p * 2);
                        const y = h - p - (point.y / maxY) * (h - p * 2);
                        const r = (point.r / maxR) * 12 + 3;
                        svg += '<circle class="chart-point" cx="' + x + '" cy="' + y + '" r="' + r + '" fill="' + colors[i % colors.length] + '"/>';
                    });
                    return svg + '</svg>';
                }
                case 'pie': case 'donut': {
                    const total = data.reduce((a, b) => a + b, 0);
                    const cx = w / 2;
                    const cy = h / 2 + 5;
                    const r = Math.min(w, h) / 2 - p - 10;
                    const innerR = type === 'donut' ? r * 0.5 : 0;
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    let startAngle = -90;
                    data.forEach((val, i) => {
                        const angle = (val / total) * 360;
                        const endAngle = startAngle + angle;
                        const outerX1 = cx + r * Math.cos((startAngle * Math.PI) / 180);
                        const outerY1 = cy + r * Math.sin((startAngle * Math.PI) / 180);
                        const outerX2 = cx + r * Math.cos((endAngle * Math.PI) / 180);
                        const outerY2 = cy + r * Math.sin((endAngle * Math.PI) / 180);
                        const color = colors[i % colors.length];
                        const largeArc = angle > 180 ? 1 : 0;
                        if (type === 'donut') {
                            const innerX1 = cx + innerR * Math.cos((endAngle * Math.PI) / 180);
                            const innerY1 = cy + innerR * Math.sin((endAngle * Math.PI) / 180);
                            const innerX2 = cx + innerR * Math.cos((startAngle * Math.PI) / 180);
                            const innerY2 = cy + innerR * Math.sin((startAngle * Math.PI) / 180);
                            svg += '<path d="M ' + outerX1 + ' ' + outerY1 + ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + outerX2 + ' ' + outerY2 + ' L ' + innerX1 + ' ' + innerY1 + ' A ' + innerR + ' ' + innerR + ' 0 ' + largeArc + ' 0 ' + innerX2 + ' ' + innerY2 + ' Z" fill="' + color + '" stroke="#000" stroke-width="2"/>';
                        } else {
                            svg += '<path d="M ' + cx + ' ' + cy + ' L ' + outerX1 + ' ' + outerY1 + ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + outerX2 + ' ' + outerY2 + ' Z" fill="' + color + '" stroke="#000" stroke-width="2"/>';
                        }
                        startAngle = endAngle;
                    });
                    if (type === 'donut') svg += '<text x="' + cx + '" y="' + cy + '" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="900" fill="#000">' + total + '%</text>';
                    return svg + '</svg>';
                }
                case 'funnel': {
                    const maxVal = data[0];
                    const barHeight = (h - p * 2) / data.length - 4;
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    data.forEach((val, i) => {
                        const barWidth = ((val / maxVal) * (w - p * 2));
                        const x = (w - barWidth) / 2;
                        const y = p + i * (barHeight + 4);
                        svg += '<rect class="chart-bar" x="' + x + '" y="' + y + '" width="' + barWidth + '" height="' + barHeight + '" fill="' + colors[i % colors.length] + '" rx="4" stroke="#000" stroke-width="2"/>';
                        svg += '<text x="' + (w / 2) + '" y="' + (y + barHeight / 2 + 4) + '" text-anchor="middle" font-size="10" font-weight="900" fill="#000">' + val.toLocaleString() + '</text>';
                    });
                    return svg + '</svg>';
                }
                case 'heatmap': {
                    const flatData = data.flat();
                    const maxVal = Math.max(...flatData);
                    const cols = data[0].length;
                    const rows = data.length;
                    const cellW = (w - p * 2) / cols;
                    const cellH = (h - p * 2) / rows;
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    data.forEach((row, ri) => {
                        row.forEach((val, ci) => {
                            const opacity = (val / maxVal) * 0.9 + 0.1;
                            const x = p + ci * cellW;
                            const y = p + ri * cellH;
                            svg += '<rect x="' + (x + 1) + '" y="' + (y + 1) + '" width="' + (cellW - 2) + '" height="' + (cellH - 2) + '" fill="' + colors[0] + '" fill-opacity="' + opacity + '" stroke="#000" stroke-width="0.5" rx="2"/>';
                        });
                    });
                    return svg + '</svg>';
                }
                case 'combo': {
                    const maxVal = Math.max(...data.map(d => d.views || d.imp || 0));
                    const barWidth = (w - p * 2) / data.length / 2 - 2;
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    data.forEach((item, i) => {
                        const x = p + i * (barWidth * 2 + 4) + 2;
                        if (item.views !== undefined) {
                            const barH = ((item.views / maxVal) * (h - p * 2 - 20));
                            svg += '<rect x="' + x + '" y="' + (h - p - barH) + '" width="' + barWidth + '" height="' + barH + '" fill="' + colors[0] + '" stroke="#000" stroke-width="1" rx="2"/>';
                        }
                        if (item.subs !== undefined) {
                            const barH = ((item.subs / 50) * (h - p * 2 - 20));
                            svg += '<rect x="' + (x + barWidth + 2) + '" y="' + (h - p - barH) + '" width="' + barWidth + '" height="' + barH + '" fill="' + colors[1] + '" stroke="#000" stroke-width="1" rx="2"/>';
                        }
                    });
                    return svg + '</svg>';
                }
                case 'treemap': {
                    const total = data.reduce((a, b) => a + b.size, 0);
                    let x = p;
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    data.forEach((item, i) => {
                        const width = ((item.size / total) * (w - p * 2));
                        svg += '<rect x="' + x + '" y="' + p + '" width="' + (width - 2) + '" height="' + (h - p * 2 - 2) + '" fill="' + colors[i % colors.length] + '" stroke="#000" stroke-width="2" rx="4"/>';
                        svg += '<text x="' + (x + 5) + '" y="' + (p + 15) + '" font-size="8" font-weight="900" fill="#000">' + item.label + '</text>';
                        x += width;
                    });
                    return svg + '</svg>';
                }
                case 'candlestick': {
                    const allVals = data.flatMap(d => [d.open, d.high, d.low, d.close]);
                    const maxVal = Math.max(...allVals);
                    const minVal = Math.min(...allVals);
                    const range = maxVal - minVal;
                    const candleW = 30;
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    data.forEach((candle, i) => {
                        const x = p + 30 + i * 80;
                        const openY = h - p - ((candle.open - minVal) / range) * (h - p * 2);
                        const closeY = h - p - ((candle.close - minVal) / range) * (h - p * 2);
                        const highY = h - p - ((candle.high - minVal) / range) * (h - p * 2);
                        const lowY = h - p - ((candle.low - minVal) / range) * (h - p * 2);
                        const isGreen = candle.close >= candle.open;
                        const color = isGreen ? colors[0] : colors[1];
                        svg += '<line x1="' + (x + candleW / 2) + '" y1="' + highY + '" x2="' + (x + candleW / 2) + '" y2="' + lowY + '" stroke="#000" stroke-width="1"/>';
                        const bodyTop = Math.min(openY, closeY);
                        const bodyHeight = Math.abs(closeY - openY) || 2;
                        svg += '<rect x="' + x + '" y="' + bodyTop + '" width="' + candleW + '" height="' + bodyHeight + '" fill="' + color + '" stroke="#000" stroke-width="2"/>';
                    });
                    return svg + '</svg>';
                }
                case 'geo': {
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    svg += '<rect x="' + p + '" y="' + p + '" width="' + (w - p * 2) + '" height="' + (h - p * 2) + '" fill="#e5e7eb" rx="4"/>';
                    const regions = [
                        { x: p + 20, y: p + 20, w: 60, h: 40, color: colors[0] },
                        { x: p + 50, y: p + 70, w: 30, h: 50, color: colors[1] },
                        { x: p + 90, y: p + 25, w: 40, h: 35, color: colors[2] },
                        { x: p + 95, y: p + 65, w: 45, h: 50, color: colors[3] },
                        { x: p + 140, y: p + 20, w: 70, h: 60, color: colors[4] },
                        { x: p + 160, y: p + 90, w: 30, h: 25, color: colors[0] }
                    ];
                    regions.forEach(region => {
                        svg += '<rect x="' + region.x + '" y="' + region.y + '" width="' + region.w + '" height="' + region.h + '" fill="' + region.color + '" stroke="#000" stroke-width="1" rx="3" opacity="0.8"/>';
                    });
                    return svg + '</svg>';
                }
                case 'tree': {
                    const rootX = w / 2;
                    const rootY = p + 15;
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    svg += '<circle cx="' + rootX + '" cy="' + rootY + '" r="12" fill="' + colors[0] + '" stroke="#000" stroke-width="2"/>';
                    svg += '<text x="' + rootX + '" y="' + (rootY + 4) + '" text-anchor="middle" font-size="7" font-weight="900" fill="#000">' + data[0].substring(0, 4) + '</text>';
                    const branchSpacing = (w - p * 2) / (data.length);
                    data.slice(1).forEach((item, i) => {
                        const x = p + branchSpacing * (i + 0.5);
                        const y = h - p - 15;
                        svg += '<line x1="' + rootX + '" y1="' + (rootY + 12) + '" x2="' + x + '" y2="' + (y - 10) + '" stroke="#000" stroke-width="1.5"/>';
                        svg += '<circle cx="' + x + '" cy="' + y + '" r="10" fill="' + colors[0] + '" fill-opacity="0.6" stroke="#000" stroke-width="2"/>';
                        svg += '<text x="' + x + '" y="' + (y + 4) + '" text-anchor="middle" font-size="6" font-weight="900" fill="#000">' + item.substring(0, 4) + '</text>';
                    });
                    return svg + '</svg>';
                }
                case 'kpi': {
                    const cardW = (w - p * 2 - 16) / 3;
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    const labels = ['Revenue', 'Views', 'Retention'];
                    data.forEach((val, i) => {
                        const x = p + i * (cardW + 8);
                        svg += '<rect x="' + x + '" y="' + p + '" width="' + cardW + '" height="' + (h - p * 2) + '" fill="' + colors[i % colors.length] + '" stroke="#000" stroke-width="2" rx="8"/>';
                        let displayVal = val;
                        if (val >= 1000000) displayVal = (val / 1000000).toFixed(1) + 'M';
                        else if (val >= 1000) displayVal = (val / 1000).toFixed(1) + 'K';
                        svg += '<text x="' + (x + cardW / 2) + '" y="' + (h / 2 - 5) + '" text-anchor="middle" font-size="20" font-weight="900" fill="#000">' + displayVal + '</text>';
                        svg += '<text x="' + (x + cardW / 2) + '" y="' + (h - p + 5) + '" text-anchor="middle" font-size="7" font-weight="900" fill="#000" opacity="0.6">' + labels[i] + '</text>';
                    });
                    return svg + '</svg>';
                }
                default: {
                    let svg = '<svg width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">';
                    svg += '<rect x="2" y="2" width="' + (w - 4) + '" height="' + (h - 4) + '" fill="white" stroke="#000" stroke-width="4" rx="12"/>';
                    svg += '<rect x="10" y="10" width="' + (w - 20) + '" height="' + (h - 20) + '" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="4 4" rx="8" opacity="0.3"/>';
                    svg += '<text x="' + (w / 2) + '" y="' + (h / 2) + '" text-anchor="middle" font-size="10" font-weight="900" fill="#000" opacity="0.4">CHART</text>';
                    return svg + '</svg>';
                }
            }
        }

        function renderChartCard(chart) {
            return '<div class="chart-card bg-white neo-border-sm neo-rounded-sm neo-shadow-sm p-4 slide-in" data-category="' + chart.category + '">' +
                '<div class="flex items-start justify-between mb-3">' +
                '<div class="flex-1">' +
                '<div class="flex items-center gap-2 mb-1">' +
                '<h3 class="text-lg font-black uppercase tracking-tighter">' + chart.name + '</h3>' +
                '<span class="neo-badge bg-black text-white text-[8px]">' + chart.type + '</span>' +
                '</div>' +
                '<p class="text-xs font-bold text-black/60">' + chart.purpose + '</p>' +
                '</div>' +
                '<div class="flex gap-1 ml-2">' +
                chart.colors.map(c => '<div class="w-4 h-4 rounded-full border-2 border-black" style="background:' + c + '"></div>').join('') +
                '</div>' +
                '</div>' +
                '<div class="chart-preview h-40">' +
                renderChartPreview(chart.preview, chart.data, chart.colors) +
                '</div>' +
                '</div>';
        }

        function renderSection(title, charts, color) {
            return '<div class="section" data-section="' + (charts[0] ? charts[0].category : 'all') + '">' +
                '<div class="flush-header ' + color + ' neo-border-sm neo-rounded-t-sm border-b-[4px] border-black px-4 py-3">' +
                '<h2 class="text-2xl font-black uppercase tracking-tighter text-black">' + title + '</h2>' +
                '<p class="text-xs font-black uppercase tracking-widest text-black/60 mt-1">' + charts.length + ' Charts</p>' +
                '</div>' +
                '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 p-4 bg-gray-50">' +
                charts.map(renderChartCard).join('') +
                '</div>' +
                '</div>';
        }

        function filterCharts(category) {
            const cards = document.querySelectorAll('.chart-card');
            cards.forEach(card => {
                if (category === 'all' || card.dataset.category === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function init() {
            const content = document.getElementById('chartContent');
            const sections = [
                { title: 'Master Graph Catalog', charts: chartData.master, color: 'bg-[#ccff00]' },
                { title: 'Research Lab Gallery', charts: chartData.research, color: 'bg-[#ff3399]' },
                { title: 'Performance Hub', charts: chartData.performance, color: 'bg-[#00ccff]' },
                { title: 'Channelytics Toolbox', charts: chartData.channelytics, color: 'bg-[#ffb158]' },
                { title: 'Data Visualizations', charts: chartData.dataviz, color: 'bg-[#b14aed]' }
            ];
            content.innerHTML = sections.map(s => renderSection(s.title, s.charts, s.color)).join('');
            document.querySelectorAll('.neo-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.neo-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    filterCharts(tab.dataset.tab);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
