                <Sword strokeWidth={3} className="text-black" />
              </div>
              <div className="flex flex-col gap-1">
                <span className="font-pixel text-[10px] text-black">Inventory Slots</span>
                <span className="font-pixel text-xs font-bold text-blue-800">14 / 20</span>
              </div>
            </div>

            <div className="grid grid-cols-4 gap-2 bg-gray-200 border-[2px] border-black p-2">
              {[...Array(8)].map((_, i) => (
                <div key={i} className="aspect-square pixel-bevel-inset border border-black cursor-pointer hover:bg-yellow-200 flex items-center justify-center">
                  {i === 2 && <Skull size={20} />}
                  {i === 5 && <Heart size={20} />}
                </div>
              ))}
            </div>

            <div className="mt-4 flex gap-2">
               <PixelButton>Save State</PixelButton>
               <PixelButton>Load State</PixelButton>
            </div>
          </div>
        </RetroOSWindow>

        {/* ========================================== */}
        {/* MODULE 5: VAPORWAVE BOOMBOX */}
        {/* ========================================== */}
        <BoomboxEqualizer />

        {/* ========================================== */}
        {/* MODULE 6: MEDIA ENGINE */}
        {/* ========================================== */}
        <MediaEngine />

        {/* ========================================== */}
        {/* MODULE 7: ARCade CABINET (Neon CRT Style) */}
        {/* ========================================== */}
        <div className="xl:col-span-2 mt-8">
          <ArcadeScreen>
            <div className="flex justify-between items-center border-b-4 border-cyan-400 pb-4 mb-6">
               <span className="font-pixel text-pink-500 text-sm sm:text-xl neon-text">PLAYER 1</span>
               <span className="font-pixel text-yellow-400 text-xl sm:text-3xl">HI-SCORE: 999,990</span>
               <span className="font-pixel text-cyan-400 text-sm sm:text-xl neon-text">CREDIT: 04</span>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-center flex-1">
               <div className="flex flex-col items-center gap-6 p-4 border-4 border-dashed border-pink-500/50 hover:bg-pink-500/20 cursor-pointer">
                  <Gamepad2 size={64} className="text-cyan-400" />
                  <span className="font-pixel text-white text-xs leading-loose">PVP BATTLE<br/>ARENA</span>
               </div>
               <div className="flex flex-col items-center gap-6 p-4 border-4 border-dashed border-yellow-400/50 hover:bg-yellow-400/20 cursor-pointer bg-yellow-400/10">
                  <Skull size={64} className="text-pink-500" />
                  <span className="font-pixel text-white text-xs leading-loose">BOSS RUSH<br/>MODE</span>
                  <span className="font-pixel text-yellow-400 text-[10px] animate-blink">SELECTED</span>
               </div>
               <div className="flex flex-col items-center gap-6 p-4 border-4 border-dashed border-cyan-400/50 hover:bg-cyan-400/20 cursor-pointer">
                  <Heart size={64} className="text-yellow-400" />
                  <span className="font-pixel text-white text-xs leading-loose">SURVIVAL<br/>GAUNTLET</span>
               </div>
            </div>

            <div className="w-full text-center mt-10">
              <span className="font-pixel text-cyan-400 text-xl animate-blink">PRESS START BUTTON</span>
            </div>
          </ArcadeScreen>
        </div>

      </div>
    </div>
  );
}
