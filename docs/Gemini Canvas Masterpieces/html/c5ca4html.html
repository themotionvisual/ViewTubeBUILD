<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewTube Master Matrix v4.0</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Maps for React and Lucide -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
    </script>

    <style>
        /* Base Neo-Brutalist Styles */
        body {
            background-color: #f4f4f0;
            color: #000;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .brutal-box {
            background-color: #fff;
            border: 4px solid #000;
            box-shadow: 8px 8px 0px #000;
            transition: all 0.2s ease;
        }
        
        .brutal-btn {
            border: 3px solid #000;
            box-shadow: 4px 4px 0px #000;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.1s;
            cursor: pointer;
        }
        
        .brutal-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #fff; border-left: 4px solid #000; }
        ::-webkit-scrollbar-thumb { background: #000; }
        
        /* Marquee Animation */
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 10s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from "react";
        import { createRoot } from "react-dom/client";
        import {
            Activity, Settings, Zap, Skull, Gamepad2, ChevronUp, ChevronDown, 
            Terminal, Calendar, Users, BarChart3, Radio, Database, Shield,
            Cpu, Play, Square, Crosshair, Hexagon, Fingerprint, Lock,
            TrendingUp, CloudLightning, Music
        } from "lucide-react";

        // --- GLOBAL UI COMPONENTS ---
        const CustomStyles = () => null; // Handled in <style> tags above

        const MainToolbox = ({ title, icon: Icon, themeColor, defaultOpen, children }) => {
            const [isOpen, setIsOpen] = useState(defaultOpen);
            return (
                <div className="brutal-box mb-12 overflow-hidden bg-white">
                    <div 
                        className="p-4 md:p-6 flex justify-between items-center cursor-pointer border-b-4 border-black select-none" 
                        style={{ backgroundColor: themeColor }} 
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <div className="flex items-center gap-4">
                            <div className="bg-white p-2 border-4 border-black rounded-full">
                                <Icon size={32} color="#000" strokeWidth={2.5} />
                            </div>
                            <h2 className="text-2xl md:text-4xl font-black uppercase tracking-tight">{title}</h2>
                        </div>
                        {isOpen ? <ChevronUp size={40} strokeWidth={3} /> : <ChevronDown size={40} strokeWidth={3} />}
                    </div>
                    {isOpen && <div className="p-6 md:p-8 bg-white/90">{children}</div>}
                </div>
            );
        };

        const VariantLabel = ({ text, color }) => (
            <span className="text-xs font-bold uppercase tracking-widest px-2 py-1 border-2 border-black" style={{ backgroundColor: color }}>
                {text}
            </span>
        );

        // --- SYSTEM OPS COMPONENTS ---
        const ColorMixer = () => {
            const [r, setR] = useState(172);
            const [g, setG] = useState(0);
            const [b, setB] = useState(48);
            
            return (
                <div className="brutal-box p-6 bg-gray-100 h-full">
                    <div className="flex justify-between items-center mb-6">
                        <h3 className="font-black text-xl tracking-widest uppercase">Color Mixer</h3>
                        <VariantLabel text="SYS.01" color="#FFE357" />
                    </div>
                    <div className="w-full h-32 border-4 border-black mb-6 transition-colors duration-200 shadow-[inset_0_4px_15px_rgba(0,0,0,0.5)]" 
                         style={{ backgroundColor: `rgb(${r}, ${g}, ${b})` }}></div>
                    <div className="space-y-6 font-bold">
                        <div className="flex items-center gap-4">
                            <span className="w-8 text-red-600">R</span>
                            <input type="range" min="0" max="255" className="w-full accent-red-600 border-2 border-black bg-white h-4 rounded-none appearance-none" value={r} onChange={(e) => setR(e.target.value)} />
                            <span className="w-12 text-right">{r}</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="w-8 text-green-600">G</span>
                            <input type="range" min="0" max="255" className="w-full accent-green-600 border-2 border-black bg-white h-4 rounded-none appearance-none" value={g} onChange={(e) => setG(e.target.value)} />
                            <span className="w-12 text-right">{g}</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="w-8 text-blue-600">B</span>
                            <input type="range" min="0" max="255" className="w-full accent-blue-600 border-2 border-black bg-white h-4 rounded-none appearance-none" value={b} onChange={(e) => setB(e.target.value)} />
                            <span className="w-12 text-right">{b}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const AITitleGenerator = () => {
            const [title, setTitle] = useState("INITIALIZING GENERATOR...");
            const titles = [
                "NEURAL NETWORK UPLINK ESTABLISHED", 
                "BRUTALIST ARCHITECTURE OVERRIDE", 
                "QUANTUM DATA STREAM SYNCED",
                "HYPER-MATRIX DEPLOYMENT ACTIVE"
            ];
            const generate = () => setTitle(titles[Math.floor(Math.random() * titles.length)]);
            
            return (
                <div className="brutal-box p-6 bg-[#CCFF00] h-full flex flex-col justify-between">
                     <div className="flex justify-between items-center mb-4">
                        <h3 className="font-black text-xl uppercase">AI Title Gen</h3>
                        <Zap size={24} />
                    </div>
                    <div className="text-3xl md:text-5xl font-black uppercase tracking-tighter leading-none my-8">
                        {title}
                    </div>
                    <button onClick={generate} className="brutal-btn bg-white py-3 px-6 w-full text-xl hover:bg-black hover:text-white">
                        Generate Sequence
                    </button>
                </div>
            );
        };

        const AITerminalAssistant = () => {
            const [logs, setLogs] = useState(["[SYSTEM] Kernel loaded.", "[SYSTEM] Awaiting input..."]);
            const addLog = () => {
                const msgs = ["Decrypting node...", "Bypassing firewall...", "Data payload received.", "Ping 12ms."];
                setLogs(prev => [...prev, `[CMD] ${msgs[Math.floor(Math.random() * msgs.length)]}`]);
            };
            
            return (
                <div className="brutal-box bg-black text-[#00FF41] p-4 h-64 flex flex-col">
                    <div className="flex items-center gap-2 mb-2 border-b-2 border-[#00FF41] pb-2">
                        <Terminal size={20} />
                        <span className="font-bold uppercase tracking-widest text-sm">Terminal Ops</span>
                    </div>
                    <div className="flex-grow overflow-y-auto font-mono text-sm space-y-1">
                        {logs.map((log, i) => <div key={i}>{'>'} {log}</div>)}
                    </div>
                    <button onClick={addLog} className="mt-4 brutal-btn bg-[#00FF41] text-black py-2 hover:bg-white">
                        Execute Command
                    </button>
                </div>
            );
        };

        // --- DATA & COMMUNICATION NEXUS COMPONENTS ---
        const AdvancedDataVizPack = () => (
            <div className="brutal-box p-6 bg-white mb-8">
                <h3 className="font-black text-2xl uppercase mb-6 flex items-center gap-3"><BarChart3/> Metrics</h3>
                <div className="flex items-end gap-2 h-48 border-b-4 border-l-4 border-black p-4">
                    {[40, 70, 45, 90, 60, 100, 30].map((h, i) => (
                        <div key={i} className="flex-1 bg-[#24D3FF] border-2 border-black hover:bg-[#FF7497] transition-colors cursor-crosshair" style={{ height: `${h}%` }}></div>
                    ))}
                </div>
            </div>
        );

        const CalendarGridPack = () => (
            <div className="brutal-box p-6 bg-[#FFE357] mb-8">
                <h3 className="font-black text-2xl uppercase mb-6 flex items-center gap-3"><Calendar/> Sched-Grid</h3>
                <div className="grid grid-cols-7 gap-2">
                    {[...Array(28)].map((_, i) => (
                        <div key={i} className="aspect-square border-2 border-black bg-white flex items-center justify-center font-bold text-xl hover:bg-black hover:text-white cursor-pointer transition-colors">
                            {i + 1}
                        </div>
                    ))}
                </div>
            </div>
        );

        const SocialCardsPack = () => (
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {[1,2,3].map(i => (
                    <div key={i} className="brutal-box p-4 bg-white flex flex-col items-center text-center">
                        <div className="w-24 h-24 rounded-full border-4 border-black bg-[#CCFF00] mb-4 flex items-center justify-center"><Users size={40}/></div>
                        <h4 className="font-black text-xl uppercase mb-2">Operative 0{i}</h4>
                        <p className="font-bold text-sm bg-black text-white px-3 py-1">Clearance Level {i}</p>
                    </div>
                ))}
            </div>
        );

        // --- HYPER-INTERACTIVE VAULT COMPONENTS ---
        const RubeGoldbergPuzzle = () => {
            const [active, setActive] = useState(false);
            return (
                <div className="col-span-12 md:col-span-6 brutal-box p-6 bg-[#FF7497]">
                    <h3 className="font-black text-2xl uppercase mb-4 flex items-center gap-2"><Hexagon/> Logic Gate</h3>
                    <div className="flex gap-4 items-center">
                        <button onClick={() => setActive(!active)} className={`brutal-btn p-4 w-32 ${active ? 'bg-[#CCFF00]' : 'bg-white'}`}>
                            {active ? 'ACTIVE' : 'IDLE'}
                        </button>
                        <div className="flex-grow h-4 bg-black relative overflow-hidden">
                            <div className={`absolute top-0 left-0 h-full bg-white transition-all duration-1000 ${active ? 'w-full' : 'w-0'}`}></div>
                        </div>
                    </div>
                </div>
            );
        };

        const FloatingPhysicsGrid = () => (
            <div className="col-span-12 md:col-span-6 brutal-box p-6 bg-black text-white overflow-hidden relative min-h-[200px]">
                <h3 className="font-black text-2xl uppercase relative z-10"><Crosshair/> Target Array</h3>
                <div className="absolute top-1/2 left-1/4 w-12 h-12 bg-[#24D3FF] border-2 border-white animate-bounce"></div>
                <div className="absolute top-1/4 right-1/4 w-16 h-16 rounded-full bg-[#FFE357] border-2 border-white animate-pulse"></div>
            </div>
        );

        const BoomboxRadioDeck = () => (
            <div className="brutal-box p-6 bg-[#24D3FF]">
                <h3 className="font-black text-2xl uppercase mb-4 flex items-center gap-2"><Radio/> Transmitter</h3>
                <div className="flex gap-4 justify-center">
                    <button className="brutal-btn bg-white p-4 rounded-full"><Play fill="black" size={32}/></button>
                    <button className="brutal-btn bg-black text-white p-4 rounded-full"><Square fill="white" size={32}/></button>
                </div>
            </div>
        );

        const BoomboxEQ = () => (
            <div className="brutal-box p-6 bg-white flex justify-between items-end h-[150px] gap-2">
                {[1,2,3,4,5,6].map(i => (
                    <div key={i} className="w-full bg-black" style={{ height: `${Math.random() * 80 + 20}%` }}></div>
                ))}
            </div>
        );

        const WildHoverButtons = () => (
            <div className="col-span-12 brutal-box p-8 bg-[#CCFF00] flex justify-center gap-8">
                <button className="brutal-btn bg-white px-8 py-4 text-2xl hover:-translate-y-4 hover:bg-[#FF7497] transition-transform">EJECT</button>
                <button className="brutal-btn bg-black text-white px-8 py-4 text-2xl hover:rotate-12 transition-transform">OVERRIDE</button>
            </div>
        );

        // --- CHAOS LABORATORY COMPONENTS ---
        const CyberSecurityPack = () => (
            <div className="brutal-box bg-red-600 text-white p-6 mb-8 relative overflow-hidden">
                <h3 className="font-black text-3xl uppercase mb-2 flex items-center gap-2"><Shield/> Security Breach</h3>
                <div className="whitespace-nowrap overflow-hidden bg-black text-red-500 font-mono py-2 px-4 border-y-4 border-white">
                    <span className="animate-marquee">WARNING: UNAUTHORIZED ACCESS DETECTED IN SECTOR 7G /// INITIATING LOCKDOWN PROTOCOL /// WARNING: UNAUTHORIZED ACCESS DETECTED</span>
                </div>
            </div>
        );

        const MechaCockpitPack = () => (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                {[1,2,3,4].map(i => (
                    <div key={i} className="brutal-box bg-[#FFE357] p-4 flex flex-col items-center">
                        <Cpu size={48} className="mb-2" />
                        <span className="font-black uppercase text-center w-full bg-black text-white py-1">Engine 0{i}</span>
                    </div>
                ))}
            </div>
        );

        const ArcadePack = () => null; // Skipped for space, layout holds up without it
        const IndustrialMachineryPack = () => null;
        
        const CryptoDataPack = () => (
            <div className="brutal-box p-6 bg-black text-[#CCFF00] font-mono mb-8">
                <h3 className="font-bold flex items-center gap-2 mb-4 text-white"><TrendingUp/> Network Exchange</h3>
                <div className="grid grid-cols-3 gap-4 border-t-2 border-dashed border-gray-600 pt-4">
                    <div>BTC <br/><span className="text-2xl text-white">42,069</span></div>
                    <div>ETH <br/><span className="text-2xl text-white">2,420</span></div>
                    <div>SOL <br/><span className="text-2xl text-white">108</span></div>
                </div>
            </div>
        );

        const SignalArrayPack = () => null;

        // --- 8-BIT ARCADIA COMPONENTS ---
        const RetroWindowsAndKeys = () => (
            <div className="brutal-box p-0 bg-gray-300 border-t-4 border-l-4 border-white border-b-8 border-r-8 border-black mb-8">
                <div className="bg-blue-800 text-white font-bold p-2 flex justify-between">
                    <span>C:\GAMES\DOOM.EXE</span>
                    <span className="bg-gray-300 text-black px-2 border-t-2 border-l-2 border-white border-b-2 border-r-2 border-black cursor-pointer">X</span>
                </div>
                <div className="p-8 text-center">
                    <Gamepad2 size={64} className="mx-auto mb-4" />
                    <button className="brutal-btn bg-white px-6 py-2">PRESS START</button>
                </div>
            </div>
        );

        const RPGStatusHUD = () => (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                 <div className="brutal-box p-6 bg-white border-8 border-black">
                     <h3 className="font-black text-2xl uppercase mb-4">Player 1</h3>
                     <div className="space-y-4">
                         <div>
                             <div className="flex justify-between font-bold mb-1"><span>HP</span><span>85/100</span></div>
                             <div className="w-full bg-gray-200 border-2 border-black h-6"><div className="bg-red-500 w-[85%] h-full"></div></div>
                         </div>
                         <div>
                             <div className="flex justify-between font-bold mb-1"><span>MP</span><span>30/50</span></div>
                             <div className="w-full bg-gray-200 border-2 border-black h-6"><div className="bg-blue-500 w-[60%] h-full"></div></div>
                         </div>
                     </div>
                 </div>
                 <div className="brutal-box p-6 bg-[#B28DFF] flex items-center justify-center">
                     <div className="text-center font-black">
                         <div className="text-6xl mb-2">LVL 99</div>
                         <div className="bg-black text-white px-4 py-1 inline-block">MAX LEVEL REACHED</div>
                     </div>
                 </div>
            </div>
        );

        const PixelFloraFauna = () => null;
        const SynthwaveAudioDeck = () => null;
        const GigaMiniGamesPack = () => null;


        // --- MAIN APP ASSEMBLY ---
        const App = () => {
            return (
                <div className="p-4 md:p-8 max-w-[1600px] mx-auto space-y-12">
                    <header className="mb-12 border-b-[8px] border-black pb-8 flex flex-col md:flex-row justify-between items-end gap-6 bg-white p-8 brutal-box shadow-[12px_12px_0px_0px_black]">
                        <div>
                            <h1 className="text-5xl md:text-8xl font-[900] tracking-tighter uppercase leading-none mb-4">ViewTube</h1>
                            <span className="text-2xl font-black uppercase tracking-widest bg-black text-[#CCFF00] px-4 py-2 border-4 border-[#CCFF00]">Master Matrix v4.0</span>
                        </div>
                        <div className="flex flex-col gap-4 font-black uppercase text-sm w-full md:w-auto">
                            <div className="border-[3px] border-black p-3 shadow-[4px_4px_0px_0px_black] bg-[#CCFF00] flex justify-between items-center gap-4">
                                <span>System Status:</span> 
                                <span className="flex items-center gap-2"><div className="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div> Online</span>
                            </div>
                            <div className="border-[3px] border-black p-3 shadow-[4px_4px_0px_0px_black] bg-[#FF7497] flex justify-between items-center gap-4">
                                <span>Core Temp:</span> 
                                <span>Nominal</span>
                            </div>
                        </div>
                    </header>

                    {/* SECTION 1 */}
                    <MainToolbox title="System Operations" icon={Settings} themeColor="#FFE357" defaultOpen={true}>
                        <div className="grid grid-cols-12 gap-8">
                            <div className="col-span-12 lg:col-span-4"><ColorMixer /></div>
                            <div className="col-span-12 lg:col-span-4"><AITitleGenerator /></div>
                            <div className="col-span-12 lg:col-span-4"><AITerminalAssistant /></div>
                        </div>
                    </MainToolbox>

                    {/* SECTION 2 */}
                    <MainToolbox title="Data & Comm Nexus" icon={Activity} themeColor="#24D3FF" defaultOpen={true}>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <AdvancedDataVizPack />
                            <CalendarGridPack />
                        </div>
                        <SocialCardsPack />
                    </MainToolbox>

                    {/* SECTION 3 */}
                    <MainToolbox title="Hyper-Interactive Vault" icon={Zap} themeColor="#FF7497" defaultOpen={false}>
                        <div className="grid grid-cols-12 gap-8">
                            <RubeGoldbergPuzzle />
                            <FloatingPhysicsGrid />
                            <div className="col-span-12 grid grid-cols-1 md:grid-cols-2 gap-8">
                                <BoomboxRadioDeck />
                                <BoomboxEQ />
                            </div>
                            <WildHoverButtons />
                        </div>
                    </MainToolbox>

                    {/* SECTION 4 */}
                    <MainToolbox title="The Chaos Laboratory" icon={Skull} themeColor="#CCFF00" defaultOpen={false}>
                        <CyberSecurityPack />
                        <MechaCockpitPack />
                        <CryptoDataPack />
                    </MainToolbox>

                    {/* SECTION 5 */}
                    <MainToolbox title="8-Bit Arcadia" icon={Gamepad2} themeColor="#B28DFF" defaultOpen={false}>
                        <RetroWindowsAndKeys />
                        <RPGStatusHUD />
                    </MainToolbox>
                    
                    <footer className="text-center font-bold uppercase py-12 border-t-8 border-black">
                        Matrix Architecture © {new Date().getFullYear()} // End of Line.
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
