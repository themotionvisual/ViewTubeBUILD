<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Manager Dropdown (Exact Style)</title>
  <style>
    :root {
      --black: #000;
      --bg: #f9fafb;
      --panel: #fff;
      --header-yellow: #ffdd00;
      --accent-pink: #ff3399;
      --accent-lime: #ccff00;
      --accent-cyan: #00ccff;
      --muted: rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #dfe1e5;
      color: #000;
      font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
      padding: 28px;
    }

    .vm-wrap {
      max-width: 1320px;
      margin: 0 auto;
      position: relative;
      z-index: 40;
    }

    .selector-card {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 24px;
      border-radius: 24px;
      border: 4px solid var(--black);
      background: var(--panel);
      box-shadow: 8px 8px 0 0 var(--black);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .selector-card:hover {
      background: #f8fafc;
    }

    .selector-card.open {
      background: #f3f4f6;
      box-shadow: none;
      transform: translateY(1px);
    }

    .selector-main {
      display: flex;
      gap: 24px;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    .thumb {
      position: relative;
      flex-shrink: 0;
      width: 224px;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      border: 3px solid var(--black);
      overflow: hidden;
      background: #000;
      box-shadow: 4px 4px 0 0 var(--black);
      transition: transform 0.2s ease;
    }

    .selector-card:hover .thumb { transform: scale(1.03); }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .meta {
      flex: 1;
      min-width: 0;
    }

    .title {
      margin: 0;
      font-size: 42px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.2s ease;
    }

    .selector-card:hover .title { color: var(--accent-pink); }

    .quick-links {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .pill-btn {
      border: 2px solid var(--black);
      border-radius: 10px;
      padding: 8px 14px;
      background: #000;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .pill-btn:hover { transform: scale(1.04); }

    .pill-btn.lime { color: var(--accent-lime); box-shadow: 2px 2px 0 0 var(--accent-lime); }
    .pill-btn.cyan { color: var(--accent-cyan); box-shadow: 2px 2px 0 0 var(--accent-cyan); }

    .subline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      margin-top: 2px;
    }

    .id-text {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .yt-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent-cyan);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      text-decoration: none;
    }

    .yt-link:hover { color: var(--accent-pink); }

    .chev-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 16px;
      transition: transform 0.2s ease;
    }

    .selector-card:hover .chev-wrap { transform: scale(1.08); }

    .chev {
      width: 24px;
      height: 24px;
      border-right: 4px solid #000;
      border-bottom: 4px solid #000;
      transform: rotate(45deg);
      transition: transform 0.3s ease, border-color 0.3s ease;
      margin-top: -8px;
    }

    .selector-card.open .chev {
      transform: rotate(225deg);
      border-color: var(--accent-pink);
      margin-top: 8px;
    }

    .dropdown {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      margin-top: 16px;
      background: #fff;
      border: 5px solid #000;
      border-radius: 24px;
      box-shadow: 16px 16px 0 0 #000;
      overflow: hidden;
      z-index: 60;
    }

    .dropdown.open { display: block; }

    .dropdown-head {
      background: var(--header-yellow);
      padding: 24px;
      border-bottom: 5px solid #000;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .dropdown-head .label {
      font-size: 40px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 520px;
    }

    .search-wrap .icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(0,0,0,0.4);
      font-size: 22px;
      pointer-events: none;
    }

    .search {
      width: 100%;
      padding: 16px 16px 16px 56px;
      background: #fff;
      border: 4px solid #000;
      border-radius: 12px;
      font: inherit;
      font-size: 24px;
      text-transform: uppercase;
      outline: none;
    }

    .search:focus { background: rgba(204,255,0,0.1); }

    .actions { display: flex; gap: 16px; }

    .action-btn {
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .action-btn:hover { transform: scale(1.04); }

    .action-btn.refresh {
      background: #000;
      color: var(--accent-lime);
      border: 0;
      box-shadow: 4px 4px 0 0 rgba(0,0,0,0.3);
    }

    .action-btn.close {
      background: #fff;
      color: #000;
      border: 3px solid #000;
      box-shadow: 4px 4px 0 0 #000;
    }

    .results {
      max-height: 60vh;
      overflow-y: auto;
      background: #f9fafb;
    }

    .result-grid { display: grid; grid-template-columns: 1fr; }

    .item {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 16px;
      cursor: pointer;
      border-top: 3px solid rgba(0,0,0,0.1);
      transition: all 0.25s ease;
      position: relative;
    }

    .item:first-child { border-top: 0; }
    .item:hover { background: #fff; }
    .item.active { background: rgba(204,255,0,0.2); }

    .item-thumb {
      width: 128px;
      aspect-ratio: 16/9;
      border-radius: 8px;
      border: 3px solid #000;
      overflow: hidden;
      background: #000;
      box-shadow: 4px 4px 0 0 #000;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .item:hover .item-thumb { transform: scale(1.04); }
    .item-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .item-meta { flex: 1; min-width: 0; }

    .item-title {
      margin: 0;
      font-size: 30px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.2s ease;
    }

    .item:hover .item-title { color: var(--accent-pink); }

    .item-sub {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .active-pill {
      background: #000;
      color: var(--accent-lime);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 10px;
      animation: pulse 1.2s infinite;
    }

    .empty,
    .loading {
      text-align: center;
      padding: 80px 24px;
      font-size: 20px;
      font-weight: 900;
      color: rgba(0,0,0,0.3);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (max-width: 1080px) {
      body { padding: 14px; }
      .selector-card { flex-direction: column; align-items: stretch; }
      .selector-main { flex-direction: column; align-items: stretch; }
      .thumb { width: 100%; }
      .title { font-size: 28px; }
      .dropdown-head .label { font-size: 30px; }
      .item-title { font-size: 21px; }
      .actions { width: 100%; }
      .action-btn { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="vm-wrap" id="vmRoot">
    <div class="selector-card" id="selectorCard" aria-expanded="false">
      <div class="selector-main">
        <div class="thumb">
          <img src="https://images.unsplash.com/photo-1465847899084-d164df4dedc6?q=80&w=1200&auto=format&fit=crop" alt="Selected video" />
        </div>

        <div class="meta">
          <h2 class="title" id="selectedTitle">Inside The Saddle Of A French Hussar ⚔️ Pt 2</h2>

          <div class="quick-links">
            <button class="pill-btn lime" type="button">To Studio Hub</button>
            <button class="pill-btn cyan" type="button">To Reference Studio</button>
          </div>

          <div class="subline">
            <p class="id-text" id="selectedId">ID: OMCLJ50CJ4M</p>
            <a class="yt-link" id="selectedLink" href="https://youtube.com/watch?v=OMCLJ50CJ4M" target="_blank" rel="noopener noreferrer">
              View on YouTube ↗
            </a>
          </div>
        </div>
      </div>

      <div class="chev-wrap" aria-hidden="true">
        <span class="chev"></span>
      </div>
    </div>

    <div class="dropdown" id="assetDropdown">
      <div class="dropdown-head">
        <span class="label">Select Asset</span>

        <div class="search-wrap">
          <span class="icon">⌕</span>
          <input id="assetSearch" class="search" type="text" placeholder="SEARCH ASSETS..." />
        </div>

        <div class="actions">
          <button class="action-btn refresh" id="refreshBtn" type="button">Refresh</button>
          <button class="action-btn close" id="closeBtn" type="button">Close</button>
        </div>
      </div>

      <div class="results">
        <div class="result-grid" id="resultGrid"></div>
        <div class="empty" id="emptyState" style="display:none"></div>
      </div>
    </div>
  </div>

  <script>
    const videos = [
      {
        videoId: "OMCLJ50CJ4M",
        title: "Inside The Saddle Of A French Hussar ⚔️ Pt 2",
        publishedAt: "2026-03-14",
        thumbnail: "https://images.unsplash.com/photo-1465847899084-d164df4dedc6?q=80&w=640&auto=format&fit=crop",
      },
      {
        videoId: "V3SY18T2MBA",
        title: "Inside The Saddle Of A French Hussar ⚔️",
        publishedAt: "2026-03-14",
        thumbnail: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=640&auto=format&fit=crop",
      },
      {
        videoId: "8IXUQTN5CJA",
        title: "General Lasalle Napoleonic Cavalry Legend",
        publishedAt: "2026-03-14",
        thumbnail: "https://images.unsplash.com/photo-1539683255143-73a6b838b106?q=80&w=640&auto=format&fit=crop",
      },
      {
        videoId: "EKEIYIJMONO",
        title: "Battle Of The Pyramids",
        publishedAt: "2026-03-09",
        thumbnail: "https://images.unsplash.com/photo-1518998053901-5348d3961a04?q=80&w=640&auto=format&fit=crop",
      }
    ];

    let selectedVideoId = videos[0].videoId;
    let dropdownOpen = false;

    const selectorCard = document.getElementById("selectorCard");
    const assetDropdown = document.getElementById("assetDropdown");
    const resultGrid = document.getElementById("resultGrid");
    const emptyState = document.getElementById("emptyState");
    const assetSearch = document.getElementById("assetSearch");
    const closeBtn = document.getElementById("closeBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const selectedTitle = document.getElementById("selectedTitle");
    const selectedId = document.getElementById("selectedId");
    const selectedLink = document.getElementById("selectedLink");

    function formatDate(iso) {
      const d = new Date(iso + "T00:00:00");
      return d.toLocaleDateString();
    }

    function setSelected(video) {
      selectedVideoId = video.videoId;
      selectedTitle.textContent = video.title;
      selectedId.textContent = `ID: ${video.videoId}`;
      selectedLink.href = `https://youtube.com/watch?v=${video.videoId}`;
      renderList(assetSearch.value);
    }

    function renderList(query = "") {
      const term = query.trim().toLowerCase();
      const filtered = videos.filter(v =>
        !term || v.title.toLowerCase().includes(term) || v.videoId.toLowerCase().includes(term)
      );

      resultGrid.innerHTML = "";

      if (!filtered.length) {
        emptyState.style.display = "block";
        emptyState.textContent = `No videos found matching "${query}"`;
        return;
      }

      emptyState.style.display = "none";

      filtered.forEach(video => {
        const item = document.createElement("div");
        item.className = `item ${video.videoId === selectedVideoId ? "active" : ""}`;
        item.innerHTML = `
          <div class="item-thumb">
            <img src="${video.thumbnail}" alt="${video.title}" />
          </div>
          <div class="item-meta">
            <h3 class="item-title">${video.title}</h3>
            <div class="item-sub">
              <span>ID: ${video.videoId}</span>
              <span>PUB: ${formatDate(video.publishedAt)}</span>
              ${video.videoId === selectedVideoId ? '<span class="active-pill">Active</span>' : ""}
            </div>
          </div>
        `;

        item.addEventListener("click", (event) => {
          event.stopPropagation();
          setSelected(video);
        });

        resultGrid.appendChild(item);
      });
    }

    function setDropdown(next) {
      dropdownOpen = next;
      selectorCard.classList.toggle("open", next);
      assetDropdown.classList.toggle("open", next);
      selectorCard.setAttribute("aria-expanded", String(next));
    }

    selectorCard.addEventListener("click", () => {
      setDropdown(!dropdownOpen);
    });

    closeBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      setDropdown(false);
    });

    refreshBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      renderList(assetSearch.value);
    });

    assetSearch.addEventListener("click", (e) => e.stopPropagation());
    assetSearch.addEventListener("input", (e) => {
      renderList(e.target.value || "");
    });

    document.addEventListener("click", (e) => {
      const root = document.getElementById("vmRoot");
      if (!root.contains(e.target)) setDropdown(false);
    });

    renderList("");
  </script>
</body>
</html>
