<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@700;900&display=swap');

        :root {
            --bg-color: #f0f0f0;
            --accent-yellow: #FFFF00;
            --accent-pink: #FF00FF;
            --accent-cyan: #00FFFF;
            --black: #000000;
            --white: #FFFFFF;
            --border-width: 4px;
            --shadow-offset: 8px;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Public Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .player-card {
            background: var(--white);
            border: var(--border-width) solid var(--black);
            box-shadow: var(--shadow-offset) var(--shadow-offset) 0px var(--black);
            width: 350px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .album-art {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--accent-cyan);
            border: var(--border-width) solid var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .album-art::before {
            content: "♫";
            font-size: 80px;
            color: var(--black);
        }

        .track-info h1 {
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        .track-info p {
            margin: 8px 0 0 0;
            font-size: 16px;
            background: var(--accent-yellow);
            display: inline-block;
            padding: 2px 8px;
            border: 2px solid var(--black);
        }

        .progress-container {
            width: 100%;
        }

        .progress-bar {
            height: 24px;
            background: var(--white);
            border: var(--border-width) solid var(--black);
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            width: 40%;
            background: var(--accent-pink);
            border-right: var(--border-width) solid var(--black);
        }

        .time-stamps {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-weight: 900;
            font-size: 14px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .btn {
            flex: 1;
            height: 50px;
            border: var(--border-width) solid var(--black);
            background: var(--white);
            font-family: inherit;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
        }

        .btn:active {
            box-shadow: 0px 0px 0px var(--black);
            transform: translate(4px, 4px);
        }

        .btn-play {
            background: var(--accent-yellow);
            flex: 1.5;
        }

        .volume-section {
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: var(--border-width) solid var(--black);
            padding-top: 20px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            background: var(--black);
            border: none;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 12px;
            background: var(--accent-cyan);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
            border: 2px solid var(--black);
            box-shadow: 2px 2px 0px var(--black);
        }

        .label-tag {
            position: absolute;
            top: 10px;
            right: -30px;
            background: var(--black);
            color: var(--white);
            padding: 4px 40px;
            transform: rotate(45deg);
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="album-art">
            <div class="label-tag">NEW</div>
        </div>

        <div class="track-info">
            <h1>BRUTAL_BEATS_V2</h1>
            <p>ARTIST_UNKNOWN</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-stamps">
                <span>01:42</span>
                <span>03:55</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn">PREV</button>
            <button class="btn btn-play">PLAY</button>
            <button class="btn">NEXT</button>
        </div>

        <div class="volume-section">
            <span style="font-weight: 900;">VOL</span>
            <input type="range" min="0" max="100" value="70">
        </div>
    </div>

</body>
</html>
