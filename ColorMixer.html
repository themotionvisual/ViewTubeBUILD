<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Brutalist CMYK Mixer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --cyan: #00FFFF;
            --magenta: #FF00FF;
            --yellow: #FFFF00;
            --black: #000000;
            --bg: #f0f0f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ff3e00;
            font-family: 'Space Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border: 6px solid black;
            box-shadow: 16px 16px 0px black;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        h1 {
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            font-size: 2.5rem;
            line-height: 1;
            border-bottom: 6px solid black;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 500px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .preview-box {
            width: 100%;
            aspect-ratio: 1/1;
            border: 6px solid black;
            background-color: #000;
            box-shadow: 8px 8px 0px black;
            position: relative;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            text-transform: uppercase;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 20px;
            background: white;
            border: 3px solid black;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 35px;
            background: white;
            border: 3px solid black;
            cursor: pointer;
            box-shadow: 4px 4px 0px black;
        }

        #c-slider::-webkit-slider-thumb { background: var(--cyan); }
        #m-slider::-webkit-slider-thumb { background: var(--magenta); }
        #y-slider::-webkit-slider-thumb { background: var(--yellow); }
        #k-slider::-webkit-slider-thumb { background: var(--black); }

        .output-section {
            background: #eee;
            border: 4px solid black;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .code-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .code-value {
            font-weight: 700;
            font-size: 1.2rem;
            background: white;
            padding: 5px 10px;
            border: 2px solid black;
        }

        .btn {
            background: #00ff66;
            border: 3px solid black;
            padding: 10px 20px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px black;
            transition: all 0.1s;
        }

        .btn:active {
            box-shadow: 0px 0px 0px black;
            transform: translate(4px, 4px);
        }

        .swatch-grid {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .swatch {
            width: 30px;
            height: 30px;
            border: 2px solid black;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CMYK Mixer</h1>
    
    <div class="main-layout">
        <div class="preview-side">
            <div id="preview" class="preview-box"></div>
            <div class="swatch-grid">
                <div class="swatch" style="background: #00ffff;" onclick="setCMYK(100,0,0,0)"></div>
                <div class="swatch" style="background: #ff00ff;" onclick="setCMYK(0,100,0,0)"></div>
                <div class="swatch" style="background: #ffff00;" onclick="setCMYK(0,0,100,0)"></div>
                <div class="swatch" style="background: #000000;" onclick="setCMYK(0,0,0,100)"></div>
                <div class="swatch" style="background: #ffffff;" onclick="setCMYK(0,0,0,0)"></div>
            </div>
        </div>

        <div class="controls">
            <div class="slider-group">
                <div class="label-row"><span>Cyan</span><span id="c-val">0%</span></div>
                <input type="range" id="c-slider" min="0" max="100" value="0">
            </div>
            <div class="slider-group">
                <div class="label-row"><span>Magenta</span><span id="m-val">0%</span></div>
                <input type="range" id="m-slider" min="0" max="100" value="0">
            </div>
            <div class="slider-group">
                <div class="label-row"><span>Yellow</span><span id="y-val">0%</span></div>
                <input type="range" id="y-slider" min="0" max="100" value="0">
            </div>
            <div class="slider-group">
                <div class="label-row"><span>Black (K)</span><span id="k-val">100%</span></div>
                <input type="range" id="k-slider" min="0" max="100" value="100">
            </div>
        </div>
    </div>

    <div class="output-section">
        <div class="code-row">
            <span>HEX:</span>
            <span id="hex-output" class="code-value">#000000</span>
        </div>
        <div class="code-row">
            <span>RGB:</span>
            <span id="rgb-output" class="code-value">rgb(0,0,0)</span>
        </div>
        <button class="btn" onclick="copyHex()">Copy Hex Code</button>
    </div>
</div>

<script>
    const sliders = ['c', 'm', 'y', 'k'];
    const preview = document.getElementById('preview');
    const hexOutput = document.getElementById('hex-output');
    const rgbOutput = document.getElementById('rgb-output');

    function updateColors() {
        const c = document.getElementById('c-slider').value;
        const m = document.getElementById('m-slider').value;
        const y = document.getElementById('y-slider').value;
        const k = document.getElementById('k-slider').value;

        document.getElementById('c-val').textContent = c + '%';
        document.getElementById('m-val').textContent = m + '%';
        document.getElementById('y-val').textContent = y + '%';
        document.getElementById('k-val').textContent = k + '%';

        // CMYK to RGB formula
        const r = Math.round(255 * (1 - c/100) * (1 - k/100));
        const g = Math.round(255 * (1 - m/100) * (1 - k/100));
        const b = Math.round(255 * (1 - y/100) * (1 - k/100));

        const rgbStr = `rgb(${r}, ${g}, ${b})`;
        const hexStr = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();

        preview.style.backgroundColor = rgbStr;
        hexOutput.textContent = hexStr;
        rgbOutput.textContent = rgbStr;
    }

    function setCMYK(c, m, y, k) {
        document.getElementById('c-slider').value = c;
        document.getElementById('m-slider').value = m;
        document.getElementById('y-slider').value = y;
        document.getElementById('k-slider').value = k;
        updateColors();
    }

    function copyHex() {
        const text = hexOutput.textContent;
        navigator.clipboard.writeText(text);
        const btn = document.querySelector('.btn');
        const originalText = btn.textContent;
        btn.textContent = "Copied!";
        btn.style.background = "white";
        setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = "#00ff66";
        }, 1000);
    }

    sliders.forEach(id => {
        document.getElementById(id + '-slider').addEventListener('input', updateColors);
    });

    // Initialize
    updateColors();
</script>

</body>
</html>
